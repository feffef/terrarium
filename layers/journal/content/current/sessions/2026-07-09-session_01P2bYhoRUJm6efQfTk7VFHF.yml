learnings:
  - The Skill Inventory (layers/journal/content/current/skills/) is advisory documentation agents are told to weigh, not a mechanical trigger gate - a Skill's own SKILL.md frontmatter description is what actually gates Skill-tool availability.
  - frictions-to-fixes and audit-docs already cover the 'edit a SKILL.md/doc, self-merge the fix' surface from two angles (friction-driven, drift-driven); a third Skill claiming that surface directly would duplicate rather than add capability.
ideas:
  - A short 'exemption ledger' table in ADR-0003 (Skill, scope, date, PR) would make the growing self-merge exemption list legible at a glance instead of requiring a reader to parse N free-form amendment paragraphs - worth proposing once a 4th exemption is requested.
