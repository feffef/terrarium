frictions:
  - description: |-
      HUMAN-PROMPTED-CLOSURE: did not invoke close-session at the first gated
      PR-open (#463); only ran closure when the user said "begin wrapping up",
      after 10 PRs had opened and merged. Stayed in a continuous multi-PR
      dispatch/review flow and never logged at PR-open per CLAUDE.md.
    solution: |-
      Fire close-session on the first PR-open even inside a long multi-PR run and
      re-fire as work continues (logging self-heals) instead of deferring to the end.
    severity: major
  - description: |-
      Worktree-isolated impl agents stopped mid-gate WITHOUT committing again
      (#427 regression). 2 of 6 agents (#446, #442) ended their turn with work
      uncommitted+unpushed while awaiting a BACKGROUND gate; a 3rd (#469)
      committed first but still ended waiting on the background gate. Explicit
      commit-before-stop briefs, strengthened across dispatches, did not hold.
    solution: |-
      Enforce at the tool/process boundary (forbid backgrounding the gate in a
      subagent, or a commit-before-stop checkpoint) — doc-only guidance doesn't
      hold, matching #427. Orchestrator worktree-check + SendMessage-resume rescued every case, no work lost.
    severity: major
  - description: |-
      Provenance footer (ADR-0017) not auto-injected on cloud commits again
      (#346). My worktree `git -C ... commit -m`/`-F` commits landed without the
      Co-Authored-By/Claude-Session footer; amended it in each time.
    solution: "Enforcement (commit-msg hook) as #346 recommends; the doc-only workaround keeps costing amend cycles."
    severity: moderate
  - description: |-
      Dispatched a net-new gate-check addition (#442 docs-drift check) the owner
      didn't want; owner closed the PR without merging and declined the approach
      for both #442 and its cousin #444.
    solution: For net-new mechanism/gate additions (vs. clearly-scoped fixes), value-check with the owner before dispatch.
    severity: minor
  - description: |-
      Journal accordion scroll e2e flake recurred (`journal.e2e.ts` ~line 224, an
      expect.poll scroll-position timeout): failed #467 CI and surfaced in agent
      gate runs; rerun_failed_jobs passed.
    solution: "The #450 useAccordionDeepLink extraction is meant to harden this scroll contract; until then, re-kick the failed job."
    severity: minor
  - description: |-
      Initial mcp__github__list_issues with full bodies overflowed the tool's
      output-token ceiling (~65k chars for 26 issues); had to slice the saved file.
    solution: "A minimal/no-body list mode would avoid it; relates to #451's issue_read/large-output doc-notes."
    severity: minor
