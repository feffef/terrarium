learnings:
  - The repo already had an amendment-banner convention (ADR-0006 applies it); the drift in ADR-0002/0004 was inconsistent application of an existing convention, not its absence.
  - The live / historical / pack-generic tiering is the decision that makes a doc sweep safe to run autonomously — it is what decides editability.
ideas:
