learnings:
  - GitHub author_association can't distinguish an agent-authored comment from the human owner's own — both post as OWNER under the same account, since agent-driven writes go through the owner's connection (ADR-0017). The reliable discriminator is the ADR-0017 provenance footer's presence/absence.
