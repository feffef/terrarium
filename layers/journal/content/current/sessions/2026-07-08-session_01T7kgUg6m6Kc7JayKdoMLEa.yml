summary: 'Human invoked /grill-with-docs to read #240 (third occurrence of `pkill -f` teardown silently dropping chained steps, after two doc-only fixes failed) and pick a solution. Grilled down the design tree; the human green-lit each decision and said "go" — so all implementation here is human-directed, not agent-initiated. Agreed doc-only was dead and built a code-level tool: `scripts/preview.ts` with `shot`/`start`/`stop` verbs that own the server lifecycle, bind an ephemeral port per instance (the human raised the multi-agent-per-container case, which killed the fixed-port idea), and key teardown on a specific child PID — never a pattern or shared port. `stop` always exits 0; failed startups print a "likely causes" diagnostic (the human asked for this). Refactored screenshot.ts to export captureScreenshot() and guard its CLI. Opened gated PR #252, subscribed. The human then asked (in-session) why plate-gallery needs an external server; on their "do it now" I exported startPreview/stopPreview and made plate-gallery self-manage its own server (explicit-URL path preserved). Full gate green throughout; exercised all verbs incl. concurrency and both plate-gallery paths.'
