learnings:
  - Nitro's default node-server preset entry is .output/server/index.mjs and honors PORT/NITRO_PORT; spawning it detached makes child.pid the process-group leader, so kill(-pid) reaps the whole tree.
  - A bare main() at the bottom of a committed tsx script runs on import too — guard it (realpathSync(argv[1]) === realpathSync(fileURLToPath(import.meta.url))) before exporting anything from that file.
ideas:
