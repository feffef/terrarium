learnings:
  - The dump URL's ?v= checksum is never validated server-side — dumps are static files, so a stale tab silently receives the NEW dump (200, byte-identical regardless of v); a checksum-mismatch 404 needs a removed/renamed collection, not a content change.
  - "A poisoned dbPromises entry has a clean network fingerprint: exactly two dump attempts during the outage (ofetch's single built-in retry) and ZERO attempts on every navigation after recovery — distinguishable from an ongoing outage without any code instrumentation."
ideas:
  - "A CI-runnable variant of the repro harness (patched build only, expecting GREEN) could guard the interim patch across @nuxt/content upgrades — the re-verify checklist item in issue #236 done mechanically."
