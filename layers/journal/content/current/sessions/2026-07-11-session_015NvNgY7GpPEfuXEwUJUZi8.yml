learnings:
  - '"self-merge" is the tier concept (author lands own PR without human review); auto-merge (the GitHub flag) is just one mechanism to do it — so a mechanism swap needed no renaming of the tier.'
  - The auto-merge flag lands purely on a green gate, which is exactly why frictions-to-fixes cannot use it — its tier requires a posted review comment plus a risk judgement before the merge, a step the flag would silently bypass.
ideas:
