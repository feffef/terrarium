frictions:
  - description: Every Fable worktree agent stopped and blocked on the full gate before capturing its final production screenshots, stranding the deliverable.
    solution: Brief must fully decouple "capture finals" from the gate — shoot finals immediately after the production build succeeds, never after the gate.
    severity: moderate
  - description: Resuming the stalled Fable agent to capture finals stalled again on the same gate wait; I captured its finals from its round shots myself.
    solution: Same fix as above; also have the orchestrator capture from the pushed branch rather than re-resuming an agent that keeps blocking.
    severity: minor
  - description: "issue_read get_sub_issues on the #515 Wayfinder map returned 113k chars and overflowed the tool-result limit to a file."
    solution: For large map issues, read specific sub-issues by number rather than the whole get_sub_issues payload.
    severity: nit
