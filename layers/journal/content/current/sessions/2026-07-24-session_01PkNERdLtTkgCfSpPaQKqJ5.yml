summary: 'Owner directed the whole arc: explore the Midden, then "structure too complicated — simplify and flatten it," then "from a visitor perspective," then chose "keep dig reports, merge the landings." On explicit instruction I ran the simplification three times in parallel worktree agents (Sonnet, Opus, Fable), each doing three screenshot rounds, and presented all three for comparison. Owner then directed the merge ("best ideas, drop the grade legend from the entry page, re-home it as a useful sidebar; spawn a Fable agent to fine-tune"), and finally "Finish" to approve. Agent-initiated within those bounds: the concrete merge recipe, the condition-key-shows-only-present-grades behaviour, and auto-opening the gated PR (ADR-0003). Full gate green (68/68); PR #676 in review.'
