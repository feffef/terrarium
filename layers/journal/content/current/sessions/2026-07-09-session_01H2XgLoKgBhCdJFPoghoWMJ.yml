frictions:
  - description: Didn't invoke close-session at PR-open time as CLAUDE.md/ADR-0003 specify ("opening the PR is the first session log"); only logged after the user explicitly asked "Session logged?".
    solution: Treat opening a gated PR as a hard trigger to invoke close-session in the same turn, not just subscribe/babysit.
    severity: moderate
  - description: First draft cited a session-log blob SHA from a garbled/repeated hex pattern instead of a real git-derived hash, caught only on a self-review pass before publishing.
    solution: Always resolve blob SHAs via `git rev-parse`/`git log -1 --format=%H -- <path>` at the moment of writing the link, never reconstruct one from memory.
    severity: minor
  - description: mcp__Claude_Code_Remote__send_later failed once with "Tool permission stream closed before response received", coinciding with a GitHub MCP disconnect/reconnect cycle.
    solution: Transient; retried successfully after the MCP server reconnected. No action needed beyond noticing the pattern.
    severity: nit
