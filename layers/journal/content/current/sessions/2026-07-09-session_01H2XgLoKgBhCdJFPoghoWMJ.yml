learnings:
  - merged_by on a GitHub PR always reads as the repo owner regardless of whether a human or an agent's API call (under the owner's connection) performed the merge — CLAUDE.md documents this, and it meant I had to use the session's own absence of a merge_pull_request tool call as the actual evidence for 'this session didn't self-merge,' not the merged_by field.
