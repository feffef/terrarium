frictions:
  - description: Web SessionEnd freeze behaviour is undocumented; needed a probe hook to find a freeze fires reason=other, not reason=resume.
    solution: Recorded in ADR-0009; an upstream docs note on web freeze would save the probe.
    severity: moderate
  - description: Writing hook config (settings.local.json) prompted for permission even in accept-edits mode — a potential blocker for autonomous runs.
    solution: It is the ADR-0004 human-only-hook boundary; committed hooks then run unprompted. Verified via the resume.
    severity: minor
  - description: I over-stated the schema change in the ADR as a breaking narrowing needing schemaVersion 2; the user caught it — it is additive.
    solution: Read the actual schema before claiming a migration; corrected the ADR.
    severity: minor
  - description: The utcTimestamp schema rejects millisecond precision, but toISOString() emits .000Z, so extracted timestamps failed validation.
    solution: A toUtcSeconds helper strips millis to the required second precision.
    severity: nit
  - description: Derived reads are absolute paths while agents cite repo-relative, so the same file appeared twice in docsRead; caught in dry-run.
    solution: Relativize derived paths against the transcript cwd before dedup.
    severity: minor
  - description: The data contract churned mid-design (source tag added then dropped, reason optional then required, filesRead vs merged docsRead), costing several ADR rewrites.
    solution: Converge the stored shape with the user earlier, before writing it up.
    severity: minor
  - description: Resolving the merge conflict I left a duplicate skillsUsed line in the Skill example.
    solution: Re-read the resolved region before staging.
    severity: nit
