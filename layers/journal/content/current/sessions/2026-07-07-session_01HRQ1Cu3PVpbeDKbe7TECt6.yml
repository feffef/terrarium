learnings:
  - Nuxt 4's generated tsconfig natively includes ../layers/*/app/**/* and ../layers/*/nuxt.config.* but NOT tenant.config.* (jiti-only) — visible in .nuxt/tsconfig.app.json
  - Nuxt auto-extends every layers/* directory, so no nuxt.config.ts extends list is needed once Tenant layers live there
  - "Negative test confirms it: a type error in a layer app/** file OR a tenant.config.ts makes pnpm typecheck fail, so the Nuxt-native globs and the one retained tenant.config.* glob both really cover their surfaces"
  - Reviewing a doc-heavy rename with a second, different model surfaced two issues the first same-model review missed
ideas:
  - A lint/canary that reads .nuxt/tsconfig.app.json could assert Nuxt's native layer globs stay present, guarding the 'coverage for free forever' claim
