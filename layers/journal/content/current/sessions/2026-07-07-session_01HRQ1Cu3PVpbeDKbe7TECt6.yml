summary: "Implemented issue #209: renamed the tenants/ directory to Nuxt's conventional layers/ directory (keeping \"Tenant\" as the domain term), so Nuxt auto-extends every layers/* and the extends list plus most of the tsConfig.include patch disappear. Empirically confirmed Nuxt natively covers layers/*/app/** and nuxt.config.* but not the jiti-only tenant.config.*, so kept exactly that one glob and retired the now-dead canary check. Updated all live code, scripts, tests, and docs (CLAUDE.md, tenant-layers.md, four skills, about.md); wrote ADR-0018 and added amending banners to eight affected ADRs (annotate, not rewrite). Left session logs and blog posts with their historical paths. Full gate green; opened gated PR #217 and subscribed to it. A second code-review pass (fable) then caught a self-contradicting ADR banner and an unmet #55 acceptance criterion; fixed both, ran the negative test, and pushed. Human affirmed keeping \"Tenant\" as the concept with the layers/ directory (the concept/path split), rather than collapsing the vocabulary to \"Layer\"."
