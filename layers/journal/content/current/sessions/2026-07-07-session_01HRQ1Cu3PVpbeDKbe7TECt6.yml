frictions:
  - description: 'Issue #209 said "delete the tsConfig.include patch" but stock Nuxt does not cover the jiti-only tenant.config.ts manifest, so a blanket delete would silently drop #93 typecheck coverage.'
    solution: Verified against .nuxt/tsconfig.app.json and kept exactly one glob (../layers/*/tenant.config.*); ADR-0018 and the PR now document why.
    severity: minor
  - description: A scoped sed loop over live files broke on the bracketed path layers/journal/app/pages/t/journal/[space]/index.vue because the shell glob-expanded the brackets.
    solution: Handle bracketed-name files with a direct Edit rather than a sed loop.
    severity: nit
  - description: Files moved by git mv had to be re-Read before the Edit tool would touch them (about.md), even though their content was already known verbatim.
    solution: Expected harness behavior; batch a Read of moved files before editing them.
    severity: nit
  - description: "Claimed \"verified empirically\" in the commit/ADR but had only run positive checks; the issue asked for #55's negative test, which I had not run."
    solution: Actually inject a type error and confirm typecheck fails; caught by a second review.
    severity: minor
  - description: An amending banner I wrote contradicted itself — a new-layout path used as the example of a pre-rename path. A positive read did not catch it.
    solution: A second review with a different model (fable) caught it; reword to match sibling banners.
    severity: nit
  - description: "A directory rename in an open branch collides with ADR-0009 direct-to-main session logging: this session's log-session hook wrote to main at a layers/ path that does not exist elsewhere on main yet, while other sessions still log under tenants/ — a split-brain until #217 merges."
    solution: Merge rename PRs promptly; or have the log hook resolve the sessions dir from main's tree, not the branch working copy.
    severity: minor
