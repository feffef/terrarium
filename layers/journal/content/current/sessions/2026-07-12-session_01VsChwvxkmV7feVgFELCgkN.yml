learnings:
  - Nuxt Content v3's Prose component overrides (ProsePre, ProseA, etc.) resolve through one flat, merged component registry across all layers — placing an override in a Tenant layer's components/content/ dir doesn't scope it to that Tenant, it silently changes rendering for every Tenant. Only override *priority* is per-layer (via components:dirs unshift order), not override *scope*.
