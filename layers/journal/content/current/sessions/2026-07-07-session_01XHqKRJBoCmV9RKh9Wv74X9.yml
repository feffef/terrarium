frictions:
  - description: "PR #148 shipped a mechanism change (code + settings.json) with no corresponding update to CLAUDE.md/SKILL.md/ADR describing that mechanism, so the stale claim propagated to 5+ independent spots."
    solution: When a PR changes a documented mechanism, its own diff should update every doc that describes that mechanism, not just the code.
    severity: minor
  - description: User's initial 'no dedup, short explanation everywhere' instruction fixed the stale claim but reproduced the exact duplication shape that caused it — I complied without flagging the tension against CLAUDE.md's own single-home rule.
    solution: When an explicit instruction conflicts with a documented repo convention, surface the tension at the time instead of waiting for the user to notice and ask.
    severity: minor
  - description: Used 'backstop' (baseball jargon) in the corrected docs without noticing it was unclear without context, needing a follow-up pass to replace it with 'fallback'.
    solution: Prefer plain, universally-understood words over domain/sports jargon in docs meant for a general audience, even when the jargon feels natural mid-explanation.
    severity: nit
  - description: Guessed line-wrapping when constructing old_string for an Edit on log-session/SKILL.md; the actual wrap didn't match and the edit failed once.
    solution: Read the exact surrounding lines before writing old_string instead of reconstructing wrapped prose from memory.
    severity: nit
