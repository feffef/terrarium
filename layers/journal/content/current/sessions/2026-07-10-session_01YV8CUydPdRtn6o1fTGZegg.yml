learnings:
  - A shared integration branch in this multi-agent repo is a moving target — other sessions force-rebase and merge feedback onto it. Always re-fetch and `git reset --hard origin/<branch>` to the authoritative tip before operating, and prefer --force-with-lease for any rewrite.
  - When CI fails but its logs 404 from the API, the fastest diagnosis is to reset to the exact failing ref and reproduce `pnpm gate` locally — the new gate steps (verify:skills-lock, content-validation) run identically.
  - Both dispatched-subagent failure modes (premature stop before commit; hard session-limit termination) strand complete work uncommitted in the worktree — a "commit-and-push-as-backup on takeover" reflex plus reading the agent's final message reliably recovers it.
  - vitest's `pnpm test` positional filter `tests/unit` matches by substring, so a Tenant-layer test at layers/atlas/tests/unit/*.spec.ts DOES run under the gate.
ideas:
  - Add a content referential-integrity check for MDC cross-references — extend validate:content (or a sibling script) to verify every ::phase-note/::season-note `of` names a declared item, every ::sighting `date` matches a real observation in that biome's log, and every :season `of` is a real season slug. Today these resolve only at render time (dev-warnings) and the gate's e2e can't hydrate every specimen, so a broken woven reference can ship silently. Concrete enough to file as an issue against the atlas Tenant / the gate.
