frictions:
  - description: "The #280 (fable) subagent built utils/almanac.ts + spec but ended its turn while a background gate ran, leaving both files uncommitted in its worktree."
    solution: Orchestrator detected the premature stop, reviewed + committed the files itself, and added a "complete the protocol before you stop" guard to every later brief (#282+), which stopped recurrence.
    severity: moderate
  - description: "The #284 (content) and #285 (composite) subagents both terminated mid-build with an API \"session limit\" error; #284's authoring and #285's implementation were complete but uncommitted in their worktrees."
    solution: "Recovered both from their worktrees: committed + pushed as backup, verified #284 with validate:content plus a hand-written static referential-integrity script, integrated, and ran the full gate. Root cause: shared session usage limit exhausted by the many long-running subagents."
    severity: major
  - description: The claude-code-remote send_later tool failed all three attempts ("permission stream closed"), so the proactive ~1h babysit check-in could not be armed.
    solution: Fell back to the PR webhook subscription (still delivers review comments + CI failures); gap is proactive detection of silent merge/close/conflict transitions, mitigated by an active PR author.
    severity: minor
  - description: The gate's e2e hydrates only a couple of atlas routes, so a broken MDC cross-reference on an un-hydrated specimen escapes the gate (runtime dev-warning only).
    solution: "Wrote a static ref-check to verify #284's woven content; longer-term, extend validate:content to check these references (see ideas)."
    severity: nit
  - description: origin/main advanced during the build (journal/session-log + docs commits); needed a check that it did not overlap the atlas layer before opening the PR.
    solution: Confirmed non-overlapping (clean); no action beyond the check.
    severity: nit
  - description: mcp__github__issue_read returns the issue body HTML-escaped, so rewriting the map body in place would double-escape it.
    solution: 'Recorded "Decisions so far" as a comment on #279 instead of editing the body section.'
    severity: nit
  - description: PR-activity webhooks repeatedly re-delivered the orchestrator's own verdict comment and the CI-green status mid-turn, each needing a "no action / duplicate" judgment.
    solution: Treated as noise; no action. A dedupe or self-authored-comment filter on the webhook surface would remove the churn.
    severity: nit
