learnings:
  - Worktree-isolated subagents share the parent's .git, so a per-ticket branch they push (or that the orchestrator commits from their worktree when they stop early) integrates with a plain fetch+merge; disjoint file sets made every frontier integration conflict-free.
  - vitest's `pnpm test` positional filter `tests/unit` matches by substring, so a Tenant-layer test at layers/atlas/tests/unit/*.spec.ts DOES run under the gate.
  - Both dispatched-subagent failure modes (premature stop before commit; hard session-limit termination) strand complete work uncommitted in the worktree — a "commit-and-push-as-backup on takeover" reflex plus reading the agent's final message reliably recovers it.
ideas:
  - Add a content referential-integrity check for MDC cross-references — extend validate:content (or a sibling script) to verify every ::phase{of} names a declared phenology phase on that specimen, every ::sighting{date} matches a real observation in that biome's log, and every :season{of} is a GLASS_SEASONS slug. Today these resolve only at render time (dev-warnings) and the gate's e2e can't hydrate every specimen, so a broken woven reference can ship silently. Concrete enough to file as an issue against the atlas Tenant / the gate.
