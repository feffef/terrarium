frictions:
  - description: "The #280 (fable) subagent built utils/almanac.ts + spec but ended its turn while a background gate ran, leaving both files uncommitted in its worktree."
    solution: 'Orchestrator detected the premature stop, reviewed + committed the files itself, and added a "complete the protocol before you stop" guard to every later brief (#282+), which stopped recurrence. Root: a subagent treating a launched background gate as terminal.'
    severity: moderate
  - description: 'The #284 (content) and #285 (composite) subagents both terminated mid-build with an API "session limit" error; their work was complete but uncommitted in their worktrees.'
    solution: "Recovered both: committed + pushed as backup, verified #284 with validate:content plus a hand-written static referential-integrity script, integrated, ran the full gate. Root: shared session usage limit exhausted by the many long-running subagents."
    severity: major
  - description: "The integration branch was force-rebased by ANOTHER session while I finished, then further evolved (feedback reworks: season selector, retire ::phase, phase-notes; PR #334 merged in). My local diverged; I had to re-sync to the authoritative remote each time."
    solution: Reset to origin before operating; used --force-with-lease so a rebase can't clobber a concurrent push. Cross-session concurrency on a shared integration branch is inherent — always re-fetch and reset to origin before touching it.
    severity: moderate
  - description: "CI went red because main added gate steps (verify:skills-lock, split content-validation; #323/#363) AFTER I branched — the branch was stale against them until rebased onto main."
    solution: Rebased the branch onto latest main (108 → 0 behind); the newer gate steps then passed. The failure only surfaced via CI, which is why a rebase-current was the fix.
    severity: moderate
  - description: mcp__github__get_job_logs returned HTTP 404 for the failing gate job (both job_id and run_id+failed_only forms), so I couldn't read the CI failure from the API.
    solution: Reproduced the gate locally after resetting to the rebased branch to diagnose instead.
    severity: minor
  - description: "Rebasing 14 commits produced recurring conflicts in the SAME file (atlas.e2e.ts) — main's #355/#363 MDC-fence test guards met the branch's repeatedly-reworked dial test."
    solution: "Resolved the file twice with a consistent rule: keep main's additive mycora test, take the branch's latest dial-MDC test; verified the whole rebase with a green gate before force-push."
    severity: minor
  - description: "Two claude-code-remote-adjacent tools failed identically with \"Tool permission stream closed before response received\": send_later (3×, couldn't arm a babysit check-in) and AskUserQuestion (the option picker for the rhythm-band question)."
    solution: Fell back to the PR webhook subscription and to plain-prose questions respectively. The MCP permission surface was intermittently unavailable; a retry/backoff on that path would help.
    severity: minor
  - description: The gate's e2e hydrates only a couple of atlas routes, so a broken MDC cross-reference on an un-hydrated specimen escapes the gate (runtime dev-warning only).
    solution: "Wrote a static ref-check to verify #284's woven content; longer-term, extend validate:content to check these references (see ideas)."
    severity: nit
  - description: mcp__github__issue_read returns the issue body HTML-escaped, so rewriting the map body in place would double-escape it.
