learnings:
  - docs/agents/verifying-ui-changes.md's 'write ad-hoc scripts inside the repo tree' convention already solves the NODE_PATH/CJS-under-tsx friction for any script that becomes a committed scripts/ file — no special handling is needed in a new tool beyond just being committed there.
  - The prototype skill's UI.md branch mounts variants as real Nuxt routes inside the app (captured via the existing preview.ts/screenshot.ts), not as standalone static directories outside the build — so a generic static-dir capture tool currently has no consumer in that workflow.
ideas:
  - "Refined scripts/capture-static.ts design, superseding the vaguer original idea — build only once a second real (non-Nuxt-routed) static-directory capture need appears: in-process node:http static server (no spawned subprocess / killGroup, unlike preview.ts); always serve over real HTTP, never file:// navigation (avoids root-relative-path/CORS breakage); CLI stays generic and verb-less — one-shot serve+screenshot+teardown reusing screenshot.ts's flag conventions (`capture-static.ts <dir> <out.png> [route] [WxH] [--wait <ms> | --wait-for <selector>]`, route defaulting to `/`) and its existing captureScreenshot/captureScreenshotWaitingFor functions rather than reimplementing Chromium-launch logic; both scripted interaction (arrow keys, clicks) and video recording are deliberately kept OFF the CLI surface and offered only as exported building blocks (server start/stop + a Chromium helper) for an ad-hoc composing script to drive, the same relationship plate-gallery.ts has to preview.ts today. Do not build speculatively — the dollhouse precedent was one-off, and prototype/UI.md currently routes UI prototypes through real Nuxt routes, not standalone static directories, so as of this session nothing would actually consume the tool."
