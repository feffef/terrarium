frictions:
  - description: >-
      Unpaginated list_issues returned 59KB and overflowed the tool-result
      limit, forcing a python slice of the persisted file to read issues.
    solution: >-
      Exactly issue #108 (fixed this session) — paginate with perPage and
      minimal_output up front.
    severity: minor
  - description: >-
      actions_list workflow-runs output was ~347KB and overflowed the
      tool-result limit twice; had to python-slice the saved file to read run
      statuses.
    solution: >-
      The GitHub MCP actions_list has no minimal_output and returns full run
      objects; a lean status-only mode (or a get-run-by-sha) would fit the
      "is main green" check.
    severity: minor
  - description: >-
      The combined-status API (pull_request_read get_status) returned
      total_count 0 / pending for gate runs, which are GitHub check-runs, not
      legacy statuses — misleading until I switched to get_check_runs.
    solution: >-
      Use get_check_runs for Actions-based gates; a doc note on the status-vs-
      check-runs distinction would save the dead end.
    severity: minor
  - description: >-
      ToolSearch "select:" with bare tool names (list_issues, get_me) found
      nothing; the MCP tools only resolved under their fully-qualified
      mcp__github__ prefix.
    solution: >-
      Prefix MCP tool names in select: queries, or have select: fall back to a
      suffix match.
    severity: nit
  - description: >-
      One doc subagent briefly ran git in the shared main checkout instead of
      its assigned worktree, leaving main on a feature branch before it
      self-recovered.
    solution: >-
      Worktree agents should cd to and pin the worktree root before any git op;
      the prompt could state the worktree path explicitly.
    severity: minor
  - description: >-
      The stop hook flagged .claude/worktrees/ as untracked and asked me to
      commit it, but it is transient worktree metadata that should not be
      committed.
    solution: >-
      Gitignore .claude/worktrees/ so the stop-hook cleanliness check ignores
      harness-managed worktree state.
    severity: nit
  - description: >-
      A first python parse of the issues JSON threw KeyError on the label
      structure (labels are objects, not strings), needing a defensive retry.
    solution: >-
      Normalize label shape defensively on the first pass.
    severity: nit
  - description: >-
      startedAt/endedAt here are hand-estimated, not captured — the known gap
