frictions:
  - description: Baked text geometry silently used whatever serif the build container had (DejaVu) — none of the Tenant's Palatino/Iowan/Georgia are installed — so it never matched real readers and shipped a visible clip bug.
    solution: Pin one bundled webfont used at both measure and display time (this PR). The render env's font set must be deterministic, not ambient.
    severity: major
  - description: "Renders were non-deterministic: rough.js re-randomises each node's outline path per render, so render:mermaid --check was always-red noise, undermining the drift gate's value."
    solution: Pin mermaid's handDrawnSeed; with the font also pinned, renders are now byte-identical and --check settles.
    severity: moderate
  - description: "The in-repo view can't reproduce the clip: the container's DejaVu matches the baked font, so a local screenshot looks fine while readers see truncation."
    solution: Simulate a wider display font in a headless probe to reproduce; a committed inflated-font visual-regression check could guard this class going forward.
    severity: minor
  - description: A true Palatino clone (TeX Gyre Pagella) matching the Tenant's PRIMARY serif isn't on npm, and general web fetch is blocked in this environment.
    solution: Settled on Gelasio (Georgia-metric-compatible, on @fontsource) — Georgia is already the stack's last named face, so it harmonises and is obtainable.
    severity: nit
