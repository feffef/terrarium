learnings:
  - Mermaid flowchart node labels are foreignObjects fixed to the measured text width; the browser clips there, so a wider display font truncates even when the node shape has spare padding.
  - This container's `serif` resolves to DejaVu Serif — none of the journal Tenant's Palatino/Iowan/Georgia stack is installed, so build-time text measurement never matches a Mac reader's.
