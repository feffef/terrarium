learnings:
  - Mermaid `handDrawnSeed` pins rough.js's per-node outline jitter, making the rendered SVG byte-deterministic across runs.
  - "@fontsource packages ship the woff2 via the npm registry, so a webfont is obtainable even when the network policy blocks general web/CDN fetches."
  - Mermaid node/edge labels are foreignObjects sized to the measured text width; the browser clips there, so a wider display font truncates even with spare shape padding.
ideas:
  - Add a committed visual-regression check that renders each diagram SVG at an inflated font size in headless Chromium and fails if any label's text box exceeds its node shape — catching baked-geometry font-mismatch clips before they ship, the exact class this session hit.
