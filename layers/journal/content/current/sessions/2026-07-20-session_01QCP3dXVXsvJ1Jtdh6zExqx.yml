summary: "The user reported the newly pre-rendered mermaid diagram (ADR-0024) truncating labels (\"Human prompt\" -> \"Human pron\"). Diagnosed: mermaid bakes node geometry by measuring text at author time, but the build container installs none of the Tenant's serif stack, so it measured a fallback while readers' browsers resolved wider and clipped. First commit (agent-authored off the bug report) added relaxNodeLabelOverflow, a post-render pass that un-clips node labels. The user then explicitly directed the root-cause fix (\"bundle a pinned web font\"): commit Gelasio (Georgia-compatible, SIL OFL) as a repo asset, inject it into Chromium at render time and ship it via @font-face so measure-font == display-font, plus pin handDrawnSeed for byte-deterministic renders. relaxNodeLabelOverflow stays as a safety net. Gate green (build + e2e); PR #622 updated."
