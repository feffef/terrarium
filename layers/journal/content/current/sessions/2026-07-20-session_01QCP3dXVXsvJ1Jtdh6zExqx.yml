summary: "The user reported the newly pre-rendered mermaid diagram on the journal how-it-works page truncating labels (\"Human prompt\" showing as \"Human pron\"). Diagnosed it: ADR-0024 bakes each node label into a foreignObject sized to the build container's font metrics (a fallback serif, since Palatino/Iowan/Georgia aren't installed), and browsers clip at that boundary when the reader's serif resolves wider. Fix (agent-authored, off the user's bug report): a relaxNodeLabelOverflow post-render pass sets overflow:visible and a centred flex wrapper on node labels so they spill into the shape's existing padding instead of clipping. Verified in headless Chromium at a 30%-wider font; gate:scoped green. Opened PR #622."
