  - description: Wrote the commit-footer session id by copying it from git log (a prior session's session-log commit trailer) instead of resolving it from this session's own system-prompt template — exactly the mistake CLAUDE.md warns against. Caught before push via git log -1 and amended.
    solution: Always grep the system-prompt/task instructions for the actual commit-footer template at the moment of writing, never reuse an id seen in git log output.
    severity: moderate
  - description: 'enable_pr_auto_merge threw "checks are failing" on PR #403 while the gate check was merely in_progress, matching a gotcha CLAUDE.md already documents — cost one extra pull_request_read round-trip to confirm and one more wakeup cycle before merging directly once green.'
    solution: No new fix needed — CLAUDE.md's existing guidance (confirm via pull_request_read, then merge_pull_request directly once green) already covers this; just budget the extra round-trip.
    severity: nit
  - description: Accidentally dispatched a no-op background agent (a stray "check status" call with no real task) while waiting on the four lens agents.
    solution: Prefer ScheduleWakeup alone for a pure wait; only dispatch an agent with real work.
    severity: nit
