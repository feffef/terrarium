frictions:
  - description: "No gate/script verifies on-disk pack Skills against skills-lock.json's computedHash, so PR #304's wayfinder drift went undetected until a human noticed it."
    solution: Add a lightweight lock-integrity check (drift-check style) that flags any skills-lock.json-keyed SKILL.md whose content no longer matches upstream.
    severity: moderate
  - description: The lock's computedHash did not match a plain sha256 of the installed SKILL.md (nor the install-commit blob), so I could not use it to confirm the correct revert target directly.
    solution: Document how computedHash is derived (upstream source vs installed file) near skills-lock.json or in the install script.
    severity: minor
