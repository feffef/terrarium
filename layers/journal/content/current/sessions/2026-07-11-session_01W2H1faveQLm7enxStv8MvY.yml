summary: "User reported that PR #304 had patched the external wayfinder Skill, which should be off limits. Confirmed via skills-lock.json that wayfinder is a pinned pack Skill (from mattpocock/skills) and its on-disk content had drifted from the pinned hash. ADR-0015 already states pack SKILL.md files are not ours to patch, but only wired that boundary into the audit-skills referral stage, leaving frictions-to-fixes free to patch a pack Skill named by a friction directly (what happened via #296). All work was human-directed by the user's request: reverted wayfinder/SKILL.md to its install-commit content, added a CLAUDE.md ground-rule pointer, and closed the frictions-to-fixes loophole (screen out pack-Skill edits in section 2; corrected section 5 wording to \"a repo-owned SKILL\"). Gate green; opened PR #306."
