learnings:
  - pull_request_creation_policy=collaborators_only is a real GitHub repo setting that blocks fork PRs from non-collaborators — not a general GitHub limitation.
  - Ad-hoc tsx/playwright-core captures from /tmp need NODE_PATH pointed at the repo node_modules and an async main() wrapper (tsx emits CJS there, breaking top-level await).
ideas:
  - "Reimagine the dollhouse as an ADR-compliant Tenant: a build-time-baked platform-activity visualization whose data derives only from committed session logs plus a build-time git snapshot (no runtime or external GitHub data), rendered as a real Vue page under the routing model — turning the fun concept into something that fits ADR-0001/0002/0006."
  - Add a committed scripts/capture-static.ts helper that serves an arbitrary static dir and screenshots/records it via resolveChromiumPath (handling the NODE_PATH/main() dance), so ad-hoc UI captures stop re-hitting the same friction.
