frictions:
  - description: WebFetch of the GitHub cross-fork compare view timed out; had to fall back to the single commit page and raw files.
    solution: For a large-divergence fork diff, read the commit + raw.githubusercontent files directly rather than the compare UI.
    severity: minor
  - description: "mcp github get_files for #631 returned 115k chars, exceeding the tool token cap; had to slice the saved JSON with python."
    solution: Request PR file lists without patches, or page them; parse paths from the saved tool-result file.
    severity: minor
  - description: Ad-hoc tsx/playwright capture script run from the /tmp scratchpad failed twice — top-level await under CJS, then unresolved playwright-core.
    solution: Wrap in async main() and set NODE_PATH to the repo node_modules; run from repo root, not via cd into scratchpad.
    severity: minor
  - description: Dollhouse timeline stepping first went the wrong way — ArrowRight is a no-op at the oldest-first boundary; ArrowLeft advances.
    solution: Inspect initial cursor/keybinding before scripting interaction; the timeline starts at the oldest event.
    severity: nit
  - description: No ffmpeg/ImageMagick/GIF encoder in the environment, so an animation could only be produced as webm, not GIF or MP4.
    solution: Used Playwright native video recording (webm); note the limitation when a specific format is requested.
    severity: minor
