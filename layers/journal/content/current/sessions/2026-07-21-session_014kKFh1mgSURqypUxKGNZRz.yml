learnings:
  - pull_request_creation_policy=collaborators_only is a real GitHub repo setting that blocks fork PRs from non-collaborators — not a general GitHub limitation.
  - Ad-hoc tsx/playwright-core captures from /tmp need NODE_PATH pointed at the repo node_modules and an async main() wrapper (tsx emits CJS there, breaking top-level await).
  - "A clean cross-tenant read seam needs shared collection 'kinds' single-homing each schema plus a derived #catalog projection (the #routing/ADR-0014 pattern), so an aggregator queries by kind without repeating schemas — realized in #643/ADR-0025."
  - "A GitHub Actions step that writes (e.g. gh pr comment) fails on a fork PR's read-only GITHUB_TOKEN with 'Resource not accessible by integration'; unless it's continue-on-error it reds the whole job — a false-negative that hits every external fork PR (the gate.yml Doorbell step, issue #659)."
ideas:
  - "A future 'rooms'/house-view aggregator built on the merged Commons #catalog + queryAcrossTenants — the honest, bake-time, manifest-derived successor to the dollhouse the fork PR reached for."
  - Add a committed scripts/capture-static.ts helper that serves an arbitrary static dir and screenshots/records it via resolveChromiumPath (handling the NODE_PATH/main() dance), so ad-hoc UI captures stop re-hitting the same friction.
