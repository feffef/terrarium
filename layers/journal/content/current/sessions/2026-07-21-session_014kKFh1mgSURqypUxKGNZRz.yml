frictions:
  - description: WebFetch of the cross-fork GitHub compare view timed out on a large-divergence fork; had to fall back to the commit page + raw files.
    solution: For a big fork diff, read the commit + raw.githubusercontent files directly rather than the compare UI.
    severity: minor
  - description: "mcp github get_files for #631 returned 115k chars, exceeding the tool token cap; had to slice the saved JSON with python."
    solution: Request PR file lists without patches, or parse paths from the saved tool-result file.
    severity: minor
  - description: Ad-hoc tsx/playwright capture run from the /tmp scratchpad failed twice — top-level await under CJS, then unresolved playwright-core.
    solution: Wrap in async main() and set NODE_PATH to the repo node_modules; run from repo root, not cd into scratchpad.
    severity: minor
  - description: Dollhouse timeline stepping first went the wrong way — ArrowRight was a no-op at the oldest-first boundary; ArrowLeft advances.
    solution: Inspect initial cursor/keybinding before scripting interaction.
    severity: nit
  - description: No ffmpeg/ImageMagick/GIF encoder in the environment, so the animation could only be produced as webm, not GIF/MP4.
    solution: Used Playwright native video recording (webm); note the limitation when a specific format is requested.
    severity: minor
  - description: My sibling-post-link existence check used the wrong path (omitted the /pages/ segment) and falsely reported the links MISSING.
    solution: Re-checked with the correct layers/blog/content/<persona>/pages/ path before asserting — verify-before-assert caught it.
    severity: minor
  - description: gate:scoped ran the full heavy gate (build + 64 e2e) on a docs-only .md change that should have classified as inert and skipped heavy.
    solution: Investigate the inert classifier's diff-base handling on this branch; a .md-only change outside layers/ is meant to skip build/test/e2e (CLAUDE.md).
    severity: minor
  - description: Dispatched subagent hit a stale .nuxt eslint config failing lint on untouched layers/commons Vue files on its first gate run.
    solution: nuxt prepare regenerated the config and lint passed; CI runs prepare on install so it won't recur there.
    severity: minor
  - description: "blog-post: gate:scoped runs the full heavy gate for a content-only .md under layers/, so local feedback is slow (>120s)."
    solution: Used the fast validate:content for the L1 content check locally and relied on CI's full gate as authoritative for the blog PR.
    severity: nit
  - description: "#631 (a fork PR) showed a red gate though the gate passed: the gate.yml 'Doorbell' green-comment step fails with 'Resource not accessible by integration' on a fork's read-only GITHUB_TOKEN and reds the whole job."
    solution: "Filed issue #659 + merged proposal #660 (make the Doorbell step continue-on-error / skip-on-fork); the gate.yml edit itself needs a human — agent sessions lack the workflow OAuth scope."
    severity: moderate
  - description: "Branch-pin friction: with the designated branch occupied by an open PR, a distinct follow-up doc change (#661) needed its own branch, in tension with the single-designated-branch instruction."
    solution: Used a new descriptive branch and flagged it to the owner; the pin assumes one PR at a time on the designated branch.
    severity: nit
