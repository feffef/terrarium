frictions:
  - description: >-
      Proposed a dedicated `digests` collection as an equal option before checking that the
      runtime resolver routes ONLY the `pages` collection; the collision forced an A→B→"simpler?"
      →research→A reversal that cost several turns and tokens.
    solution: Surface the "only `pages` is routed" constraint up front (CLAUDE.md / a routing README) so a dedicated page-collection isn't offered without its isolation-critical routing cost.
    severity: moderate
  - description: >-
      Authored a full index.md overview and reported it working, but the journal Space root is a
      custom dashboard that never renders index.md's body — the content was invisible until the
      user loaded the page.
    solution: Know the journal landing is a custom component; verify presentational changes against the rendered DOM, not the page source.
    severity: major
  - description: >-
      "Verified" render by grepping the SSR HTML for content strings — which matched the serialized
      useAsyncData payload, not the rendered DOM, giving false confidence twice.
    solution: For UI changes, assert against a headless-browser screenshot / rendered DOM, not a payload grep.
    severity: moderate
  - description: >-
      The digests link used the Space-relative content `path` (/digests/…) as a URL and 404'd; it
      needed the /t/<tenant>/<space> route prefix.
    solution: Build browsable routes from content paths via a helper; the added e2e guard now covers it. (Later mooted by moving to inline expansion.)
    severity: minor
  - description: >-
      Individual journal documents (about, digest permalinks) render through the minimal generic
      catch-all, so they are unthemed; discovered only by opening the page.
    solution: Filed issue #25 to add a journal-layer document page; inline expansion sidesteps it on the dashboard.
    severity: minor
  - description: >-
      PR #23 accreted several concerns (digest Skill + repeated dashboard iterations) on one branch,
      because the shared dashboard file plus the pinned designated branch made a parallel PR conflict-prone.
      Same class of friction logged in a prior session.
    solution: Recurring — for coupled presentation work on one file, splitting PRs is costly; accept or plan the file seam up front.
    severity: minor
  - description: >-
      No Playwright module is installed, so screenshots needed the pre-installed Chromium binary
      driven directly (had to locate /opt/pw-browsers/.../chrome and use --headless=new --screenshot).
    solution: Record the headless-Chromium screenshot recipe (or add playwright-core) for visual verification.
    severity: nit
  - description: >-
      Inline digest/session expansion is client-side, so a static screenshot can't show the open
      state; had to temporarily default one open to capture it.
    solution: Acceptable workaround; a browser-driving test util would let us screenshot post-click.
    severity: nit
  - description: The github MCP server disconnected and reconnected several times mid-session, needing tool reloads.
    solution: Transient infrastructure; no action.
    severity: nit
  - description: startedAt is hand-estimated — no exact session-start clock was available; endedAt is exact via date -u. Recurs every session.
    solution: The deferred autonomous end-of-session trigger would capture both mechanically.
    severity: nit
