frictions:
  - description: I mis-framed the effort twice — first as MDC-suite-as-Sprint-1, then needed steering that Sprint 2 must FUSE components with one extension, not list them. The user corrected both; I'd charted 7 tickets on the wrong frame first.
    solution: In wayfinder charting, confirm the baseline sprint and whether the destination wants fusion vs a component grab-bag BEFORE decomposing into tickets.
    severity: moderate
  - description: I initially inverted the model hierarchy — proposed Fable for simple tickets; the user meant Fable reserved for deep-thinking, Sonnet for simple.
    solution: Don't assume a model tier ordering; confirm the intended fast/premium mapping before assigning per-task models.
    severity: minor
  - description: I created map + 7 tickets without the ADR-0017 provenance footer; only caught it on a later rewrite.
    solution: Append the Co-Authored-By / Claude-Session footer at issue-creation time; the wayfinder tracker doc could show it in the create recipe.
    severity: minor
  - description: "I pre-referenced the review ticket as #287 assuming sequential numbering; it was actually #289, forcing a full map-body resend to fix two references."
    solution: Create the issue first, then write its real number into referencing bodies — never pre-write a predicted issue number.
    severity: minor
  - description: sub_issue_write returns the ENTIRE parent issue body on every call (no minimal_output), so linking children dumped the full map body into context.
    solution: Note the verbosity in the tracker doc's wayfinding section; expect the echo, or request a minimal_output on that MCP tool.
    severity: minor
  - description: Editing a ticket to add one line requires resending its whole body (issue_write overwrites), so small tweaks cost full-body rewrites — heavy across 6 tickets x several rounds.
    solution: Batch ticket edits; settle decisions before writing bodies to avoid repeated full-body resends.
    severity: minor
  - description: AskUserQuestion failed once ("permission stream closed") and the GitHub MCP server briefly disconnected mid-turn.
    solution: Transient; fell back to plain text since the content was already delivered.
    severity: nit
  - description: No create-label MCP tool exists and wayfinder:map/wayfinder:task did not pre-exist; had to trust issue-create to auto-create them.
    solution: It worked (REST create-issue auto-creates labels); worth a note in the tracker doc so a future session doesn't stall on the missing label.
    severity: nit
