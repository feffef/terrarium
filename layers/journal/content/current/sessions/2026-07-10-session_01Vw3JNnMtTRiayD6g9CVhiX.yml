learnings:
  - GitHub's create-issue REST path auto-creates non-existent labels (unlike gh, which validates client-side and errors) — so the first wayfinder:map issue minted the label.
  - atlas-specimen is disable-model-invocation, so Tenant-scoped manually-invoked skills won't appear in the auto-surfaced skill list — discover them by reading .agents/skills/.
  - "A phenology 'wheel of the year' is the annual twin of the shipped 24h rhythm band: the same wrap-around interval math (activeAt / Band) and signatureVars projection generalize from a 24h clock to a 365-day dial — reuse, not reinvention."
ideas:
  - "Adopt 'fused sprint' as the standing shape for Terrarium feature maps: every content-showcase sprint = a few load-bearing MDC components welded to one interactive extension over a shared data axis, so the authoring surface and the payoff can't drift apart. Sprint 2's phenology wheel is the template; the Naturalist's Key (dichotomous-key wizard + :tell/::diagnosis over a couplet tree) is the ready runner-up."
  - Give each Tenant a tiny committed skills-index (or Skill-Inventory cross-ref) naming the manually-invoked, Tenant-scoped skills a session must fold in (e.g. atlas-specimen for atlas), so charting/authoring sessions can't silently miss a disable-model-invocation skill the way this one nearly did.
