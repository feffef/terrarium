learnings:
  - GitHub's create-issue REST path auto-creates non-existent labels (unlike gh, which validates client-side and errors) — so the first wayfinder:map issue minted the label.
  - atlas-specimen is disable-model-invocation, so Tenant-scoped manually-invoked skills won't appear in the auto-surfaced skill list — they must be discovered by reading .agents/skills/.
ideas:
  - Give each Tenant a tiny committed skills-index (or a Skill-Inventory cross-ref) listing the manually-invoked, Tenant-scoped skills a session must fold in (e.g. atlas-specimen for atlas), so charting/authoring sessions can't silently miss a disable-model-invocation skill the way this one nearly did.
