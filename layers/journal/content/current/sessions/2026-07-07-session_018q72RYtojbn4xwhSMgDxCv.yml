frictions:
  - description: Tried to reply to a GitHub PR review comment; the API rejected it because a pending (unsubmitted) review already existed under the same account the session authenticates as. Misread this as the agent's own leftover pending review and called delete_pending — it was actually the maintainer's own in-progress draft review, and deleting it permanently erased their unsubmitted comment text.
    solution: "Shared human/agent GitHub identity (same root cause as issue #124) makes a pending review's owner unrecoverable before acting on it. Never call delete_pending speculatively — treat the \"one pending review per PR\" error as a stop-and-ask signal, not a delete-and-retry one."
    severity: major
  - description: "Two of the four parallel worktree-isolated implementation subagents (#183, #171) reported their assigned worktree started from a stale or unrelated HEAD instead of origin/main, and had to explicitly rebranch before committing."
    solution: "Worth a follow-up: confirm why worktree creation doesn't reliably default to origin/<default-branch>, since this required a manual workaround in half the dispatched agents and could silently bloat a diff if an agent didn't notice."
    severity: moderate
  - description: A broad `search_issues` query with no state filter (`is:issue`, no `is:open`) overflowed the tool-result token limit even at a moderate perPage, despite docs/agents/issue-tracker.md already warning that a wide search query overflows the same way as list_*.
    solution: Re-confirmed the existing doc guidance is correct; just needed to scope the query to `is:open` from the start rather than learning it again by hitting the overflow.
    severity: nit
  - description: "`issue_write`'s `labels` param replaces the full label set rather than adding to it, so every relabel call had to pass the complete desired label array, not just the label being added."
    solution: Not an issue here since these issues only ever carried one label, but a sharp edge worth remembering for any issue with multiple concurrent labels.
    severity: nit
