frictions:
  - description: The request said "learnings" and I first reached for scripts/session-frictions.ts and analyzed the frictions field; the human interrupted to say they meant learnings only, not frictions.
    solution: Session logs have a distinct `learnings` field separate from `frictions`; when a request says "learnings," extract that field first rather than assuming the friction stream. The colloquial word and the schema field collide.
    severity: minor
  - description: My first pass created a new browser-probing.md while ALSO leaving the full detail in CLAUDE.md plus a pointer to it — duplicating the topic instead of single-homing it. The human caught it ("shouldn't the whole section be extracted").
    solution: "When adding a doc that overlaps an existing CLAUDE.md section, apply the single-home rule in the same pass: extract the section's detail into the new doc and leave only a pointer, rather than pointing at a sibling while keeping the copy."
    severity: minor
