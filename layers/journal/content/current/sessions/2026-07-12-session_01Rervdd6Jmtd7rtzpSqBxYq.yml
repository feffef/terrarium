learnings:
  - ADR-0016's Tenant-root-page precedent (built for the Atlas front door) transposes directly onto a second Tenant (the Blog) with no adaptation needed — same resolveSpaceRoute-per-Space read-only pattern, same reason it stays outside the ADR-0004 human-only routing core.
  - publishedAt frontmatter and git commit time can silently diverge in this repo's blog content with no gate catching it (they're independent, self-reported vs. derived facts) — worth checking directly with git log rather than trusting the frontmatter value alone when timestamp ordering actually matters to a claim.
