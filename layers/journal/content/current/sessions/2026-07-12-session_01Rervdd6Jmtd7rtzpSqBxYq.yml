frictions:
  - description: mermaid was declared in package.json but missing from node_modules at session start (a partial/incomplete install in this environment), causing pnpm typecheck and pnpm build to fail with an unrelated Cannot find module 'mermaid' error unrelated to this session's diff.
    solution: Ran pnpm install to complete the install, which resolved it immediately. Worth trying before assuming a mysterious pre-existing typecheck/build failure is caused by the session's own change.
    severity: minor
  - description: After adding the tags field to the blog manifest schema, pnpm typecheck failed claiming .select('tags') wasn't a valid field — a stale generated Nuxt Content collection type, not a real error.
    solution: pnpm exec nuxt prepare regenerates collection types from the current manifest; easy to forget mid-session after a schema edit.
    severity: nit
  - description: My first "put it in a sidebar" implementation nested the reused BlogNetwork component inside a second, separately-boxed "About" panel — visually a box-in-a-box that also nearly duplicated the Network's own hint text with a redundant intro paragraph. Cost a full extra screenshot-and-feedback round to catch.
    solution: When reusing an existing self-contained "boxed panel" component inside a new layout, default to making it the ONE visible box (strip or skip the wrapper's own chrome) rather than wrapping it in another styled container — check for this specifically when a component being reused already renders its own border/background/shadow.
    severity: minor
  - description: My first CSS fix for the box-in-a-box (stripping the outer wrapper's background/border/shadow via a class override) didn't visually apply — the override rule had the same selector specificity as the base rule it needed to beat, but appeared earlier in the stylesheet, so the later base rule won the cascade.
    solution: When a targeted CSS override doesn't take effect, check rule order before assuming the selector is wrong — equal-specificity rules resolve by source order, so bumping specificity (an extra class) is a more robust fix than relying on placement.
    severity: nit
