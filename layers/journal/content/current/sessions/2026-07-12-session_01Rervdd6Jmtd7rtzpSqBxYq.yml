frictions:
  - description: mermaid was declared in package.json but missing from node_modules at session start (a partial/incomplete install in this environment), causing pnpm typecheck and pnpm build to fail with an unrelated Cannot find module 'mermaid' error unrelated to this session's diff.
    solution: Ran `pnpm install` to complete the install, which resolved it immediately. Worth trying before assuming a mysterious pre-existing typecheck/build failure is caused by the session's own change.
