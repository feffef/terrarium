  - description: After adding the tags field to the blog manifest schema, pnpm typecheck failed claiming .select('tags') wasn't a valid field — a stale generated Nuxt Content collection type, not a real error.
    solution: pnpm exec nuxt prepare regenerates collection types from the current manifest; easy to forget mid-session after a schema edit that isn't a fresh pnpm install.
    severity: nit
