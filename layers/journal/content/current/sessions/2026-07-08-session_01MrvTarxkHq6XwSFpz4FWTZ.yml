learnings:
  - "CLAUDE.md's own Status section demonstrated the rot rule it states: its parenthetical example list of deferred things (including 'the autonomous jobs') went stale the day Routines went live — concrete example lists inside anti-duplication prose rot like any other copy."
  - list_triggers confirms Routine prompts for scheduled Skills are literally the slash command (e.g. /digest), so every Routine-fired session's entry Skill enters via prompt expansion — structurally invisible to Skill-tool-only derivation.
  - The kind enum had six coordinated homes (sessions schema, scratch validator, AuthoredScratch type, UI type, kindCounts, stat tile) plus SKILL.md guidance — matching the prior session's 'additive optional field' blast-radius learning.
ideas:
  - The session log records entrypoint remote_trigger but not WHICH Routine fired it; the trigger name/prompt lives only in the trigger system and could be worth surfacing in the Journal.
  - kind could eventually be cross-checked against derived signals (entrypoint remote_trigger implies autonomous; a merge_pull_request tool call on the session's own PR implies delegated) to flag misclassified logs.
