summary: "Diagnosed why the Routine-fired nightly digest run's log showed kind autonomous and entrypoint remote_trigger yet no digest entry in skillsUsed: the extractor derived skills only from Skill tool_use blocks, and a slash-command prompt (every Routine firing's shape) is expanded by the harness before the model runs, so no tool call exists. Extended extractTrace to scan user turns for command-name expansion tags, stitched with a provenance reason \"(invoked as a slash command)\", excluding tool_result blocks. Then, on request, widened the session kind enum with \"delegated\" — exactly one human prompt (the kickoff), hands-off from there — across schema, validator, types, kindCounts, dashboard tile, and SKILL.md guidance; harness-injected user turns don't count as human prompts. A domain-modeling pass then found ADR-0003's two-mode taxonomy and no-self-merge rule needed reconciling: amended ADR-0003 (kind is descriptive, not a merge permission), made CONTEXT.md's Session entry the single home of the kind definitions, and slimmed the schema comment and SKILL.md to pointers. Finally swept live docs for stale \"no autonomous jobs run today\" claims (the digest and frictions-to-fixes Routines have been live since 07-06/07-07): fixed CONTEXT.md's Codify entry, amended ADR-0010/0015, cut CLAUDE.md's rotted example list, and updated both Skills' SKILL.md + Inventory entries. Full gate green after each commit; all five commits ride PR 233."
