frictions:
  - description: Initially wrote the commit/PR provenance footer using a session id copied from an unrelated prior session's commit (seen in tool output while researching material), instead of resolving this session's own canonical id from the system-prompt commit-footer template — a direct instance of the rule CLAUDE.md itself warns against.
    solution: Caught it before merge by cross-checking CLAUDE_CODE_REMOTE_SESSION_ID (cse_… → session_…) against the commit-footer template in the system prompt; amended the tip commit and force-pushed the solo branch, and updated the PR body to match. A sharper guard would be to resolve and write down the session id as a first step, before any commit is drafted, rather than only checking it at commit time.
    severity: minor
  - description: A Midden-Tenant artifact's curatorial `continuityCheck` field quoted a draft blog post's alleged original title ("Take a Breath, Both of You") that didn't match that PR's git commit message title — required an extra GitHub API round-trip (fetching the actual file diff at that commit) to confirm the artifact's claim was in fact accurate (it was the post's frontmatter title, just not the commit message's).
    solution: No repo fix needed here — the artifact was correct — but it's a good illustration of why CLAUDE.md's "verify a subagent/doc-derived claim against a primary source" rule matters even for content that looks authoritative (a whole curated Tenant), and worth remembering that a commit message and a file's own frontmatter title can legitimately differ.
    severity: nit
  - description: The local shallow git clone misdated a file (session_019pNrz's log commit) as added on 07-15 by an unrelated commit, when the file's own content and the GitHub API both show it actually landed 07-13 — the exact shallow-clone-boundary trap CLAUDE.md's own working-conventions section warns about.
    solution: Recognized the symptom from CLAUDE.md's existing guidance and switched to the GitHub API (list_commits scoped to the file path) instead of trusting local git log for that file's true history — no repo fix needed, the guidance already exists and worked.
    severity: nit
