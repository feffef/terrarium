learnings:
  - The 14-char GH_TOKEN/GITHUB_TOKEN here are proxy-side references, not real GitHub tokens; the egress proxy swaps in real creds for curl's proxied request, so curl authenticates where a direct Node fetch cannot.
  - A PR appearing right after a push, authored under the owner's account via the Claude app, is NOT proof the platform auto-opens on push — the owner can open it from the Claude mobile UI. Don't infer an auto-open mechanism from timing + app-authorship alone (verified with the owner this session).
