summary: "Human-instructed: ran issue #288's fresh-session reproduction to tell reload-lag from a real allowlist bug. Exercised send_later + delete_trigger (both correctly allowlisted) and, as control, two github tools. The session owner reported Android-app observations live: both Claude_Code_Remote calls prompted; both github calls (one NOT allowlisted) ran silently. Conclusion is explanation (2) — a real bug: project .claude/settings.json allow-rules do not suppress MCP prompts for Claude_Code_Remote in the remote/Android session, while github is trusted by a separate platform mechanism. The Android dialog offers only Accept/Deny (no \"Don't ask again\"), so no ground-truth rule string is capturable. Posted findings to #288 and left it open; no repo fix exists."
