learnings:
  - "DEFINITIVE root cause of the #288 prompts: the cloud workspace is untrusted (hasTrustDialogAccepted:false in ~/.claude.json), so Claude Code DROPS ALL project .claude/settings.json permissions.allow entries at startup — verbatim in /tmp/claude-code.log. Not casing, not format, not a per-server MCP quirk."
  - CLAUDE_CODE_DEBUG=1 writes /tmp/claude-code.log with per-tool permissionDecisionMs (human-wait ms) and explicit 'Dropped N entries — workspace not yet trusted' lines — the machine-observable ground truth for 'did it prompt?' without asking the human. High permissionDecisionMs (seconds) = prompted; 0-1ms = auto-approved.
  - github MCP tools are platform-auto-approved in cloud sessions (permissionDecisionMs 0-1 even for non-allowlisted tools); Claude_Code_Remote has no such backstop, so dropping its allow entry makes it prompt.
  - Workspace trust is evaluated ONLY at startup; editing ~/.claude.json mid-session does not re-enable dropped allow-rules (confirmed — CCR still prompted after the edit). And ~/.claude.json is ephemeral, so the durable fix is platform-default-trust or a pre-launch env setup script, not a repo file.
  - The /context panel is the ground-truth registry of what is an MCP server (both github and Claude_Code_Remote are MCP), disproving a research agent's 'github is built-in, not MCP' inference — verify subagent doc claims against local ground truth before publishing.
  - Byte-comparing (od -tx1 / cmp) the allow entry against the working tool id proved them identical pure-ASCII — ruling out a hidden-character/normalization mismatch that eyeballing cannot.
  - In an ephemeral remote container, only repo-committed or Anthropic-server-side (managed/org) config is durable; a hand-written ~/.claude/settings.json evaporates and a SessionStart hook that writes it likely lands after permission load.
