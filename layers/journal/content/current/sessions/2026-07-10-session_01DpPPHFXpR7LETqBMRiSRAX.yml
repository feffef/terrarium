summary: "Human-instructed: ran issue #288's fresh-session reproduction to tell reload-lag from a real allowlist bug. Exercised send_later + delete_trigger (both correctly allowlisted) and, as control, two github tools. The session owner reported Android-app observations live: both Claude_Code_Remote calls prompted; both github calls (one NOT allowlisted) ran silently. Posted first findings, then the owner pushed back (user-level settings are ephemeral; had I actually web-researched?). I had not — so I ran the Claude-Code guide agent against official docs. I posted a doc-backed correction claiming github is built-in (not MCP) — but the owner's /context panel showed BOTH github and Claude_Code_Remote registered as MCP servers, disproving it. Posted a third, retraction comment with the corrected diagnosis: both are MCP, the github control is valid, and the differentiator is a per-server auto-trust applied to github but not Claude_Code_Remote. Net: #287's casing fix is inert here; likely a platform per-server-trust limitation/bug, no repo-side fix. Left #288 open, recommending an Anthropic /feedback report. No edit-comment tool exists, so the wrong comment was superseded by a retraction rather than edited in place."
