frictions:
  - description: The agent cannot observe the client-side permission dialog, so a "does it prompt?" test needs a human on the app to report each outcome.
    solution: Expose live permission-decision events to the session transcript, or a self-introspect of effective permission state, so prompt/no-prompt is machine-observable.
    severity: moderate
  - description: I posted a confident diagnosis before doing any web research; the owner had to prod me to actually check docs, which then corrected the framing (github is built-in, not MCP).
    solution: For behavior-of-the-harness questions, research authoritative docs BEFORE posting a conclusion, not after being challenged.
    severity: moderate
  - description: "Project .claude/settings.json permissions.allow is inert for MCP tools in the remote session; #287's correctly-cased entries still prompt for Claude_Code_Remote."
    solution: Fix at environment/client level — trust the Claude_Code_Remote server like github, or require MCP allow-rules in user-level/managed settings; document which the env honors.
    severity: minor
  - description: Android permission dialog has no "Don't ask again"/"Always allow", so the client can never persist an allow decision and every session re-prompts.
    solution: Add a persist-allow affordance to the app's MCP permission dialog.
    severity: minor
