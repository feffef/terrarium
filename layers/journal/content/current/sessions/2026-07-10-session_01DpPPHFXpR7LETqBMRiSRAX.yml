summary: "Human-instructed: ran issue #288's fresh-session reproduction to tell reload-lag from a real allowlist bug. Exercised send_later + delete_trigger (both correctly allowlisted) and, as control, two github tools. The session owner reported Android-app observations live: both Claude_Code_Remote calls prompted; both github calls (one NOT allowlisted) ran silently. Posted first findings, then the owner pushed back (user-level settings are ephemeral; had I actually web-researched?). I had not — so I ran the Claude-Code guide agent against official docs. Doc-backed correction: github tools are likely built-in cloud tools (not MCP), so the control was invalid; project allow-rules for MCP appear gated on workspace-trust unavailable in an ephemeral container. Net: #287's casing fix is inert here; likely a platform limitation/bug, no repo-side fix. Posted a correction comment and left #288 open, recommending an Anthropic /feedback report."
