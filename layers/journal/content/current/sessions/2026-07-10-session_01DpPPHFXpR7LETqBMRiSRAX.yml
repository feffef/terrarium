learnings:
  - "The /context panel is the ground-truth registry of what is an MCP server: it listed BOTH github and Claude_Code_Remote under MCP Tools, disproving the research agent's 'github is built-in, not MCP' inference."
  - In this cloud session the github MCP server is auto-trusted (silent even for non-allowlisted tools) while Claude_Code_Remote is not (prompts even when allowlisted) — a per-server trust difference, not casing/format and not the project allowlist.
  - Project-scoped .claude/settings.json allow-rules for a user-added MCP server appear inert in ephemeral cloud sessions; no documented repo-side lever reliably fixes it.
  - Byte-comparing (od -tx1 / cmp) the allow entry against the working tool id proved them identical pure-ASCII (underscores 0x5f, correct casing) — definitively ruling out a hidden-character/normalization mismatch, which eyeballing cannot.
  - In an ephemeral remote container, only repo-committed or Anthropic-server-side (managed/org) config is durable; a hand-written ~/.claude/settings.json evaporates and a SessionStart hook that writes it likely lands after permission load.
