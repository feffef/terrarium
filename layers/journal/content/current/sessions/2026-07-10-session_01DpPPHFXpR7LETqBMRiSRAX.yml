learnings:
  - Claude Code on the web's github tools are built-in cloud tools (GitHub-proxy auth), not a user MCP server — so they bypass MCP permission rules entirely; a non-allowlisted github tool running silently is NOT evidence the allowlist works.
  - Project-scoped .claude/settings.json allow-rules for user-added MCP servers appear inert in ephemeral cloud sessions (workspace-trust gated per docs); no documented repo-side lever reliably fixes it.
  - In an ephemeral remote container, only repo-committed or Anthropic-server-side (managed/org) config is durable; a hand-written ~/.claude/settings.json evaporates and a SessionStart hook that writes it likely lands after permission load.
