frictions:
  - description: Carried a structural bug across several turns describing Midden's sites/exhibits as separately-named routable collections, violating ADR-0006 (only pages routes); a brainstorming agent (Fable) caught it independently, not me.
    solution: Check any new Tenant/Collection proposal against ADR-0006's pages-only routing constraint at the moment it's proposed, not on a later fan-out pass.
    severity: moderate
  - description: Wayfinder's grilling/prototype ticket types are explicitly HITL, but I resolved them via a 3-agent panel per explicit user delegation; the skill has no named ticket type for this substitution pattern.
    solution: A future skill revision could add a named type (e.g. panel) for explicit human-delegates-to-agent-panel resolution, rather than relabeling HITL types with a disclosure note each time.
    severity: minor
  - description: A search_issues query and an issue_read get_sub_issues call both overflowed the tool-result token limit and needed redirecting to a saved file plus a Python slice to extract just number/state/title.
    solution: Already documented in docs/agents/issue-tracker.md; just budget for it up front on any GitHub verification call over a handful of issues.
    severity: minor
  - description: Momentarily read the system prompt's 'never include the model identifier in repo artifacts' rule as contradicting ADR-0017's footer requirement, before noticing they refer to two different strings (raw model ID vs. display name).
    solution: None needed beyond careful re-reading; noting it in case the two instructions read as contradictory to a future session too.
    severity: nit
