  - description: CI gate went red on a docs-only PR, which read as a real regression and forced a full local gate re-run to disprove.
    solution: Owner clarified CI doesn't currently run (known billing issue); a red 'gate' check on this repo is environmental right now, not a code signal.
    severity: minor
  - description: "PR #326's body said \"Resolve #213\", a GitHub closing keyword, so merging it auto-closed the still-open governance issue #213."
    solution: "Reopened #213 with an explaining comment; never use close/fix/resolve keywords for a tracking issue a PR only references."
    severity: moderate
  - description: Provenance footer was not auto-injected into the cloud `git commit -m`, contra the usual harness behaviour.
    solution: Amended the two ADR-0017 footer lines in via `git commit --amend -F`; matches the CLAUDE.md caveat.
    severity: nit
  - description: get_job_logs download URL 404'd immediately (expired SAS token) and the check-run output was empty, so the failing CI step couldn't be read.
    solution: Fell back to reproducing the gate locally, which is the reliable primary source anyway.
    severity: nit
