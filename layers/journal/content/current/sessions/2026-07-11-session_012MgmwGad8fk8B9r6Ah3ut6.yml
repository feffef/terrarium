summary: "Human-instructed: critically review the repo, GitHub, and ADR/skill workflow for everything blocking public read access, using an Opus background security agent (full tree + all 92 commits) and a Sonnet research pass over primary GitHub Docs. Findings: no secret/credential blocker — tree and history clean. Real items: deploy/README infra disclosure (co-located sibling project + operator account), personal email in ~21 commits, missing LICENSE/SECURITY.md, and the single-trusted-human governance / prompt-injection gap (#213) plus merge-to-main RCE via the ADR-0011 deploy container. Agent-initiated low-risk fixes: genericized deploy/README, added SECURITY.md, two research docs — merged as PR #326. Then, on explicit owner requests: added the MIT LICENSE and drafted ADR-0019 (requester trust tiers, Status Proposed) refining #213 to a write-access-vs-read-only-public boundary — opened as gated PR #329. Owner then accepted ADR-0019 and asked for the write-vs-owner reasoning plus the audit-docs-style amendments; applied them single-homed in ADR-0019 with CONTEXT.md (glossary terms + Agent Authorship), ADR-0003, ADR-0004, CLAUDE.md, and issue-tracker.md all pointing to it, and resynced PR #329's description. Also reopened #213, which PR #326's body had auto-closed via a stray \"Resolve #213\" keyword."
