frictions:
  - description: AskUserQuestion failed (permission stream closed), so the owner's LICENSE/email/governance decisions couldn't be collected interactively.
    solution: Proceeded with only the clearly-beneficial, non-opinionated subset and documented the open decisions for the owner instead of guessing.
