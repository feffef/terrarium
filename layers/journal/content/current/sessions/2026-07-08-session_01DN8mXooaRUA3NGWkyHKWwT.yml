frictions:
  - description: "This session is a scheduled routine — the point is unattended operation — but it stalled for roughly two hours waiting on PR #234's CI completion, needing the human to manually nudge it twice (\"still waiting? why didn't complete this autonomously\" / \"the whole point of routines is that I shouldn't have to\"). Root cause: CI success is never delivered via the github-webhook-activity subscription (only failures, review comments, and merge/close are pushed), so it must be actively polled. This session repeatedly called ScheduleWakeup({stop: true}) intending it to \"wait\", but that tool is scoped to /loop dynamic-mode pacing and is a no-op outside it — it scheduled nothing, so nothing resumed the session on its own."
    solution: docs/agents/issue-tracker.md already flags the CI-success-has-no-webhook gap and says to poll get_check_runs yourself (e.g. send_later a wake) — but doesn't warn against the ScheduleWakeup mistake specifically. Add a note there or in CLAUDE.md that ScheduleWakeup is /loop-dynamic-mode-only and a no-op elsewhere; the correct tool for a routine to schedule a genuine self-check-in on non-webhook-delivered state (like CI success) is mcp__claude-code-remote__send_later.
    severity: major
  - description: Two worktree-isolated Sonnet impl agents dispatched by this session each invoked close-session/log-session under the SAME parent session id, and each wrote to the same shared scratch path — the second subagent's log silently clobbered the first's, entirely omitting the orchestrating session's own work (survey, issue filing, review, merge) until this final re-author overwrote it with the full picture.
    solution: Document that a dispatched subagent's own close-session/log-session invocation is redundant and risks clobbering when it shares the parent session's id — either the orchestrator should be the sole author of the session log (briefing dispatched impl agents not to self-invoke close-session), or the scratch path/session id needs to be worktree/subagent-scoped so parallel logs don't collide.
    severity: moderate
  - description: The frictions-to-fixes skill's own step 1 instructions say to run "tsx scripts/session-frictions.ts", but tsx isn't directly on PATH — the survey subagent had to discover "pnpm exec tsx ..." works instead.
    solution: Update the frictions-to-fixes SKILL.md's step 1 instructions to say "pnpm exec tsx scripts/session-frictions.ts".
    severity: minor
  - description: scripts/merged-since.ts silently returned an empty array when run against a stale local origin/main ref (before an explicit git fetch forced it forward) — indistinguishable from a genuine "no commits landed" result, with no warning the local ref was stale.
    solution: Add a freshness check/warning inside merged-since.ts, or always fetch before reading, so a stale ref produces a visible warning instead of a silently-empty, misleading result.
    severity: moderate
  - description: mcp__github__search_issues with a broad, unquoted two-word query hit a 93KB token-limit error; the quoted retry avoided the size problem but fuzzy term matching still surfaced loosely-relevant, noisy matches.
    solution: Doc note in docs/agents/issue-tracker.md that GitHub issue search does fuzzy matching even on quoted multi-term queries, so results still need eyeballing for relevance.
    severity: nit
