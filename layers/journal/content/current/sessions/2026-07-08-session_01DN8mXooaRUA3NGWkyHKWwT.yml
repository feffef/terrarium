learnings:
  - The github-webhook-activity PR subscription delivers CI failures, review comments, and merge/close — but never CI success. Babysitting a PR through a full gate requires actively re-polling get_check_runs; there's no passive wake on green.
  - ScheduleWakeup is exclusively the /loop-dynamic-mode pacing primitive. In a plain or routine session it just cancels/no-ops. send_later is the correct tool for a genuine self-check-in outside /loop.
