frictions:
  - description: >-
      Adding the layer page tipped vue-tsc's whole-program inference and surfaced a
      latent type hole in the isolation-critical catch-all (fields() param), which
      passed on HEAD. Cost ~5 probe pages to bisect.
    solution: >-
      Fixed at source (Record<string,unknown> → object, type-only) rather than
      contorting the new page; the catch-all was on a knife's edge and is now robust.
    severity: moderate
  - description: >-
      A layer-internal shared type module needs ugly relative imports
      (../../../../types/journal) because ~/@ aliases resolve to the main app, not
      the layer.
    solution: A per-layer path alias, or documenting the relative-import convention for Tenant layers.
    severity: minor
  - description: >-
      Told the user "no PR opened yet" when PR #19 had been auto-created on the
      first branch push; they corrected me. Wasted a round.
    solution: After the first push, check for an auto-created PR before claiming none exists.
    severity: minor
  - description: >-
      git commit --amend was blocked by the auto-mode classifier (rewriting a pushed
      commit); fell back to a follow-up commit — arguably the safer outcome.
    solution: Prefer follow-up commits over amending already-pushed history; the block was reasonable.
    severity: nit
  - description: >-
      Cross-scope CSS token sharing relied on custom properties inheriting through
      the DOM into scoped child components — works, but needed care and a render check.
    solution: A documented note that --jd-* tokens on the layer wrapper inherit into scoped children.
    severity: nit
  - description: >-
      Cold container had no deps; pnpm install had to run before the safety gate.
      Recurring across sessions.
    solution: A SessionStart hook that pre-installs deps (the session-start-hook Skill exists for this).
    severity: nit
  - description: >-
      The log-session Skill is user-invocation-only (disable-model-invocation), so I
      followed SKILL.md manually to author this entry. Logged in prior sessions too.
    solution: Add a "invoked manually — follow these steps" note to the Skill body.
    severity: nit
  - description: startedAt/endedAt are hand-estimated — no exact session clock when authoring by hand.
    solution: The deferred autonomous end-of-session trigger, or a readable live clock.
    severity: nit
  - description: >-
      A docsRead path containing [brackets] (the catch-all route file) broke the
      inline flow-map YAML until quoted — the helper only reported it on dry-run.
    solution: Quote path values, or note the bracket-quoting gotcha in the log-session Skill.
    severity: nit
