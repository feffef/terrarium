frictions:
  - description: "The survey subagent misclassified a friction as a fresh \"regression\" (list_issues overflow) when it was actually already fully tracked and fixed by a prior run's issue #654 covering that exact session — would have filed a duplicate issue if trusted as-is."
    solution: Always independently re-verify a subagent's "regression"/"never fixed" classification with a targeted tracker search before filing or escalating, not just trust the survey report — this is exactly why CLAUDE.md requires verifying subagent claims against a primary source before asserting them.
    severity: moderate
  - description: First issue_write call for the regression issue used a fabricated-looking session id instead of resolving it from context, caught immediately by the github-footer-guard PreToolUse hook.
    solution: Resolve the session id from the actual commit-footer template at the moment of writing, never reconstruct or guess one — the guard worked exactly as designed here.
    severity: moderate
  - description: The dispatched worktree-isolated impl agent stalled twice, ending its turn while "waiting" on its own backgrounded pnpm gate:scoped run with no concrete completion check (log tail / Monitor) — needed resuming twice via SendMessage, and I ultimately finished the commit/push/PR-open steps myself directly rather than round-tripping a third time.
    solution: "Brief a worktree-isolated impl agent with an explicit, concrete way to confirm a backgrounded command finished (a log-file marker to grep, or the Monitor tool) rather than \"run it and wait\" — issue #602 already tracks this class of failure; this run is fresh evidence it's still live and worth weighing for a stronger fix."
    severity: moderate
  - description: "Tried to poll PR #668's CI status from a Monitor shell command via curl against the GitHub API, guessing a token file path that doesn't exist in this environment — no gh binary and no exposed token for direct API calls here."
    solution: For orchestrator-side PR/CI status polling, use the mcp__github__pull_request_read MCP tool on a ScheduleWakeup cadence instead of scripting a raw curl/gh call in a Monitor/Bash command.
    severity: minor
  - description: cd-ing into the dispatched agent's worktree to inspect it (twice) left that cwd sitting across later Bash calls, triggering two spurious Stop-hook "uncommitted changes" warnings that needed re-verifying at the true repo root each time.
    solution: Already documented in CLAUDE.md (cd back to repo root, or use absolute-path-prefixed one-off commands) — just noting this cost recurred again this run.
    severity: nit
