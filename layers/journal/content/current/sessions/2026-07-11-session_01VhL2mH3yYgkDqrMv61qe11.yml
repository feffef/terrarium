learnings:
  - In a shallow clone a grafted parentless boundary commit makes `git log --name-only` list every file in the tree as added (diff vs the empty tree) — that empty-tree diff, not anything about the commit's real content, is what makes audit-skills attribute it as an edit to every Skill (#292).
ideas:
  - 'Single-home a "skip parentless commits" guard in a shared git helper and use it from every git-log-based script (audit-skills, session-trace, recent-prs). The repo runs in shallow clones, so the boundary-commit false-positive #292 hit can silently bite any of them; fixing it once prevents a class of bugs rather than just the one instance.'
