frictions:
  - description: >-
      A stop hook fired every single turn warning that already-merged main
      commits (incl. GitHub's merge-bot) were "unverified", urging a rebase of
      merged history.
    solution: >-
      Scope the check to unpushed local commits only; never flag merge-bot or
      already-on-origin commits — following its advice would rewrite merged
      history destructively.
    severity: minor
  - description: >-
      log-session's "most recent Claude-Session trailer in git log" heuristic
      returned a DIFFERENT session's id, because other sessions committed logs
      and blog content to main meanwhile.
    solution: >-
      Grep git log for commits carrying THIS session's trailer instead of taking
      the latest; or pass the id explicitly. Used the grep workaround.
    severity: minor
  - description: >-
      Merging #54/#61 before the typecheck-coverage PR (#55) let a latent
      auto-import-shadowing bug (`v-if="frictionCount"`) reach main; only the
      still-unmerged #81 fixes it.
    solution: >-
      Sequence coverage-expanding gate work before the refactors it protects, or
      accept the window and track it — main carries a known type-latent (runtime-
      harmless) defect until #81 lands.
    severity: moderate
  - description: >-
      Subagent worktrees have no node_modules, so each of ~9 parallel agents ran
      `pnpm install` before the gate — repeated multi-second setup and token
      cost across the fan-out.
    solution: >-
      Share/symlink a node_modules store into worktrees, or pre-warm it, so
      isolated agents don't each reinstall 985 packages.
    severity: minor
  - description: >-
      The gate CI workflow emits no completion event, so I polled check_runs and
      used sleep timers to wait for green before each merge — extra round-trips
      per PR.
    solution: >-
      A push/webhook signal on gate completion would remove the polling; for now
      background-sleep + re-poll is the workaround.
    severity: minor
  - description: >-
      PRs branched before sibling merges (#81, #82, #88) conflicted on shared
      files (index.vue, CLAUDE.md, log-session, nuxt.config.ts) and each needed a
      dedicated rebase pass.
    solution: >-
      Inherent to parallel PRs touching the same files; sequencing same-file
      issues (as I did for #54→#61) avoids it, but cross-file overlap still bit.
    severity: minor
  - description: >-
      #82's first pass inlined ~40 lines of schema-evolution policy prose in the
      manifests; the maintainer wanted it in an ADR, forcing a second relocation
      round.
    solution: >-
      Anticipate #62's single-homing rule up front — put policy in one ADR home
      with one-line pointers inline from the start.
    severity: nit
  - description: >-
      Several subagents ran `git checkout -b` in the shared checkout before
      moving into their assigned worktree, leaving stray branch pointers I had to
      reset.
    solution: >-
      Have the worktree agent create its branch inside the worktree from the
      first command; don't touch the shared checkout.
    severity: nit
  - description: >-
      The first `pnpm lint` on integrated main reported "4 problems" because it
      raced a concurrent gen/gate:drift regenerating files; a clean re-run
      passed. Briefly misleading.
    solution: >-
      Run gate steps sequentially, not batched with regeneration, when
      confirming a clean tree.
    severity: nit
  - description: >-
      startedAt is a hand estimate — there is still no exact session-start
      capture for interactive sessions (deferred to the future autonomous
      trigger).
    solution: >-
      The deferred end-of-session trigger should stamp real start/end; until then
      startedAt is approximate.
    severity: nit
