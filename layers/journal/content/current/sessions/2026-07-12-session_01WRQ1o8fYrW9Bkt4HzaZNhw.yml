summary: "Human asked to read the recent issue about auto-merge vs. main branch protection, then invoke /research to find the best GitHub configuration to let session-log commits land direct-to-main while keeping a protected branch rule (so repo auto-merge keeps working). Found issue #348 (removing main's branch protection to unblock session-log pushes broke repo auto-merge, regressing #231). Dispatched a background research agent against GitHub's live docs; the first dispatch silently no-op'd (returned a plan description, wrote nothing), caught by verifying the file didn't exist, then relaunched with explicit anti-delegation instructions and it succeeded. Wrote docs/research/github-branch-protection-vs-autonomous-log-commits.md, citing GitHub's official docs. Key finding: a repository ruleset's bypass list is the right primitive, but can only target a role/team/App, not a specific script — since the session-log push currently authenticates as the repo owner's own personal credential (no bot identity yet, deferred to #124), the only usable bypass (\"Repository admin\") can't be scoped narrower than \"the owner,\" so it also permits the owner's own manual direct pushes to main. Committed the note and opened gated PR #351 (research-only, no code/ADR/governance files touched), all agent-initiated once the human gave the initial research directive. Subscribed to PR activity."
