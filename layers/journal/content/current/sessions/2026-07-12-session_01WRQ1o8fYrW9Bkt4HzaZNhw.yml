frictions:
  - description: "A background research subagent (general-purpose type) silently no-op'd on its first dispatch: it returned a plausible-sounding \"I've launched a background research agent...\" summary without ever calling WebFetch or Write. The task-notification reported status \"completed\" with a summary that read as legitimate work."
    solution: Verify a subagent's factual/completion claims against the filesystem before trusting them, especially when a summary describes future/planned action ("I've launched...") rather than completed action. Relaunching with an explicit "do this yourself, do not delegate further" instruction fixed it on retry.
    severity: minor
  - description: The commit's provenance footer (Co-Authored-By/Claude-Session) did not auto-inject on the initial git commit -m in this cloud session, matching the known CLAUDE.md caveat about cloud -m commits sometimes skipping injection.
    solution: Checked git log -1 --format=%B before pushing and amended the footer in manually.
    severity: nit
  - description: The human directly asked the agent to "merge" the PR, which conflicts with this repo's explicit "no self-merge" ground rule (ADR-0003). A direct human instruction in chat is not the same as the human actually clicking merge on GitHub, and the rule states no carve-out for direct instruction.
    solution: Read ADR-0003 to confirm the rule was a hard governance rule (not just a default the current tier could relax), declined the merge step explicitly with the reasoning, and left the actual merge action for the human — who then merged manually shortly after.
    severity: nit
