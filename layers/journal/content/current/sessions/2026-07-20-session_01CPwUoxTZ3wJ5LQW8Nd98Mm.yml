frictions:
  - description: "Asserted the #612 impl subagent was 'still running' across several turns from memory; only verified git/worktree state when the owner asked."
    solution: Verify subagent liveness (branch pushed? PR open? worktree present?) before reporting its state as fact.
    severity: moderate
  - description: "Raised a resumed-session session-id concern in the #616 review before checking it; an env-var check disproved it, forcing a walk-back."
    solution: Extend 'verify a behavioral claim against a primary source before publishing' to review and chat claims, not just external posts.
    severity: moderate
  - description: "A `git worktree list` snapshot did not show the #612 agent's live worktree at one check, wrongly suggesting it had aborted."
    solution: Worktree listing can lag a running mechanism-2 agent; corroborate with the agent itself before concluding it aborted.
    severity: minor
  - description: The 'permission stream closed' transient error hit AskUserQuestion (x2), send_later (x2) and subscribe_pr_activity (x1) in one session.
    solution: "Handled via documented fallbacks (issue #229/#359): plain-text questions, ScheduleWakeup, retry-once. Notable only for its frequency."
    severity: minor
  - description: "Relayed from the #612 impl agent: a `git reset --hard HEAD~1` discarded uncommitted edits to 5 tracked files mid-run (recovered)."
    solution: CLAUDE.md's pkill/reset guidance does not warn about `reset --hard` with uncommitted work — a candidate doc addition.
    severity: minor
