  - description: Asserted "no more findings outside the midden" from a shallow clone truncated at 2026-07-23, before the 07-16→07-22 window was even visible.
    solution: For any "search all history since <date>" claim, check `git rev-parse --is-shallow-repository` / earliest reachable commit and `--unshallow` FIRST — the CLAUDE.md shallow-clone caveat applies to completeness claims, not just history-rewrite diagnoses.
    severity: major
  - description: A backgrounded `pnpm gate:scoped` was silently killed mid-unit-tests (no exit marker, process gone), so build/e2e never ran and it needed re-running.
    solution: Don't rely on a long backgrounded gate surviving across turns; run it foreground with a generous timeout when the result gates the next step.
    severity: minor
