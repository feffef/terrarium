frictions:
  - description: The harness skipped the provenance footer on both `git commit -m` commits (the documented cloud -m behaviour), leaving them without Co-Authored-By.
    solution: Reset to origin/main and re-committed via `git commit -F` with the footer appended by hand; verified with git log before pushing.
    severity: minor
  - description: A backgrounded `pnpm gate:scoped 2>&1 | tail -40` left an empty output file — the piped tail output was lost, so the gate result was unreadable.
    solution: Re-ran the gate steps in the foreground to confirm green; a backgrounded command whose output matters should redirect to a file, not pipe to tail.
    severity: minor
  - description: A `sleep 60 && tail` used to poll a background job was blocked by the harness, costing a round-trip to rediscover the wait pattern.
    solution: Wait on the completion notification, or use Monitor with an until-loop.
    severity: nit
