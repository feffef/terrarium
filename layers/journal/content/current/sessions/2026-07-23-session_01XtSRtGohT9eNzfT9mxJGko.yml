  - description: mcp__github__enable_pr_auto_merge threw a misleading "required checks are failing" error while the gate check was merely in_progress, not actually failed.
    solution: docs/agents/pr-workflow.md already documents this exact gotcha; confirmed real state via pull_request_read get_check_runs and merged directly once genuinely green instead of trusting the error text.
