  - description: First read of the deploy/README.md "repo is public" vs. two research docs' "before flipping to public" framing didn't immediately establish which side was stale.
    solution: 'Had to independently verify via a live search_repositories API call (visibility: public) and the 2026-07-11 journal digest ("the repo went public") before editing anything — confirms the fact-check-before-touch step is essential even when a contradiction looks self-evident from the doc text alone.'
    severity: minor
  - description: Called ScheduleWakeup with the /loop dynamic-mode sentinel to wait on background subagents, even though this session is a scheduled routine firing, not a /loop invocation — wrong tool for that wait.
    solution: Stopped the wakeup immediately and relied on the harness's automatic task-notification delivery for backgrounded Agent-tool calls instead, which is the correct mechanism and needs no manual scheduling.
    severity: nit
