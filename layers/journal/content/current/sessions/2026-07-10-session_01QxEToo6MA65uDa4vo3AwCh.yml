learnings:
  - A github-actions[bot] comment posted AFTER a live subscribe_pr_activity IS delivered as a github-webhook-activity wake event; CI-success is not — so a CI job can post a 'gate green' comment as a wake doorbell.
  - "Permission-rule matching is exact on the MCP server segment's casing and separators: Claude_Code_Remote != claude-code-remote, so a mis-cased allow entry silently no-ops and still prompts."
  - In this remote env both git push and the GitHub API can write .github/workflows files to a feature branch (no workflow-scope block observed); the human-only gate is at merge, not the branch write.
ideas:
  - "Split the GitHub docs by concern, not by substrate: issue-tracking (issue-tracker.md), outbound-PR lifecycle (a new pr-workflow.md), and a small shared MCP-substrate note — then collapse the self-merge landing recipe currently restated across frictions-to-fixes/audit-docs/audit-skills/digest into that single home."
