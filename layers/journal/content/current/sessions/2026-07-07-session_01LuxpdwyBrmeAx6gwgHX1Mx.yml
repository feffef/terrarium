learnings:
  - vitest positional filters are substring path matches, so `vitest run tests/unit` still selects layers/*/tests/unit/** — no script change needed.
  - A tenant e2e spec can share one build by exporting a register() function the platform spec calls inside its single setup()/describe, instead of being its own *.spec.ts.
