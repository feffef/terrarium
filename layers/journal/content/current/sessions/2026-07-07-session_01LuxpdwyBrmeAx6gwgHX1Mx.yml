frictions:
  - description: Stop-hook flagged 4 inherited origin/main merge commits as Unverified and urged amend/rebase, which would fork the branch from main.
    solution: Hook should exclude commits reachable from origin/main (git log origin/main..HEAD) so it only flags session-authored commits.
    severity: moderate
  - description: The e2e single-build constraint is invisible unless you know setup() builds per spec file and vitest isolates by file; naive per-tenant specs multiply CI's slowest step.
    solution: Recorded in ADR-0004 amendment plus a load-bearing comment in the smoke spec against "cleaning up" the register-module indirection.
    severity: minor
  - description: Honestly verifying the e2e test count needed two full builds because vitest list itself triggers setup()'s build (setup runs inside the describe callback).
    solution: Accept the two builds, or lift setup() to top-level so collection is build-free; no cheap static count exists today.
    severity: nit
