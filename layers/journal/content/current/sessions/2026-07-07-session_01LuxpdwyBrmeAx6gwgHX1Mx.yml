summary: "Tests were dumped flat into tests/unit and one e2e smoke spec. Homed each test with the code it exercises: tenant-specific unit tests moved into layers/<tenant>/tests/unit (atlas, blog, journal); platform tests stayed in tests/. The L2 e2e stays a SINGLE nuxt build — the cross-tenant entry-route sweep remains in tests/e2e/smoke.spec.ts and journal-specific assertions became a registerJournalE2E() module imported into that one describe, with shared helpers single-homed in tests/support/e2e.ts. Broadened vitest and tsconfig.node includes. Ran a domain-modeling ADR check first, then amended ADR-0004 (homing rule + single-build-e2e constraint), added tests/README.md, updated CLAUDE.md. Verified test-count parity rigorously (unit 172, e2e 23, identical before/after) since the user conditioned auto-merge on it."
