  - description: GitHub MCP tools resolve only by fully-qualified mcp__github__* names; bare names fail ToolSearch selection.
    solution: Already documented in issue-tracker.md (#122); recurred anyway. Consider surfacing the full-name rule earlier in the MCP hygiene note.
    severity: nit
  - description: The survey subagent's tsx parse output (31.6KB) overflowed the tool-result cap and had to be auto-persisted and re-read.
    solution: Recurring large-output friction; scripts should write compact/summarized output to a file by default rather than dumping to stdout.
    severity: nit
  - description: The Sonnet impl agent ran git checkout -B in the shared main checkout, not its worktree, because Bash cwd resets between calls.
    solution: Caught before any edit and restored. CLAUDE.md already warns worktree agents to pin their root; the briefs should show the explicit cd-to-worktree-root-first pattern.
    severity: minor
  - description: Could not query GitHub Actions gate status from bash (no gh CLI or token), so CI polling had to go through the GitHub MCP tool with a manual background-sleep timer.
    solution: A thin gate-status helper, or documenting the MCP-poll-plus-background-timer pattern, would smooth review-agent CI waits.
