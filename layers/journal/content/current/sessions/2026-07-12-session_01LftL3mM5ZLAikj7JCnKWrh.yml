learnings:
  - "Playwright's page.screenshot({ clip }) uses viewport-relative coordinates unless fullPage: true is also set — passing clip alone silently clips against the wrong origin on a scrolled/tall page."
  - To separate two graph edges between the same node pair with a perpendicular offset, the perpendicular must be measured from a canonical (pair-order-independent) direction, not each edge's own from→to — otherwise reversing the edge flips the perpendicular's sign right along with the offset's sign and the two cancel.
