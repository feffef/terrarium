frictions:
  - description: "Chased a false 'stale dev-server cache' theory for a real bug: a perpendicular offset meant to separate two parallel edges canceled out because it was measured from each edge's own from→to direction, which flips sign when the edge is reversed."
    solution: When a standalone reproduction of the logic agrees with expectations but the live app doesn't, add a runtime debug marker (render the computed value directly into the DOM) immediately rather than iterating cache-busting/rebuilds first.
    severity: moderate
  - description: Background Fable subagents twice left a 'nuxt dev' preview server running (once also a stray temp probe script) despite explicit teardown instructions, blocking my own screenshot attempts with 'Another Nuxt dev is already running' until manually stopped.
    solution: Make subagent cleanup non-optional — e.g. the Agent tool or a wrapper checks for stray dev-server locks/tmp scripts after a subagent reports done, rather than relying on the prompt alone.
    severity: minor
  - description: The container's node_modules was stale at session start (missing 'mermaid', drifted 'zod-to-json-schema'), breaking pnpm build/typecheck in a way that first looked like a bug in my own changes.
    solution: No repo change needed; noting that a fresh container's node_modules isn't guaranteed current until 'pnpm install' runs once.
    severity: minor
