frictions:
  - description: Wrote a hand-guessed session id into a commit's Claude-Session footer by pattern-matching an unrelated git-log line (another session's log commit) instead of resolving the real id from the commit-footer template already given in this session's own instructions — exactly the mistake CLAUDE.md explicitly warns against
    solution: "Self-caught before pushing (the amend happened pre-push, so nothing wrong landed on origin) by re-reading the actual footer template and env; still cost a wasted commit + amend cycle. Worth restating: resolve the session id from the system-prompt commit-footer template at the moment of writing, never from any git log output, even one that superficially looks like 'the current session'"
    severity: moderate
  - description: enable_pr_auto_merge errored with a misleading 'required checks are failing' message while the PR's only checks were one passed (label) and one still in_progress (gate) — no check had actually failed
    solution: docs/agents/pr-workflow.md already documents this false-positive for an already-green PR; this run hit the same misleading text while arming ahead of a still-pending check instead, which the doc doesn't explicitly cover. Confirmed via a direct get_check_runs call before treating it as real, per the doc's own advice — worth a small doc addition noting the error text is unreliable in the pending case too, not just the already-green case
    severity: minor
