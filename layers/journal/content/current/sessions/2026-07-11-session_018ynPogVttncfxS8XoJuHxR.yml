summary: "The user asked (human-instructed) to investigate a gate script that skips unit/e2e when only .md files outside layers/ change. I verified the premise against the tree: nothing in build, the unit suite, or e2e/L2 consumes a .md outside layers/, and the only two real-tree unit tests read config files, not docs. Designed an always-on cheap floor (verify:skills-lock catches the .agents/skills SKILL.md case) plus a fail-safe allowlist that skips test/build/test:e2e only when every changed path is inert, with local-vs-CI base-ref detection. Materialising this as a research doc and opening the gated PR was agent-initiated per repo policy; the gate change itself is deliberately NOT implemented — it is human-only to merge and net-new, needing an ADR-0003 green-light. pnpm gate ran green locally."
