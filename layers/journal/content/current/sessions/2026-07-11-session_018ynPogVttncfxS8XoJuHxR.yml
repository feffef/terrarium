summary: "The user asked (human-instructed) to investigate a gate script that skips unit/e2e when only .md files outside layers/ change. I verified the premise against the tree: nothing in build, the unit suite, or e2e/L2 consumes a .md outside layers/, and the two real-tree unit tests read config files, not docs. Designed an always-on cheap floor (verify:skills-lock covers the .agents/skills SKILL.md case) plus a fail-safe allowlist that skips test/build/test:e2e only when every changed path is inert, with local-vs-CI base-ref detection. I first (agent-initiated) captured this as a docs/research/ note and opened gated PR #339; the owner correctly pushed back that drafts/concepts for unimplemented work go in issues here, not committed docs on main. I moved the substance to issue #350 and closed PR #339 — nothing landed on main but the session log. The gate change itself remains unimplemented, pending an ADR-0003 green-light."
