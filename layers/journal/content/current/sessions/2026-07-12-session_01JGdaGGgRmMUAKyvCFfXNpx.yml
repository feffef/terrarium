learnings:
  - "The generated entryRoutes export in the #routing virtual module had no runtime consumer; e2e derives routes via entryRoutesFrom() directly — the homepage now consumes it, closing the redundancy."
  - entryRoutesFrom() sorts alphabetically while routingMap iteration follows manifest declaration order; unobservable today because the homepage's surviving list is one item, but it becomes visible if journal gains a third Space.
  - Vue's whitespace-condense inserts a text-node space before a v-if sibling regardless of its outcome, so extracting conditional inline markup byte-identically needs whole-block v-if/v-else, not an inner v-if.
ideas:
  - "A gate-enforced provenance check: a tiny CI step that fails any PR whose commits lack the ADR-0017 two-line footer, closing the cloud -m injection gap mechanically instead of by convention — the session-log commit path just gained the footer, so the check could now be universal."
