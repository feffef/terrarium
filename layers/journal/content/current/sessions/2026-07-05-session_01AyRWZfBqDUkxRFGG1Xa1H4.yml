summary: >-
  Implemented the sole open issue, #7: the log-session helper committed session
  logs directly to main via a throwaway index (ADR-0009) but left the authored
  .yml behind as an untracked file — a recurring papercut whose obvious "fix"
  (commit it to the feature branch) would route a log through a PR, exactly what
  ADR-0009 forbids. Took the issue's preferred option: after a successful push,
  rm the working-copy scratch file and print what it removed; never on
  --dry-run. Extracted a testable land() seam with an injectable push so both
  the cleanup and dry-run branches are unit tested without touching git. Added
  two tests, ran the full safety gate green, and verified the CLI end-to-end.
  Shipped as PR #8, merged.
