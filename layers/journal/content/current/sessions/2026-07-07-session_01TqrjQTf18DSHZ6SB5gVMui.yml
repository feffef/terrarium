learnings:
  - "'closure' is a 49x load-bearing term with no glossary entry, and it collides with JS lexical closure — so the glossary term must be qualified as 'Session closure'."
  - The existing Stop hook plays two distinct roles — the log committer vs. the proposed reminder/block — and conflating them muddies any design discussion until they're named apart.
  - extractTrace already computes worktree-agnostic 'acted' signals (filesEdited/prSignals/subagents) from the transcript; git-HEAD detection would false-negative on multi-worktree sessions whose commits land in separate worktrees.
ideas:
  - stop-hook-git-check.sh could filter out commits that are ancestors of origin/<base> so it stops re-flagging inherited public history on every Stop.
