summary: "Started answering a question about issue #215 (why interactive sessions forget `log-session` at closure), then ran a `/grill-with-docs` session to design the fix. Grilled down the tree: rejected the escalated Stop-hook reminder/block net in favour of a model-facing `close-session` Skill — a looser, earlier closure trigger that cascades into `log-session`, with skill-invocation stats as the success metric. Key redirects came from the owner (a Skill, not a hook) and domain-modeling (name after the ubiquitous term `closure`, qualified to `Session closure` to dodge the JS overload). Built the Skill, demoted `log-session` to a capability, amended ADR-0009 (not a new ADR), updated CLAUDE.md/CONTEXT.md/Skill Inventory. Full gate green; opened PR #220."
