frictions:
  - description: A newly-added Nuxt plugin under app/plugins/ registered in types but not at runtime across several production builds; window state showed it never ran.
    solution: Stale incremental .nuxt cache. `rm -rf .nuxt .output` before the build picked it up; a fresh nuxt prepare alone updated types but not the runtime plugin registry.
    severity: moderate
  - description: Prod builds strip console.log (terser), so plugin diagnostics via console were invisible and misled me into thinking the plugin errored.
    solution: Record state on a window global the Playwright probe can read instead of relying on console in a production build.
    severity: minor
  - description: definePageMeta({ key }) looked like the fix (component-reuse theory) but changed nothing; cost a rebuild before instrumentation disproved it.
    solution: Instrument the actual network/timeline before committing to a mechanism — the dump-fetch-after-nav timeline was the decisive evidence.
    severity: nit
