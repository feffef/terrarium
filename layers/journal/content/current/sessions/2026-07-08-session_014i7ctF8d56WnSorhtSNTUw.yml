learnings:
  - "@nuxt/content v3 client queries load the WASM engine + per-collection sql_dump.txt lazily on first query, after client navigation — the source of empty-on-nav content flashes."
  - "@nuxt/content caches decompressed dumps in localStorage (prod) keyed by checksum, so warming is paid once per client, not per navigation."
  - On client-side nav Nuxt commits the route and renders the page before useAsyncData's client query resolves, so a still-null result renders for a frame regardless.
ideas:
