summary: "Human-reported bug: following a link occasionally landed on a page with an empty component (the About section on /t/blog/David), fixed by a reload. I reproduced it in a production build by driving client-side navigations with Chromium and instrumenting the timeline, root-causing it to @nuxt/content v3 loading its client WASM SQLite engine and per-collection SQL dumps lazily over the network AFTER navigation — so queryCollection returns empty until the dump lands, and the page commits first. Fix (agent-chosen, on the user's implicit green-light to fix the reported bug): a client-only plugin warms every collection on idle after hydration, collapsing the empty window from ~80ms (unbounded on slow links) to one frame. Full gate green; PR #235 opened."
