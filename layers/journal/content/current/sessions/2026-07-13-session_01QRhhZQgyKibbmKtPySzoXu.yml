learnings:
  - "Phase A's regressionChecks before/after brackets can be identical across several Skills edited in the same commit (e.g. a docs-reconcile sweep touching 4 SKILL.md files at once) — a coarse friction-severity uptick in that shared bracket is then a property of whichever unrelated sessions happened to fall in it (this run: the Atlas Sprint 2 rework's own major friction), not evidence about any one Skill's edit. Worth remembering before spending Phase B effort on every flagged skill separately when several share identical brackets."
ideas:
  - Extend scripts/audit-skills.ts's regressionChecks to detect when a flagged edit is a small, identical, mechanical diff shared across multiple Skills' SKILL.md (e.g. by diff line count or by grouping edits with the same commit sha) and surface it as one collapsed low-priority entry instead of N separate full regression checks — this run had 4 of 7 regressionChecks resolve to the exact same 1-line `pnpm gate` -> `pnpm gate:scoped` fix.
  - "Filter built-in Claude Code CLI slash commands (/context, /model, and likely others) out of audit-skills.ts's skillsUsed extraction — they surface in the scorecard's skills array as onDisk:false, inventoried:false pseudo-Skills with real usedIn counts (this run: context x3, model x1), which reads as a missing-Skill signal but isn't one; they're not repo Skills at all."
