frictions:
  - description: A git reset --soft to a freshly-fetched origin/main (advanced 2 commits mid-session) staged reverts of concurrent commits to files I never touched.
    solution: Caught it via a stray audit-docs modification; recovered and rebased instead. CLAUDE.md's stale-origin/main warning applies to mid-session rebases, not just pre-diff — check before reset.
    severity: moderate
  - description: The provenance footer did not auto-inject on a cloud git commit -m; had to amend it in.
    solution: Known issue (CLAUDE.md) — verify the footer landed and amend when absent.
    severity: minor
  - description: "Branch/PR-split ambiguity: the owner thought the blog-content branch already existed, and the pinned branch name matched both possible PRs."
    solution: When a split is agreed, assign each PR its branch explicitly at that moment, not later.
    severity: minor
  - description: I mis-applied the single-home rule to pointers, briefly resisting a separate CONTEXT-MAP.md; the owner corrected that pointers are navigation, not duplication.
    solution: Single-home forbids duplicating substantive content only; references to the one home are fine everywhere.
    severity: nit
