learnings:
  - Single-home rule forbids duplicating substantive content, not pointers — references to the one home belong wherever they aid navigation.
  - "This repo's ADR boundary: ADRs record Platform architecture only; a demo Tenant's reason-to-exist is product and lives in its CONTEXT.md — the Journal is the exception because it is infrastructure (ADR-0008)."
  - The CI safety-gate webhook reports green on merge-preview SHAs that differ from your pushed branch commits — don't mistake them for unexpected commits.
ideas:
  - Add a cheap CI/lint check that fails when a newly-introduced line in a living doc uses a retired glossary term (sync/consolidate/codify/Spawn/'Journal entry'), so retirement is enforced at PR time instead of relying on the nightly audit-docs sweep to catch re-introductions.
