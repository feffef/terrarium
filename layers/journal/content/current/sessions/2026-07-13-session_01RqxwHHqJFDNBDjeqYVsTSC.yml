summary: "Human-instructed throughout. User reported agents not self-closing over 07-12/07-13; asked me to find un-logged commits and use /audit-skills to find the causing doc change. Found one in-window orphan (session_019pNrz, already #397) plus three pre-close-session historicals. Diagnosed the cause: self-improvement skills gated close-session behind \"PR merged\", so closure was lost when merge landed out-of-turn; digest was immune (#176). Opened PR #411, corrected #397. Then, in a /grill-with-docs session, the user and I reshaped the fix: each of the five skills now invokes close-session at PR-open and log-session (final status + frictions) at the very end — two different verbs so the final log isn't skipped as \"already closed.\" close-session became the single home for when a session is actually logged (commit on origin/main with final status) and for the HUMAN-PROMPTED-CLOSURE major friction keyword."
