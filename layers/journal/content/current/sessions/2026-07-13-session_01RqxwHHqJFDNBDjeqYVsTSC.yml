learnings:
  - "`close-session` appearing in a log's `skillsUsed` does NOT mean the session self-judged closure — a manually-prompted session lists it too; the closure regression is invisible to usage-rate and to the friction stream unless sessions log the manual nudge."
  - A shallow clone makes `git log --follow` on any file bottom out at the graft-boundary commit, which reads deceptively like a squash/re-root of history.
ideas:
  - Add an audit-skills / session-log check that flags 'manually-rescued closure' — a session whose close-session came only after a long wall-clock gap or a much-later commit (e.g. the orphan's ~20h span between last work commit and its log). That turns today's invisible manual-prompt regression into a measurable signal, the same way orphanedSessions caught the zero-log case.
