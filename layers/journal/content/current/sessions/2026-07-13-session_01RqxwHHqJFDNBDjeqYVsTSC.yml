frictions:
  - description: Shallow clone (108 commits, .git/shallow present) made every skill file's history appear to start at the graft boundary, which I first misread as a 07-12 history squash/re-root.
    solution: Check `git rev-parse --is-shallow-repository` / `.git/shallow` before concluding history was rewritten; `git fetch --deepen` to inspect real history. Corrected mid-session.
    severity: moderate
  - description: "My first #397 comment attributed the orphan to 'auto-merge armed'; the user corrected that auto-merge is disabled, and the orphan's landed log showed it merged manually — the cause is the ordering, not auto-merge."
    solution: "Verify a mechanism claim against the primary source before publishing externally (CLAUDE.md rule); posted a correction on #397 once the orphan's toolCounts were available."
    severity: moderate
  - description: "AskUserQuestion failed twice with 'Tool permission stream closed before response received' (known cloud limitation #288), so I couldn't confirm the next step interactively."
    solution: Fell back to a prose question, then to the charter-aligned default (record on the existing tracking issue) once the user said continue; retry-once didn't help here.
    severity: minor
  - description: A `node -e` orphan-scan one-liner broke on shell-mangled `\n` inside the inlined JS string.
    solution: Write non-trivial scripts to a file and run them, rather than inlining multi-line JS in `node -e` through bash.
    severity: nit
