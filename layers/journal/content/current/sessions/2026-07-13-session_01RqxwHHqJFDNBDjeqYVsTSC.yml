learnings:
  - Model-based skill invocation fires only off the frontmatter `description` (the body isn't visible pre-invocation); close-session's ambient 'am I wrapping up?' trigger reads as 'I'm waiting' mid-run, which is why an in-body explicit invoke in the running skill is the reliable path.
  - "log-session's own doc settles close-vs-log: close-session is the front door for the initial log; log-session direct is only for *updating* an already-authored log — which makes the PR-open (close-session) / finalize (log-session) split the doc-sanctioned design, not a hack."
  - "`close-session` in a log's `skillsUsed` does NOT mean the session self-judged closure — a manually-prompted session lists it too; the regression is invisible to usage-rate and to the friction stream unless the nudge is logged (now forced via HUMAN-PROMPTED-CLOSURE)."
  - A shallow clone makes `git log --follow` on any file bottom out at the graft-boundary commit, which reads deceptively like a squash/re-root of history.
ideas:
  - The HUMAN-PROMPTED-CLOSURE friction keyword now exists (this PR); the remaining half is an audit-skills grep check that counts it — plus 'manually-rescued closure' (close-session landing long after the last work commit, e.g. the orphan's ~20h gap) — turning the manual-nudge regression into a tracked signal like orphanedSessions.
