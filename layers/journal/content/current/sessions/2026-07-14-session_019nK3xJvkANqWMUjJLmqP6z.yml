frictions:
  - description: Almost put the wrong session id in the commit provenance footer — copied session_01YV8CUydPdRtn6o1fTGZegg from the issue body's "Sources:" list (a prior session's id) instead of resolving this session's own id from the system-prompt commit-footer template, exactly the mistake CLAUDE.md's "never predict or reconstruct an identifier" rule warns against. Caught before pushing by re-reading the system prompt's own example footer and amending both commits.
    solution: No new doc needed — the rule already exists in CLAUDE.md and is correct; the near-miss was momentary carelessness triggered by a superficially plausible-looking session URL sitting right in the issue body. Worth a beat of extra suspicion any time a session id is sourced from fetched content rather than the system prompt itself.
    severity: moderate
  - description: "`git commit --amend --no-edit --reset-author` (the Stop hook's own suggested Unverified-commit remedy) did not actually produce a signed commit — /home/claude/.ssh/commit_signing_key.pub is empty (0 bytes) in this environment despite commit.gpgsign=true, so `git commit -S` silently produces \"No signature\" for every commit made via the local git CLI this session, regardless of author email correctness (which was already right)."
    solution: "Environment-level provisioning gap, not a repo-level fix — same class of issue as the already-documented hasTrustDialogAccepted caveat (CLAUDE.md, #288). Worth a follow-up issue analogous to #288 documenting that Stop-hook-suggested amend/reset-author remedy doesn't fix Unverified when the signing key itself is unprovisioned, so a future session doesn't re-chase it as if it were fixable from inside the repo."
    severity: minor
