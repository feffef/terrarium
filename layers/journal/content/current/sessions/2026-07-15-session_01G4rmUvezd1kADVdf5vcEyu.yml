summary: "Owner-directed throughout. Diagnosed why ADR-0019's @nuxt/content patch doesn't fix #236's browser symptom: it only recovers loads that REJECT; funnels that RESOLVE broken (swallowed db.exec → marked \"loaded\") or cache a corrupt dump to localStorage before validation survive it. Ruled out the brief's useAsyncData- cache hypothesis against Nuxt 4.4.8 source. First built a hardened patch + a <dialog> error modal with a retry button; the owner then clarified they wanted the patch GONE, not hardened. Reversed: removed the patch entirely (deleted patches/ + pnpm-workspace.yaml, restored stock @nuxt/content), dropped the now-unreliable retry button (app code can't clear @nuxt/content's poisoned state — reload is the only recovery, via SSR/server DB), amended ADR-0019 to Superseded. Modal = message + technical-details + Reload. Opened PR #514 (owner asked), subscribed, full gate green with stock deps (build + 45 e2e)."
