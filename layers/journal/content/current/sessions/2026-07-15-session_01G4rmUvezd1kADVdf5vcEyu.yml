learnings:
  - "Nuxt 4.4.8: purgeCachedData & granularCachedData default true; default getCachedData returns static.data[key] (empty for runtime-SSR), so re-navigation re-runs the useAsyncData handler and does not serve a cached null."
  - "@nuxt/content writes a fetched sql_dump to localStorage BEFORE decompress/apply, so a corrupt 200 body is pinned under the valid checksum and poisons reloads too — not just in-memory state."
  - "@nuxt/content swallows per-command db.exec errors during dump apply, then marks the collection loaded — a resolved-but-empty load the finally-evict cannot recover."
