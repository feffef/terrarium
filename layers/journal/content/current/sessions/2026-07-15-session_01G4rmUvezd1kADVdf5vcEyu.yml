summary: "The owner directed (direct ask) a fresh feature branch with a real fix for #236, stating the shipped ADR-0019 patch does not fix the browser symptom. I diagnosed why: the dependency patch only recovers loads that REJECT; two funnels survive it — (A) swallowed per-command db.exec errors mark a collection \"loaded\" over an empty table, and (B) a dump cached to localStorage before validation pins a corrupt 200 body under the valid checksum, poisoning reloads too. Ruled out the brief's useAsyncData-cache hypothesis against Nuxt 4.4.8 source. Fix (all owner-directed): a hardened @nuxt/content patch (validate-before-cache, purge-on-failure, throw), and — on the owner's follow-up ask — a native <dialog> error modal (message + technical-details disclosure + Reload / Try-without-reload) raised on load failure across the three Space pages, replacing the first inline strip. Red-capable e2e added; full gate green locally (build + 45 e2e); dialog screenshot captured. Pushed to the branch; no PR opened per this session's PR restriction."
