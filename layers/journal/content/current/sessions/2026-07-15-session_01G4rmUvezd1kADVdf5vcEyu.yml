frictions:
  - description: Misread the owner's opening ask ("a new branch in which you introduced the patch") as harden-the-patch; they meant remove it. Built + tested the patch approach, then reversed — a wasted build/test cycle.
    solution: On an ambiguous "the patch" instruction against a repo that already carries one, confirm keep-vs-remove before building rather than inferring.
    severity: moderate
  - description: New e2e test used Playwright's toBeVisible matcher, unavailable under this repo's vitest expect; only surfaced after a full ~100s e2e rebuild.
    solution: blog.e2e uses vitest expect + expect.poll(...).toBe(...), never Playwright matchers — worth a one-line note in tests/README.md.
    severity: minor
  - description: The triage brief's leading hypothesis (useAsyncData caches a null across navigation) was wrong for Nuxt 4's defaults; verifying cost dist-source reading.
    solution: Nuxt 4.4.8 defaults purgeCachedData/granularCachedData=true and default getCachedData returns empty static.data in runtime-SSR — re-nav re-runs.
    severity: nit
  - description: Ad-hoc playwright-core screenshot probe in the scratchpad failed twice — top-level await under tsx's CJS treatment, then playwright-core unresolvable outside the repo node_modules.
    solution: Run ad-hoc probes from the repo root (module resolution) and wrap the body in an async main() — worth a line in docs/agents/verifying-ui-changes.md.
    severity: nit
