learnings:
  - A tall panel floated beside an accordion couples their band height (max of the two); at the crossover, collapsing an accordion item changes page height nonlinearly and can break scroll-pinning that assumes enough headroom — and the crossover shifts with font metrics, so it manifests in CI but not locally.
  - The safe way to put a shorter panel beside an accordion is a CSS grid with align-items:start where the accordion is guaranteed the taller column, so the grid row height tracks the accordion alone and collapse behaviour matches the full-width case — unlike a float, which lets whichever side is taller drive the band and reintroduces the coupling.
