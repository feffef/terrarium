  - description: CI's full gate caught an e2e failure (journal digest scroll-pin, "holds the clicked item ... when a sibling above it collapses") that local gate:scoped passed — the desktop Sparks-float coupled the digests band height and only broke under CI font metrics at 1280px.
    solution: "Per CLAUDE.md this divergence is logged as major — the inert classifier ran the heavy e2e layer (index.vue is non-inert), so it was a genuine cross-environment flake surface, not a skipped layer. Reproduced locally with a width-swept Chromium probe (stable <=1100px, pathological at 1280px), then removed the coupling by relocating Sparks to the rail. The durable lesson: viewport/font-sensitive layout that shares a band with an accordion needs a wide-viewport e2e check locally before push."
