learnings:
  - "The clean domain split that resolved the confusion: SEASONS are global (shared across all specimens, a fixed partition), PHASES are per-specimen; tying the reader's content to the per-specimen axis (phases) and leaving the shared axis (seasons) as context is what finally made the dial legible."
  - When two overlapping vocabularies confuse a reader, explicitly LABELLING each layer can beat hiding one — though here the deeper fix was re-rooting the content on the right axis entirely.
  - Nuxt Content v3 renders specimen essay content client-side (DB loads post-hydration), so curling SSR HTML shows component classes absent even when they render fine in the browser — verify against the rendered DOM.
  - A bare MDC block component "::name" (no closing "::") swallows/breaks the following sibling blocks; empty components still need the close, the component just ignores the empty slot.
ideas:
  - "Add an Atlas content-structure check (extend validate:content or a sibling script) that parses each specimen's MDC body and asserts invariants: exactly one dial-note per frontmatter phenology phase with a valid \"of=\" name, one ::almanac, and every ::sighting date resolving to a real in-biome observation. It catches the whole \"MDC degraded to prose / dangling reference\" class the error-only e2e hydration misses, in ~1-2s, and would have caught this session's ::almanac regression before CI."
