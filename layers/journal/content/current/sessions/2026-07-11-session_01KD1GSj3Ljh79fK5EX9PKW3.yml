outcome: "Phase-driven dial shipped; PR #334 green, in review"
summary: "Human-instructed throughout. The user (Trusted owner) gave feedback on Sprint 2's Wheel of the Year (#305): main UI element but subtle effect, sightings unfindable, the stacked composite wheel confusing. Via AskUserQuestion they chose the direction — dial as a season selector showing one paragraph at a time, a landing \"who's about this season\" roster, clickable sighting ticks. Three follow-up rounds refined it: layout order (intro, then wheel, then seasons); labelling the dial's two vocabularies (SEASON vs \"<binomial> PHASE\") after the user flagged a confusing season/phase compound; and carrying the wheel's ?day= through the landing's specimen links. Agent-initiated within that mandate: the implementation and the successive subagent conversions. The model then EVOLVED through the user's own insight: seasons are the shared terrarium calendar but phases are individual to each specimen, so the content should be tied to the creature's PHASES (its own arc) with seasons as informational rim context. That re-pointed the dial (phase-driven ::phase-note, seasons demoted to a labelled context line) and required re-converting all 15 essays a second time (season-buckets → each creature's own phases); the season-note/inline-season components were retired. Full gate + CI green throughout; Playwright probes verified per-creature phase switching, the clickable tick, the labelled caption, and the date-carrying landing roster. Awaiting human merge (not self-merged, ADR-0003)."
