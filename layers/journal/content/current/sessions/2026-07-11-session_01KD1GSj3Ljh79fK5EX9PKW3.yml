frictions:
  - description: The 15 essays were mass-authored under the season-bucket model, then re-authored under the phase model when the design evolved — two full content passes (~6 opus subagents). The better axis (phases, not seasons) only emerged mid-build.
    solution: Reference-first-then-scale contained the cost (one specimen proved each model before the fleet ran); for open-ended UI/content design, settle the organizing axis on one reference and confirm before the mass authoring pass.
    severity: moderate
  - description: I briefed the subagents (and wrote the reference) that "::almanac" needs no closing fence; MDC block components need a closing "::", so the bare form broke the following season-note parse and every note rendered as plain prose.
    solution: An empty MDC block still needs its "::" close (like "::sighting"); fixed in all 15 files + the skill. Assert component presence in a probe, not just clean hydration.
    severity: major
  - description: The gate's e2e only hydrates two atlas specimen routes and checks for console errors, so a broken MDC component that degrades to prose (no error) escaped it entirely.
    solution: A structural content check (assert each specimen renders six season-note components, valid "of=" names, real sighting dates) would catch this class at ~1-2s.
    severity: moderate
  - description: Three parallel subagents used inconsistent fence colon counts (pool wrote four, floor and canopy three) despite one shared brief; had to normalize afterward.
    solution: Pin the exact fence syntax with a canonical example in the brief; normalize in review.
    severity: minor
  - description: '"nuxt dev" content-DB-not-ready race rendered the first biome-landing dev screenshot empty.'
    solution: Use the production preview server for trustworthy landing shots (already CLAUDE.md guidance).
    severity: nit
  - description: Harness did not auto-inject the Co-Authored-By/Claude-Session footer on -m commits; amended it in each time.
    solution: "Verify and amend (the documented practice for the known #318 case)."
    severity: nit
