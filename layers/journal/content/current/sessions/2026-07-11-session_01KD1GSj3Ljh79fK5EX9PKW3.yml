frictions:
  - description: The design axis evolved mid-build (six shared seasons drive content → each specimen's own phases drive content), so all 15 essays were re-authored TWICE by subagents — a whole extra content pass.
    solution: Grill the model harder up front on the load-bearing question (which axis — shared or per-specimen — is the content tied to?) before committing subagents to author 15 essays.
    severity: moderate
  - description: I briefed the subagents (and wrote the reference) that "::almanac" needs no closing fence; MDC block components need a closing "::", so the bare form broke the following note parse and every note rendered as plain prose.
    solution: An empty MDC block still needs its "::" close (like "::sighting"). Assert component presence in a probe, not just clean hydration.
    severity: major
  - description: The gate's e2e only hydrates two atlas specimen routes and checks for console errors, so a broken MDC component that degrades to prose (no error) escaped it entirely — caught only by an ad-hoc Playwright probe.
    solution: A structural content check (assert each specimen renders one dial-note per phase with valid "of=" names and real sighting dates) would catch this class at ~1-2s.
    severity: moderate
  - description: Parallel biome subagents used inconsistent fence colon counts (one pass had a subagent write four colons where the others wrote three) despite one shared brief.
    solution: Pin the exact fence syntax with a canonical example in the brief; normalize in review.
    severity: minor
  - description: '"nuxt dev" content-DB-not-ready race rendered the first biome-landing dev screenshot empty.'
    solution: Use the production preview server for trustworthy landing shots (already CLAUDE.md guidance).
    severity: nit
  - description: Harness did not auto-inject the Co-Authored-By/Claude-Session footer on -m commits; amended it in each time.
    solution: "Verify and amend (the documented practice for the known #318 case)."
    severity: nit
  - description: The claude-code-remote send_later re-arm of the PR check-in failed once with 'permission stream closed'.
    solution: Transient; retry on the next turn. The PR webhook subscription still delivers CI/review events meanwhile.
    severity: nit
