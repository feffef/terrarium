learnings:
  - "The decisive design move for this feature was matching the UI axis to the data's ownership: the SHARED thing (seasons) is context, the INDIVIDUAL thing (each specimen's phases) drives the per-specimen content. The user surfaced this; it resolved the whole 'what are phases / why are they here' confusion at once."
  - When two overlapping vocabularies confuse a reader (here the six shared seasons vs a creature's own phenology phases), explicitly LABELLING each layer beat hiding one — the user preferred a labelled SEASON / PHASE caption over my first instinct to drop the phase names.
  - Nuxt Content v3 renders specimen essay content client-side (DB loads post-hydration), so curling SSR HTML shows component classes absent even when they render fine in the browser — verify against the rendered DOM.
  - A bare MDC block component "::name" (no closing "::") swallows/breaks the following sibling blocks; empty components still need the close, the component just ignores the empty slot.
ideas:
  - "Add an Atlas content-structure check (extend validate:content or a sibling script) that parses each specimen's MDC body and asserts invariants: exactly six ::season-note blocks with valid Glass-Year \"of=\" names, one ::almanac, and every ::sighting date resolving to a real in-biome observation. It catches the whole \"MDC degraded to prose / dangling reference\" class the error-only e2e hydration misses, in ~1-2s, and would have caught this session's ::almanac regression before CI."
