frictions:
  - description: "`mermaid` was declared in package.json but missing from node_modules, failing `nuxt typecheck` (TS2307) unrelated to my change."
    solution: Ran `pnpm install`; confirmed pre-existing via `git stash` before fixing.
    severity: minor
  - description: New e2e test asserting pixel-exact scroll preservation failed twice with a consistent ~31-46px gap even though the app's own delta computed to exactly 0 (confirmed via a temporary console.log) — Playwright's `locator.click()` does an implicit scroll-into-view before dispatching the click, which happened between the test's "before" measurement and the app's own click handler, so the two disagreed on "before".
    solution: Call `locator.scrollIntoViewIfNeeded()` explicitly before measuring "before" in the test, so Playwright's implicit scroll happens first and can't leak into the measurement window. Worth remembering for any future e2e test measuring exact pixel positions around a `.click()`.
    severity: minor
