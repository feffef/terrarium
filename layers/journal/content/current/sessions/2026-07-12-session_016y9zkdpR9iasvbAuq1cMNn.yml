summary: "Directly human-instructed: the user asked to improve the scroll behavior when clicking to expand a daily digest or session card on the journal Space dashboard, so the clicked item's top stays at the same viewport position after expanding, instead of jumping to the top of the screen — except when near the top of the page makes that impossible. Implemented in layers/journal/app/pages/t/journal/[space]/index.vue: toggle() now captures the clicked item's getBoundingClientRect().top before the accordion state flips, then a new scrollPreservingTop() counter-scrolls after Vue's DOM update by exactly the delta any collapsing sibling caused, clamped to window.scrollY >= 0 so a near-top item settles as close to its original position as the page start allows. The deep-link/page-load path (scrollToOpen) is untouched — no prior on-screen position exists to preserve on a fresh load. Updated layers/journal/tests/e2e/journal.e2e.ts, replacing the old \"scrolls to top\" assertion with two e2e tests covering the no-sibling and sibling-collapses-above cases. Full `pnpm gate` passes. Opened PR #393, subscribed to its activity, and it merged with the safety gate green and no review comments. After merge, the user reported the corrective scroll still animated (`behavior: 'smooth'`), which showed the very motion the fix was meant to hide since it's a click-caused reflow correction, not a navigation. Since #393 had already merged, restarted the branch from origin/main per CLAUDE.md's merged-PR convention, changed scrollPreservingTop to always scroll instantly (`behavior: 'auto'`), reran the full gate, and opened #394, which also merged clean."
