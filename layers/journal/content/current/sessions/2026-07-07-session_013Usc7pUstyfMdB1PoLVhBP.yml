  - description: "Twice inferred an agent action was self-initiated/autonomous from the absence of an explicit trigger (no linked issue, no stated requester) rather than checking the session log's own signals — first for the Atlas plate redraw (implied nobody asked), then for PR #208 (claimed \"no human triage in between\" when the log says the fix ran \"on green-light\"). Same root cause both times: treating missing evidence of a request as evidence of no request."
    solution: "The deeper fix is upstream of blog-post: a session log's `summary` field should itself state plainly which parts of the work were human-instructed (a direct ask, a green-light, \"per request\") versus agent-initiated, rather than leaving that to be inferred from incidental phrasing or the presence/absence of an issue link. If that provenance were a clearly-marked, reliably-present part of every summary, a consumer (this Skill, a future digest, a reader) would not have to reconstruct it by inference and get it wrong twice."
