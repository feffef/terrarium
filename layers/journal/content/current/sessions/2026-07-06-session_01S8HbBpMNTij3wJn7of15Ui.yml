  - description: Downscaled Chromium --screenshot PNGs made applied-but-subtle scoped styles look missing; burned a restart and probing detour.
    solution: Probe computed styles via playwright-core (a devDependency) before distrusting CSS; screenshot post-hydration with an explicit settle wait.
    severity: moderate
  - description: No image crop/zoom tooling in the container (no PIL, ImageMagick); inspecting screenshot regions needed a chromium file:// crop-page hack.
    solution: A small crop/zoom helper next to scripts/screenshot.ts, or document the file:// img-offset trick.
    severity: minor
  - description: tsx scripts in the scratchpad cannot resolve repo dependencies like playwright-core; probe scripts had to live in the repo root.
    solution: Run one-off tsx probes from inside the repo (or pass an absolute import path).
    severity: nit
  - description: theme.css used Vue :deep() selectors in a plain global stylesheet, ambiguous whether they applied and by what mechanism.
    solution: Replaced with plain descendant selectors; global stylesheets should never use SFC-only pseudo-selectors.
    severity: minor
  - description: The user invoked /frontend-design, which does not exist in this environment; intent had to be inferred from the raw prompt.
    solution: None needed — the plain-text request carried the intent.
