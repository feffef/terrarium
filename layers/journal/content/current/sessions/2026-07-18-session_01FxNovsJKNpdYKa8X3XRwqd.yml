frictions:
  - description: "A dispatched worktree-isolated impl agent (screenshot.ts fix, #575) stalled twice mid-task waiting on a background pnpm gate:scoped run without polling it to completion — had to resume it twice via SendMessage, pasting the gate log's actual tail in, before it proceeded to commit/push/open the PR."
    solution: A dispatch brief that tells an agent to "wait for a background job" should also say how to poll/confirm completion (e.g. check the log file for a completion marker, or use Monitor) rather than checking once and stopping.
    severity: major
  - description: "Two dispatched impl agents (#582 guest-intake-scan.ts cursor fix, #583 guest-in-flight marker) were forked from origin/main in parallel before either had merged, and both touched the same file (scripts/guest-intake-scan.ts) in adjacent-but-non-overlapping regions. #583's branch went stale the moment #582 merged; merging #583 as-is would have needed a manual rebase-and-reconcile pass regardless of whether git flagged a textual conflict."
    solution: When dispatching several parallel impl agents whose issues plausibly touch the same file, either serialize the dispatch for that file's issues or budget explicit rebase-and-reconcile time in the review phase before assuming a green gate on each individual branch means it's safe to merge in any order.
    severity: major
  - description: "Code review (Standards+Spec sub-agents) surfaced genuine functional bugs beyond style in 2 of 6 non-doc dispatched PRs: #582's cursor logic would perpetually re-flag an already-answered OWNER comment as actionable whenever the cursor state file didn't persist between scans (a realistic case, e.g. a fresh checkout per invocation); #583's events-fetch for the marker-staleness check had no error handling and would crash the whole scan on one issue's transient fetch failure. Neither was caught by the impl agents' own testing, gate runs, or PR descriptions."
    solution: Validates running full /code-review on every non-doc dispatched PR rather than skimming diffs directly, even for "simple"-tier tickets — worth keeping as the default, not trimming for throughput.
    severity: moderate
  - description: The Stop hook's git-check fired multiple times this session flagging "uncommitted changes" or "Unverified commits" that were either residual cd state into a dispatched subagent's worktree (genuine in-progress work, not this session's own repo state) or inherited history / unprovisioned-signing-key cases already documented in CLAUDE.md as known platform limitations.
    solution: All were correctly resolved by the existing CLAUDE.md guidance (re-confirm at repo root; check origin/main..HEAD before touching flagged commits; don't re-diagnose the missing signing key each session) — no new gap, just confirming the existing guidance holds up under a session that juggles many concurrent worktrees at once.
    severity: minor
  - description: GitHub webhook activity events echoed my own posted PR review comments back into the conversation (author "feffef", since agent writes land under the owner's connection per ADR-0017) — easily recognized as a no-op but could be mistaken for new human input by a less careful pass.
    solution: Worth noting as an expected pattern for future frictions-to-fixes / PR-babysitting runs.
    severity: nit
