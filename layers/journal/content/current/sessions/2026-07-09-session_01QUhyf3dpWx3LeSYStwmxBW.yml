frictions:
  - description: git log --all -S<string> mixes divergent/rewritten branch histories, once misreading an incrementally-built file as a brand-new-file commit
    solution: always scope -S searches to origin/main specifically (git log origin/main -S...) when trying to date when content landed
    severity: minor
  - description: Grep tool returned no match for a literal substring present in CLAUDE.md, confirmed instantly by a plain Bash grep on the same file
    solution: fall back to Bash grep when Grep reports an unexpected zero-match on a string known to be present
    severity: nit
  - description: confirming whether a doc fix predates a friction-log session required manually eyeballing local-offset git timestamps against each session's startedAt in UTC
    solution: scripts/merged-since.ts lists commits after an instant but not which line of which file changed when; a small helper diffing a specific doc section's blame against a timestamp would remove the manual step
    severity: minor
  - description: "the github MCP server briefly disconnected and reconnected mid-run while polling PR #260's check runs"
    solution: no action needed beyond a ToolSearch retry once tools reappeared; worth remembering GitHub MCP can drop mid-poll
    severity: nit
  - description: this is the third frictions-to-fixes cycle inside the same 20-session window, so most of the survey subagent's budget went to re-confirming already-fixed candidates rather than finding new signal
    solution: consider widening the session-log window or spacing out the cadence so consecutive runs don't mostly re-tread the same recency window
    severity: minor
