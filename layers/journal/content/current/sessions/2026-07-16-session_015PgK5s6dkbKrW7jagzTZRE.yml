learnings:
  - A Claude Design handoff bundle (.dc.html files) can contain multiple genuinely alternative directions for the SAME screen (not just one resolved design) inside one export — worth explicitly scanning for '(resolved direction)' vs. unlabeled alternatives before assuming the whole bundle is ready to implement as-is, and surfacing a real AskUserQuestion for any unresolved fork rather than guessing which one the user meant.
  - "A static HTML/CSS/JS design mockup cannot model real behavioral requirements (scroll-sync state, retain-last-active-on-gap, SSR-vs-client-only rendering) — its 'active state' will be hardcoded/simplified. When implementing a design handoff against an app with existing, already-resolved behavioral specs (here, issue #524's IntersectionObserver contract), the right frame is 'reskin against the real behavior', not 'port the mockup's simplified state logic' — worth calling out explicitly in any future design-handoff implementation brief."
