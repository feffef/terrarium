summary: "Human-instructed: the user directed a specific orchestration shape — one background agent per story (model chosen by task), parallelize where possible, converge on a single integration branch, run a critical /code-review with Opus and fix findings with Sonnet, open one final PR without asking back, and spawn a 3-agent (2 Sonnet + 1 Opus) panel for any genuinely open decision. Agent-initiated: since issue #515's own sub-issues (#516-528) were already fully resolved before this session, no new decision panel was ever needed — the entire decomposition into a foundation-then-3- wave dependency structure (schema/design-system/stratigraphy/validation, then component assembly, then real content research), the exact story boundaries, per-story model assignment, and every integration/rebase/ re-verification step were agent-initiated within that mandate. Built layers/midden/ (trench-only v1): manifest+schema, a condition-grade glyph/ tooltip/popover/legend system, a scroll-synced stratigraphy sidebar, MDC artifact embeds, route pages, a validate-content-refs.ts extension, and 31 real seed artifacts across 7 sites and 4 dig seasons researched from actual repo history under the #525 two-gate inclusion test. Independently re-verified every integration point (fast-forward merges, full pnpm gate, full e2e smoke suite) rather than trusting agent self-reports. A critical two-axis Opus code review found one real spec gap (a stratum-existence check that never actually cross-referenced real data) plus several Standards findings; two parallel Sonnet agents fixed them, re-verified with the full gate, and the branch was rebased onto origin/main (which moved twice during the session) before opening PR #534."
