    solution: Treated the outage as non-actionable each time and re-armed rather than escalating or tight-looping retries — correct, but a check-in routine should expect and tolerate a full round of 503s as routine, not exceptional.
    severity: minor
  - description: "mcp__Claude_Code_Remote__send_later intermittently failed with 'AbortError: Tool permission stream closed before response received' (and once for subscribe_pr_activity) — an immediate retry usually succeeded, but two later attempts were outright rejected by the permission layer rather than erroring, leaving the hour-out check-in NOT re-armed at that point (superseded shortly after by the PR merge itself, so no real gap in coverage resulted)."
    solution: "No action beyond retrying once per attempt; this reads as a recurring transient harness-level hiccup on tool-permission streaming specifically. Worth noting for a future session: a rejected/failed send_later re-arm should probably get one deliberate retry before moving on, since a silently-unarmed check-in has no other safety net."
    severity: minor
  - description: A GitHub Actions gate run failed on the exact commit just pushed, but the failure (layers/journal/tests/e2e/journal.e2e.ts, a scroll-position expect.poll timing assertion) was in code this branch never touched and had passed locally every time — genuine pre-existing CI flakiness, not a real regression.
    solution: Confirmed via `git diff --stat` that the branch touched zero files in the failing test's area before re-kicking just the failed job (rerun_failed_jobs), which then passed — the right sequence (verify unrelated-ness first, then re-kick, don't edit code that isn't actually broken).
    severity: minor
