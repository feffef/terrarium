learnings:
  - Nuxt auto-imports every layer's app/utils and app/composables exports into one GLOBAL namespace across ALL layers (unimport), not scoped per-Tenant — a same-named export in a new Tenant's utils file can silently overwrite an existing Tenant's generated type declaration and break ITS typecheck with no error pointing at the actual cause. A Wave-1 agent caught this itself (seasonOf vs. Atlas's own seasonOf) before it landed; worth a standing cross-layer name-collision grep step whenever a new layer/**/app/{utils,composables} export is added.
  - scripts/log-session.ts already establishes precedent for a generic Platform script directly importing a specific Tenant's file by relative path (layers/journal/tenant.config.ts) — useful prior art when a validation script needs to reference one Tenant's data (used here to justify scripts/validate-content-refs.ts importing layers/midden/app/utils/strata.ts's DIG_SEASON_SLUGS).
