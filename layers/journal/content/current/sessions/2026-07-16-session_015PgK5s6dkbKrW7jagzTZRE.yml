learnings:
  - A Claude Design handoff bundle (.dc.html files) can contain multiple genuinely alternative directions for the SAME screen inside one export, not just one resolved design — scan explicitly for '(resolved direction)' labeling vs. unlabeled alternatives before assuming a bundle is implement-as-is, and surface any real fork via AskUserQuestion rather than guessing which the user meant.
  - A static HTML/CSS/JS design mockup cannot model real behavioral requirements (scroll-sync state, retain-last-active-on-gap, SSR-vs-client-only rendering) — its 'active state' will be hardcoded/simplified. Implementing a design handoff against an app with an already-resolved behavioral spec is 'reskin against the real behavior', not 'port the mockup's simplified state logic' — worth stating explicitly in any future design-handoff implementation brief.
  - A GitHub bot comment reporting a check result (e.g. '✅ safety-gate green on <sha>') can cite a different SHA than the PR's head commit — plausibly an ephemeral PR-merge-commit SHA GitHub computed the check against, not the branch tip — so don't treat a SHA mismatch alone as evidence the comment is stale or wrong; cross-check via get_check_runs against the actual head when in doubt, but don't discard the bot's own report either.
