frictions:
  - description: Two Wave-1 background agents were killed mid-work by a transient 529 Overloaded API error, leaving finished-looking work uncommitted in their worktrees.
    solution: Resumed both via SendMessage with an explicit re-verify-then-commit-then-push instruction; both recovered cleanly. Worth a standing reminder that a 529 mid-agent isn't a real failure and is always worth resuming rather than re-dispatching from scratch.
    severity: moderate
  - description: A code-review fix agent (fix1) ended its turn with a vague, non-committal final message ('I'll stop polling now and wait for the background notification...') despite its brief explicitly requiring commit+push before stopping; its worktree held fully correct, working changes that were never committed or pushed.
    solution: Caught by explicitly checking the worktree's git status before trusting the completion notification (per CLAUDE.md's existing worktree-guard rule) rather than assuming a 'completed' status meant the work landed; finished verification and committed/pushed it myself. The rule already exists in CLAUDE.md — this is a real instance of exactly the failure mode it warns about, not a gap in the doc.
    severity: major
  - description: mcp__github__pull_request_read's get_status method reported state 'pending'/0 statuses for the PR's head commit even though get_check_runs showed both checks (gate, label) completed successfully on that same commit.
    solution: Prefer get_check_runs over get_status for this repo's GitHub Actions-based CI — get_status reflects the legacy commit-status API, which this repo doesn't populate.
    severity: minor
  - description: "The first subscribe_pr_activity call failed with 'AbortError: Tool permission stream closed before response received'; an identical immediate retry succeeded."
    solution: No action needed beyond retrying once — transient.
    severity: nit
