summary: "User asked to verify #288 (Claude_Code_Remote prompts persist despite the #287 allowlist fix) in a fresh desktop-web session. Confirmed the root cause on a second client: the cloud workspace boots untrusted, so Claude Code drops all project permissions.allow entries at startup (debug log names it verbatim); user confirmed web/mobile never show a trust dialog, and send_later/delete_trigger prompted at 50s/5s vs 0-1ms for github. Posted the findings (user-approved). On the user's explicit instruction, removed the four inert mcp__Claude_Code_Remote__* allow entries and documented the untrusted-workspace allow-drop as a CLAUDE.md gotcha; opened gated PR #290, CI green. Addressed the owner's review comment scoping the doc bullet to Claude_Code_Remote (local-CLI allowlisting still works). PR #290 was merged by the owner this session."
