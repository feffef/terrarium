learnings:
  - Cloud (web/mobile) sessions boot untrusted (hasTrustDialogAccepted:false) so Claude Code drops the ENTIRE permissions.allow array at startup — project allow-rules can never apply there; github stays silent only via a separate platform auto-approval, not the allowlist.
  - Workspace trust is read once at startup; flipping hasTrustDialogAccepted mid-session does not re-enable the dropped rules.
  - mcp__Claude_Code_Remote__* is a cloud-only server, so its allow entries are inert even in a local CLI (no such server to match), not just in cloud.
ideas:
  - Add an environment setup-script step that pre-sets projects["/home/user/terrarium"].hasTrustDialogAccepted=true in ~/.claude.json before claude launches, so committed permissions.allow rules actually apply in cloud sessions (a SessionStart hook is too late — trust is evaluated at startup).
