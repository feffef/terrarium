summary: "Scheduled /audit-docs run, no human prompt in this conversation. Fanned out four parallel read-only reviewers (drift, duplication, contradiction, ambiguity) over every live doc, ADR, and Skill; drift found nothing, the other three lenses returned 8 candidate findings. An independent fact-checker re-derived each against primary sources — all 8 came back CONFIRMED or CONFIRMED-BUT. Fixed all 8 in place: single-homed the safety-gate command chain and the chartered-job branch-off convention into CLAUDE.md instead of restating them across 5 and 4 SKILL.md files; noted the seed-template provenance of three docs/agents/*.md files against their setup-matt-pocock-skills originals; fixed a self-contradiction in README.md; spelled out CONTEXT.md's Specimen rarity enum in full; pinned CLAUDE.md's undefined \"substantive work\" threshold with a concrete rule. The most consequential fix: audit-docs's own SKILL.md and Skill Inventory entry falsely claimed an ADR-0004 self-merge exception that ADR-0003 never actually grants it (only digest and frictions-to-fixes are named exceptions) — corrected to the standard gated-PR/human-merge default used by its sibling audit-skills. Because that fix lands in this very PR, this run followed the corrected policy for its own close-out: opened PR #262 and left it for human merge rather than self-merging, even though the pre-fix SKILL.md instructions (present at the start of this run) said to self-merge. Full safety gate green throughout (174 unit tests, 27 e2e tests). No needs-triage issue was needed — every finding was resolvable from primary sources."
