summary: "Scheduled /audit-docs run, no human prompt in this conversation. Fanned out four parallel read-only reviewers (drift, duplication, contradiction, ambiguity) over every live doc, ADR, and Skill; drift found nothing, the other three lenses returned 8 candidate findings. An independent fact-checker re-derived each against primary sources — all 8 came back CONFIRMED or CONFIRMED-BUT. Fixed all 8 in place: single-homed the safety-gate command chain and the chartered-job branch-off convention into CLAUDE.md instead of restating them across 5 and 4 SKILL.md files; noted the seed-template provenance of three docs/agents/*.md files; fixed a self-contradiction in README.md; spelled out CONTEXT.md's Specimen rarity enum in full; pinned CLAUDE.md's undefined \"substantive work\" threshold. Opened PR #262 for these. The most consequential finding: audit-docs's own SKILL.md/Skill Inventory entry falsely claimed an ADR-0004 self-merge exception ADR-0003 never actually granted it — corrected to the human-merge default. After #262 was opened, the repo owner commented directly on it (human-instructed, not agent-initiated) clarifying that the self-merge grant was actually intended when audit-docs was authored, just never recorded in an ADR — so I opened a second, separate PR (#263) amending ADR-0003 with that grant (mirroring digest's existing exception) and restoring audit-docs's self-merge language now correctly backed by it. Kept #263 separate from #262 per audit-docs's own tiering rule (ADR edits never ride the routine-reconciliation PR) — #263 is human-merge-only regardless, since ADRs are always a human-only merge surface. Also human-instructed: a reviewer comment on #262 asking for a single `pnpm gate` npm script instead of a prose pointer to CLAUDE.md, which I implemented and pushed to #262, and a question about whether \"gate\" was established terminology, which I verified (yes, predates this session — ADR-0004's title, the CI workflow filename) and answered on the PR. Full safety gate green on both branches throughout. No needs-triage issue was needed."
