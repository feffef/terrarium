frictions:
  - description: audit-docs's own SKILL.md asserted a self-merge authority not actually backed by ADR-0003/0004 text, discovered only via the contradiction lens mid-run — a meta case where the running instructions were themselves wrong.
    solution: "Fixed audit-docs/SKILL.md and its Skill Inventory entry to match audit-skills's correct \"human merges, never self-merge\" pattern in #262. Turned out the fix was incomplete on its own — see the next friction."
    severity: moderate
  - description: "The \"unauthorized self-merge claim\" finding was CONFIRMED against primary sources (no ADR text granted it) but the repo owner's PR comment revealed the finding, while textually correct, missed the actual human intent: the grant was real, just never written down. A purely text-based fact-check can't distinguish \"this was never decided\" from \"this was decided but the paper trail is missing\" — both look identical against the ADRs alone."
    solution: "Treated the owner's clarifying PR comment as authoritative and opened #263 to record the missing ADR-0003 amendment, rather than treating #262's fix as final. For a future sweep: when a Contradiction-lens finding is about an autonomous Skill's own granted authority (not a generic doc claim), the fact-check's CONFIRMED verdict should be read as \"undocumented\", not necessarily \"wrong\" — flag it as a candidate needs-triage/informational note for a human to confirm intent, rather than resolving it silently as pure removal."
    severity: minor
  - description: "Pointing 5 SKILL.md files at CLAUDE.md's prose description of the gate (instead of restating the literal command) still left room for each Skill's invocation to drift slightly, per reviewer feedback on #262 — a prose pointer isn't as strong a single-home as an executable one."
    solution: Added a `pnpm gate` npm script as the actual single source of truth and pointed CLAUDE.md and all 5 Skills at that command instead.
    severity: nit
  - description: The audit-docs SKILL.md's four Agent-tool calls for the lens reviewers were requested with run_in_background:false but the harness ran them asynchronously anyway, requiring a wait on task-notifications instead of getting results inline in the same turn.
    solution: Treat run_in_background:false as a preference, not a guarantee, for parallel same-message Agent calls; plan on waiting for notifications rather than assuming synchronous return.
    severity: nit
