frictions:
  - description: A text-only fact-check (no ADR text grants audit-docs self-merge) correctly found a real gap but couldn't distinguish "never decided" from "decided but undocumented" — both look identical against the ADRs alone. The initial fix (revert to human-merge) was the textually-safe default but not what the repo owner actually wanted; only a live PR comment revealed the true intent.
    solution: "Treated the owner's clarifying PR comment as authoritative over the text-only fact-check and opened a follow-up ADR amendment PR rather than treating the first fix as final. For a future sweep: when a Contradiction finding is about an autonomous Skill's own granted authority, read a CONFIRMED verdict as \"undocumented\" rather than \"wrong,\" and weight a repo owner's direct clarification above the sweep's own prior conclusion."
    severity: minor
  - description: Merging two PRs from one sweep that both touch the same Skill's self-merge language, in the wrong order (the ADR-granting PR before the routine-fix PR that had reverted that same language), produced a silent-revert risk — a plain merge of main into the stale branch would have quietly undone the just-landed ADR grant with no error or conflict on the file that mattered most (the actual conflict needed manual eyes, not just clean-vs-conflicted git status).
    solution: "Caught it by inspecting the diff between origin/main and the stale branch before assuming a clean merge was safe, and hand-resolved. For next time: when two PRs from the same sweep touch the same file's core claim in opposite directions, land the ADR/authorizing PR first and rebase the dependent PR immediately, rather than letting both sit open in parallel."
    severity: minor
  - description: "Fixing one duplication (pointing 5 Skills at CLAUDE.md instead of restating a command chain) relocated rather than removed the risk: CLAUDE.md itself then restated the new pnpm gate script's exact step composition, recreating the same class of drift one layer up. Two review rounds were needed to fully collapse it to package.json as the sole source."
    solution: When single-homing a fact into a new home, check that the new home doesn't itself restate detail that a still-more-authoritative source (here, package.json) already owns — single-homing is transitive, not one hop.
    severity: nit
  - description: The audit-docs SKILL.md's four Agent-tool calls for the lens reviewers were requested with run_in_background:false but the harness ran them asynchronously anyway, requiring a wait on task-notifications instead of getting results inline in the same turn.
    solution: Treat run_in_background:false as a preference, not a guarantee, for parallel same-message Agent calls; plan on waiting for notifications rather than assuming synchronous return.
    severity: nit
