frictions:
  - description: Called TaskCreate with a guessed multi-task array schema before loading it via ToolSearch, against CLAUDE.md's own explicit rule to load a deferred tool's schema before first use.
    solution: Load every deferred tool via ToolSearch on first reference, even ones that look self-evident from their name (TaskCreate reads like a plural "todos" API but isn't).
    severity: minor
  - description: Called ScheduleWakeup while waiting on background Agent-tool lens reviewers, even though docs/agents/issue-tracker.md documents it as scoped to /loop dynamic-mode pacing and unreliable outside it.
    solution: Agent-tool completions already deliver an automatic notification — no wakeup tool is needed while waiting on them at all; reserve ScheduleWakeup strictly for /loop and send_later for genuine external-state polling (e.g. CI).
    severity: minor
  - description: Drafted the commit's Claude-Session footer with an id copied from a recent `git log` entry (another session's commit) before catching it against CLAUDE.md's explicit "never derive it from git log trailers" rule and correcting it to the real id from the system-prompt template.
    solution: Resolve the session id from the system-prompt commit-footer template at the moment of writing, every time — never let a plausible-looking id seen elsewhere (git log, an old commit) substitute, even briefly in a draft.
    severity: moderate
