frictions:
  - description: First Concision-lens subagent delegated to five of its own child agents instead of reviewing directly, then repeatedly reported 'still waiting on children' status instead of findings across two resume attempts.
    solution: Redispatched a fresh subagent with an explicit 'do not use the Agent tool, review directly yourself' instruction, which worked cleanly on the first pass. Worth stating 'do not delegate further' up front in prompts for bounded read-only review tasks handed to a general-purpose subagent.
    severity: moderate
  - description: Two subagent outputs were auto-flagged by the harness as matching an 'instruction-shaped pattern (permissions-allow-deny)' purely because they quoted CLAUDE.md's own prose about the permissions.allow caveat verbatim.
    solution: Read the flagged text directly to confirm it was benign quoted repo content, not an injected instruction, and proceeded normally. No repo-side fix needed — flagging this only as a heads-up that quoting certain CLAUDE.md passages in a subagent's return value can trip that scanner.
    severity: nit
