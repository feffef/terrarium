summary: "Scheduled /audit-docs run (autonomous — fired by a background-task event, no human chat this session). Four paired-lens reviewer agents (Freshness, Single-home, Concision, Coherence) swept every *.md surface, pooled 10 findings, deduped (no overlaps found), and an independent fact-checker verified each against primary sources. 5 survived CONFIRMED/CONFIRMED-BUT: CLAUDE.md restated ADR-0017's provenance-footer decision scope instead of linking to it; CONTEXT.md's Public glossary entry stated an unconditional ADR-0020 rule that ADR-0023's live, demo-scoped guest exception contradicts; docs/agents/issue-tracker.md falsely claimed ADR-0020 was \"amended in #437\" (those values were in the original Decision text, no #437 reference exists in the ADR at all); two own-Skill SKILL.md files (atlas-specimen, guest-build) each restated one fact twice with no new information. 5 other candidates were WRONG and dropped, including four \"duplication\" findings that turned out to be a repo-wide Skill frontmatter-description/body-opening echo convention, not a defect, and one CLAUDE.md \"duplication\" whose two passages already pointed outward to their real single home. Fixed all 5 confirmed findings, `pnpm gate:scoped` green, opened PR #548, subscribed to its activity. No human-only surface touched; no needs-triage issue needed (the ADR-0020/#437 claim resolved cleanly to a factual correction, not an unresolvable conflict)."
