learnings:
  - Mermaid needs real SVG layout (getBBox/getComputedTextLength); jsdom stubs the DOM tree but has no layout engine, so a browser is unavoidable for its own renderer.
  - Rendering with theme:'base' and each --diagram-* token set to a unique sentinel hex leaves those hexes verbatim in the SVG, so a post-process to var(--diagram-*) yields a static SVG that still adapts to dark mode with zero JS.
  - "@viz-js/viz (Graphviz WASM) is the only genuinely browserless renderer, but speaks DOT not Mermaid — browserless requires changing authoring syntax."
