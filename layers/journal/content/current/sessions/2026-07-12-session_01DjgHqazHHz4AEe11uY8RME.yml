summary: "User asked (direct instruction) to move Mermaid diagram generation server-side to shrink client JS. I verified empirically that Mermaid cannot render in plain Node or jsdom (hits getBBox — no layout engine), so a browser is mandatory somewhere. Since diagrams are static content, the fix is a build-time pre-render to inline SVG using the repo's already-present playwright-core + pre-installed Chromium (zero new deps), with a sentinel-colour post-process to keep dark-mode/Tenant theming as CSS vars — both de-risked with working prototypes. User then chose to abandon implementation for now and asked me to capture the concept as an issue. Filed issue #379 (self-contained) and committed the primary-source research note to the feature branch. No PR, nothing merged."
