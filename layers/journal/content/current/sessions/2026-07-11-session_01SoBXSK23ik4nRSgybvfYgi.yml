summary: "Ran the /audit-docs chartered sweep end to end, unattended. Fanned out four paired-lens reviewer agents (Freshness, Single-home, Concision, Coherence) across the repo's Live/Historical/Pack-generic doc tiers, pooling 10 findings, then dispatched an independent fact-checker that re-derived each against primary sources (code, git history, ADRs) rather than trusting the reviewers' framing. 8 findings confirmed, 2 discarded as non-defects (intentional why/where doc splits, a defensible glossary judgement call). Fixed 6 Live-tier findings (a wrong ADR citation, an unlinked new research doc, two intra-CLAUDE.md duplications, and — most notably — a CI editability contradiction that git history proved factually false: CLAUDE.md claimed \"CI is never agent-edited\" but commit c580e73 is an agent-authored edit to the gate workflow, merged via a normal human-reviewed PR) in a self-merged PR (#311, merged on green gate). One finding (ADR-0010 restating a Routine's schedule cadence, violating CLAUDE.md's own rule against that) touches a human-only ADR surface, so it was escalated as its own PR (#312, still open, subscribed and check-in scheduled). All work this run was self-directed per the audit-docs charter; no human prompted or reviewed during the run."
