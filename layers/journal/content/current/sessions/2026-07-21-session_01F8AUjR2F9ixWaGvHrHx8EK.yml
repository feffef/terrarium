frictions:
  - description: "While drafting issue #627's recommended fix, I (the orchestrator) cited an \"Executing actions with care\" section as already existing near the top of this repo's CLAUDE.md and stating the git-status-first rule — but that section is harness-level system-prompt content shown to me in-session, not part of the committed file. I asserted this from memory without checking the actual file first."
    solution: "Caught only because the dispatched impl agent independently verified the claim (grep + git log -S across origin/main history) before implementing, per issue #626's own rule, and deviated to add the substantive rule directly instead of a dangling pointer. Ironic given #626 (verify before asserting) was filed in the same batch. Solution: when an issue body says content \"already exists\" elsewhere in a repo file, grep that file directly before writing the recommendation, not only when implementing it."
    severity: major
  - description: mcp__github__search_issues's tool description recommends natural-language paraphrased queries, which conflicts with this Skill's exact-tool-name/ exact-error-string screening guidance — the survey subagent had to reconcile by using keyword-dense queries plus direct issue_read lookups on issue numbers already cited inline in session logs.
    solution: Note the tension explicitly in the Skill's GitHub-MCP-hygiene bullet, or lean on issue_read as primary once candidate numbers are known from log text, with search_issues only for open-ended discovery.
    severity: minor
  - description: A single search_issues call from the survey subagent (a moderately-worded multi-term query) overflowed the tool-result token limit (~104K chars) and had to be redirected to a file and grepped for just title fields.
    solution: Extend the Skill's existing "GitHub-MCP hygiene" warning — currently scoped to list_issues/list_pull_requests bloat only — to note that search_issues itself can also blow the budget on an unremarkable query.
    severity: minor
  - description: The dispatched impl agent's fresh worktree needed `pnpm install` before `pnpm gate:scoped` would run (node_modules wasn't present) — expected and handled without issue, but the dispatch brief didn't call it out.
    solution: Add a one-line reminder to worktree-isolation dispatch briefs that a fresh worktree may need `pnpm install` before the gate script works.
    severity: nit
