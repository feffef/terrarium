frictions:
  - description: First draft of the Karen candidate (mermaid font bug) misread commit timestamps and asserted a first fix shipped, broke in production, and needed a second incident PR later - actually both commits were part of one PR from one authoring session, 18 minutes apart, never separately merged. Caught only by re-checking PR commit lists via the GitHub API before drafting was final.
    solution: Always pull a PR's actual commit list (pull_request_read get_commits) before asserting a "shipped, broke, fixed again" narrative from git log alone - adjacent commits in git log are not proof of separate merge events (CLAUDE.md already warns about this for PR-boundary claims; this was the same trap in a slightly different shape).
    severity: minor
  - description: Drafted a "months ago" timing claim for a prior CI-gap occurrence without checking - the repo's entire history only spans about two weeks, so it was fabricated-sounding filler. Caught by checking when docs/proposals/README.md was actually added.
    solution: Verify every relative-time phrase ("months ago", "days ago") against an actual timestamp before publishing, same rigor as a specific date or count.
    severity: minor
