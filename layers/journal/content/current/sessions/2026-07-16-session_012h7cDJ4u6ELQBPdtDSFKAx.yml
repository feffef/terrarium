frictions:
  - description: "Spawned a brand-new Agent call (isolation: worktree) to resume a stopped-mid-task impl agent instead of using SendMessage with its agent id, despite CLAUDE.md/tool docs saying resume goes through SendMessage. A fresh worktree call risked losing the agent's already- committed local work or racing a duplicate branch/push."
    solution: "Always resume a stopped or paused subagent via SendMessage to its agent id, never a new Agent call — a new call's isolation: worktree provisions a fresh checkout with no memory of prior work. (Caught before any damage: inspected the resulting worktree, found it had landed on the same branch/commit by coincidence, stopped the redundant agent via TaskStop, and finished the push/PR steps directly instead of trusting a second resume attempt.)"
    severity: major
  - description: 'Both dispatched PRs (#508, #509) triggered an automatic "You are now subscribed to PR activity" webhook despite impl agents being explicitly told not to call subscribe_pr_activity and the orchestrator never calling it either.'
    solution: Treat PR-open auto-subscription (for a PR opened under this session's id, even from a worktree subagent) as expected platform behavior, not something to chase as a bug — don't assume subscription only happens on an explicit subscribe_pr_activity call.
    severity: minor
  - description: "The survey subagent again hit large GitHub tracker search payloads requiring saved-file slicing — a recurring, already-documented cost (issues #108/#131/#143/#494)."
    solution: No new fix; existing guidance already covers it.
    severity: nit
  - description: "The survey subagent found that prior sessions' in-log \"already tracked at #X\" self-citations were sometimes wrong (cited #427/#480 for a flake actually tracked at #450) — a self-citation isn't reliably accurate."
    solution: "Treat a session log's own \"already tracked at #X\" self-citation as a lead to verify via a fresh tracker search, not a fact to trust outright — the same discipline CLAUDE.md already asks for subagent/doc-derived claims, just noting it applies to session-log self-citations specifically too."
    severity: minor
