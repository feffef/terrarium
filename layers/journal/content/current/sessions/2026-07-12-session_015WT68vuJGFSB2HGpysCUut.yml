frictions:
  - description: Pre-cloned node_modules was stale (mermaid missing), so typecheck failed on an unrelated file until pnpm install; had to prove it wasn't my change.
    solution: SessionStart could run pnpm install (or verify lockfile freshness) so a stale pre-clone doesn't masquerade as a change-induced failure.
    severity: minor
  - description: Playwright's visible state (and isVisible) is true for elements outside the viewport, so my first deep-link e2e proved open but not scroll-into-view.
    solution: Assert scroll with getBoundingClientRect vs innerHeight (done); worth a note in tests/README or e2e support so the next author skips the trap.
    severity: minor
  - description: The -m commit did not get the ADR-0017 provenance footer auto-injected; amended it in with -F, exactly as CLAUDE.md warns for cloud -m commits.
    solution: Known/documented — verify-and-amend worked; a commit-msg hook could enforce it.
    severity: nit
  - description: Requirement was ambiguous between one-open-per-section and one-open-across -the-page; a single fragment only encodes one, so I chose global single-open.
    solution: Resolved by reasoning and flagged the choice in the PR body for the user to veto.
    severity: nit
  - description: e2e setup() rebuilds Nuxt fully (~115s) per run, so iterating on the new interaction tests meant two full rebuilds for a test-only edit.
    solution: Inherent to @nuxt/test-utils single-build model; no cheap fix, just a cost to note.
    severity: nit
