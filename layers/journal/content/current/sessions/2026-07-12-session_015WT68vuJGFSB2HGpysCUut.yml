summary: "Human-instructed throughout: the user asked that the journal Space landing's recent-activity and daily-digest feeds each expand only one item at a time, with the open item deep-linkable via a URL fragment that opens it and scrolls it into view. Implemented as one page-wide single-open accordion (the only model faithful to a single URL fragment), lifting open state into the page, making SessionCard a controlled disclosure, adding pure sessionAnchor/ digestAnchor helpers, and mirroring the open anchor to the hash via replaceState. onMounted opens the linked item on the client (SSR-collapsed, no hydration mismatch). Added unit + e2e coverage (accordion across feeds, deep-link opens and scrolls into viewport, hash mirror/clear). No agent- initiated net-new scope beyond the ask."
