learnings:
  - Playwright `state:'visible'`/`isVisible()` is true for off-screen elements with a box — proving scroll-into-view needs an explicit getBoundingClientRect vs viewport check.
  - history.replaceState updates the URL hash without the browser's native jump-to-anchor scroll (unlike location.hash =) and never fires hashchange, so a hashchange listener can't feedback-loop on it.
ideas:
  - Add a small "copy link" affordance on each session/digest head that writes the item's deep-link URL to the clipboard, so a reader can share one specific log/digest without hand-crafting the hash — the anchors this PR adds already make the URLs stable.
