frictions:
  - description: The claude-code-remote MCP server's send_later tool flaked twice mid-call ("Tool permission stream closed before response received"), with the server briefly disconnecting/reconnecting around the same calls.
    solution: Fall back to the built-in ScheduleWakeup tool for a self check-in when an MCP-backed scheduling tool repeatedly fails rather than retrying the same flaky call.
    severity: nit
  - description: Initially included kind/status in the triage-essential field list by analogy with the session schema's shape, without checking whether the Skill's own triage logic actually reads them — the user had to point out neither is used.
    solution: When extracting a 'triage-essential' field set for a specific consumer, check the consumer's actual logic for which fields it references before including a field, not just what the source schema happens to offer.
    severity: nit
