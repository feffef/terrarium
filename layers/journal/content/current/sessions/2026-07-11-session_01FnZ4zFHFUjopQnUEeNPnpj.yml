frictions:
  - description: Spec reviewer subagent cited fabricated line numbers (routing.ts:223 in a 96-line file); every citation needed local re-verification.
    solution: Reviewer briefs should restate the never-reconstruct-identifiers rule and require a fresh Read before each cited line.
    severity: minor
  - description: code-review Skill assumes a diff fixed point; the task was a whole-surface review, so the process needed manual adaptation.
    solution: Add an explicit whole-tree mode to the Skill alongside the diff mode.
    severity: minor
  - description: content.nuxt.com and nuxt.com return 403 through the proxy; research fell back to version-pinned docs sources in the official GitHub repos.
    solution: Note the tag-pinned repo-docs fallback in the research Skill.
    severity: nit
  - description: git push rejects any commit touching .github/workflows (no workflow OAuth scope) and the GitHub App contents API 404s on it too — the CI half of the L1 fix is unlandable by agents.
    solution: Grant the integration workflow scope, or document workflow files as human-apply-only with a diff-handoff convention.
    severity: major
  - description: GitHub Actions starts no runners for this repo — three consecutive gate runs died in ~3s with runner_id 0 and no logs; CI cannot verify the PR.
    solution: Human checks Actions billing/spending limit (Settings → Billing); local pnpm gate used as interim verification.
    severity: major
  - description: A fix agent wrote an ADR amendment asserting the gate.yml CI step already existed, which this session could not actually push — caught by the Fable review pass.
    solution: Brief doc-writing agents that claims about CI state must describe what lands in the same PR, not the intended end state.
    severity: moderate
  - description: An early `pnpm gate 2>&1 | tail` run masked the gate's exit code behind the pipe, briefly reading a failed gate as exit 0.
    solution: Check PIPESTATUS (or run without a pipe) when the exit code matters.
    severity: nit
