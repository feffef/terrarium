learnings:
  - Nuxt Content 3 never validates documents against collection schemas at build — zero safeParse calls in the parse/insert pipeline; schemas only drive columns/types.
  - Nuxt's default page key interpolates route params (generateRouteKey), so param-only navigation remounts the page — non-reactive setup captures of params are safe.
  - c12 watchConfig watches only content.config.ts itself, never its imports — a running dev server misses tenant.config.ts edits.
  - A ~3s Actions job failure with runner_id 0 and unavailable logs means the workflow never reached a runner (account/billing level), not a code failure.
ideas:
  - "Add a repo convention + helper for workflow-file handoffs: agents can't push .github/workflows (no workflow scope), so a `docs/proposals/` drop-zone plus a one-line CLAUDE.md rule would replace ad-hoc PR-comment diffs like PR #323's."
