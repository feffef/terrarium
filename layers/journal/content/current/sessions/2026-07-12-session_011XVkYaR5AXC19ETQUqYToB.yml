learnings:
  - The scroll-to-middle was a scroll-anchoring failure — browsers keep content stable only when the collapsing element is fully off-screen; when it straddles the viewport top, collapsing it strands the clicked item above the fold.
ideas:
  - Extract the inline accordion logic in index.vue (open/close + scrollToOpen + hash mirroring) into a reusable useAccordionDeepLink composable, so a third inline-expandable feed can't re-implement (and re-break) the scroll contract.
