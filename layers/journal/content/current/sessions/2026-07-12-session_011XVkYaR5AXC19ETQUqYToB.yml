summary: "User directly asked (human-instructed) to fix two journal Space-landing bugs: (1) expanding an entry scrolled into its middle, forcing a scroll up, and (2) the open daily digest dimmed its summary so it read as disabled. I reproduced both in headless Chromium first. Issue 1 was the one-at-a-time accordion collapsing a taller open entry above the clicked one, stranding it above the fold (measured y=-807); fixed by scrolling the opened item's top into view on toggle, matching the deep-link path. Issue 2 replaced the muted summary with an active treatment (accent bar, tint, bold ink, accent caret). Added an e2e regression test; local gate green. Opened PR and subscribed on user green-light."
