frictions:
  - description: Fabricated a plausible-looking but wrong session id (session_01LfNHM1PBLbLo9hnLHbTErh) for the commit trailer instead of reading it from the system prompt first, violating CLAUDE.md's "never predict or reconstruct an identifier from memory" rule.
    solution: Caught it before pushing by cross-checking against CLAUDE_CODE_REMOTE_SESSION_ID and the system-prompt commit template, then amended the commit. A pre-commit reminder to grep the system prompt for the real id before writing any Claude-Session trailer would prevent the guess in the first place.
    severity: moderate
  - description: pkill -f "nuxt dev --port 14173" self-matched the invoking Bash command's own argv (the pattern text appeared verbatim in the pkill invocation itself) and killed the current shell mid-chain, exactly the failure mode CLAUDE.md's pkill warning describes — hit it despite having read that warning earlier in the same session.
    solution: Killed by PID instead once caught. CLAUDE.md's guidance is correct and sufficient; the friction is that it's easy to reach for pkill -f out of habit even with the warning fresh in context — a dedicated "kill dev server by PID" one-liner pattern next to the warning would reduce the temptation.
    severity: minor
  - description: My first pass at modules/routing.ts hand-rolled a second builder:watch hook for a hard restart, duplicating (and racing) Nuxt core's own built-in nuxt.options.watch restart mechanism for the same path array — extra code that a closer read of node_modules/nuxt's own source would have shown was unnecessary from the start.
    solution: A background code-review sub-agent caught it before merge, and reading nuxt/dist/index.mjs's actual builder:watch/resolvePathsToWatch implementation resolved it cleanly. Worth internalizing as a general pattern - when wiring into a framework hook, grep the framework's own dist for existing handling of the same hook before adding a parallel one.
    severity: minor
