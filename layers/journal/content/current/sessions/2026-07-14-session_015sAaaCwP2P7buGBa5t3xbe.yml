  - description: Two skillsUsed entries ("context", "model") in the scorecard have no matching on-disk Skill directory — had to manually confirm via ls that they are noise in session skillsUsed logging, not real Skills needing an Inventory entry.
    solution: audit-skills.ts could cross-check skillsUsed names against the actual .agents/skills/ directory and flag/filter unmatched names automatically instead of leaving them for manual triage each run.
    severity: minor
  - description: "manuallyRescuedClosures scans ALL history (not windowed), so the same already-fixed, already-tracked incident (session_019pNrz, issue #397/PR #411) will resurface in every future run's scorecard output forever, reading as a live signal even though it is fully resolved."
    solution: Add a resolved/dismissed marker (keyed by session id, or a cutoff tied to the fix's merge date) so a tracked-and-fixed incident stops showing up as fresh scorecard output once its issue is closed.
    severity: minor
  - description: "Phase B's literal \"read every file skillSessionFiles[name] lists\" doesn't scale for essential Skills (close-session: 105 files, log-session: 170 files) — read the post-edit bracket sessions instead and corroborated with the full-history mechanical orphan/rescue signals."
    solution: The Skill's Phase B instructions could cap the deep-read for very-high-usage Skills, or explicitly bless corroborating with the mechanical orphanedSessions/manuallyRescuedClosures signals as a substitute for an essential Skill's full history.
    severity: minor
