frictions:
  - description: Backgrounded `pnpm gate:scoped` piped through `tail` reported exit 0, but the gate had actually failed — the task-notification captured tail's exit code, not the gate's.
    solution: Never pipe a gated command through tail when capturing exit status in a background run; redirect to a file and echo $? separately.
    severity: moderate
  - description: "Local node_modules was stale (missing the `mermaid` dep #364 added to main), so the local gate's typecheck failed with 'Cannot find module mermaid'."
    solution: Run `pnpm install` after fetching a main that added a dependency, before running the local gate; the provisioned node_modules can lag main.
    severity: minor
  - description: GitHub `enable_pr_auto_merge` refused to arm while the required check was in_progress, reporting 'required checks are failing' (in_progress is not failing).
    solution: blog-post step 7 / CLAUDE.md should note auto-merge can't be pre-armed while checks are pending; poll and arm-or-merge once the gate is green.
    severity: minor
  - description: Provenance footer did not inject on the `-m` commit (known cloud quirk); had to amend it in via `git commit --amend -F`.
    solution: Already documented in CLAUDE.md — verify the footer landed after every cloud `-m` commit and amend if absent.
    severity: nit
  - description: Container `date -u` (14:27Z) lagged the newest existing post's hand-set publishedAt (kevin 15:05Z), so the new post sorts second in the reverse-chron feed.
    solution: Rotation still advances (post lands in recent-four), so harmless here; blog-post could clamp publishedAt to max(existing)+1min when the clock lags.
    severity: nit
