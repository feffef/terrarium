frictions:
  - description: Assumed the SSH-key host user (dockeruser) was the Docker operator; it was not, costing several round-trips.
    solution: Read the neighbouring repo's bootstrap doc — the operator is a non-root `deploy` user in the docker group.
    severity: moderate
  - description: Private-repo host clone failed — GitHub no longer accepts password auth, and the user entered an account password.
    solution: Clone over HTTPS with the PAT in the URL (or SSH as a user with a registered key).
    severity: minor
  - description: SSH clone as root failed with publickey denied because the registered key lived in another host user's ~/.ssh.
    solution: Run the clone as the user that owns the key, or use the PAT over HTTPS.
    severity: minor
  - description: docker compose failed with permission denied on docker.sock because the invoking user was outside the docker group.
    solution: Operate as the docker-group `deploy` user; documented as a prerequisite in the deploy README.
    severity: minor
  - description: docker compose up failed — external network `web` was referenced before it existed.
    solution: Run `docker network create web` once before the first up; noted in the README troubleshooting.
    severity: nit
  - description: A fine-grained PAT cannot be created via gh/CLI/API — GitHub only mints them in the web UI.
    solution: Accept the manual web step; `gh auth token` exists but is account-wide and unsuitable for a long-running container.
    severity: nit
  - description: Could not verify the live URL myself — the agent sandbox cannot resolve external DNS (WebFetch ENOTFOUND).
    solution: Relied on the user to curl; a network-permitted fetch path would let the agent self-verify deploys.
    severity: nit
  - description: The canonical `session_01…` id was not exposed in-env (only a CLAUDE_CODE_SESSION_ID UUID, flagged a child session).
    solution: Logged with the UUID, which diverges from prior logs' id format; a stable exposed session id would fix it.
    severity: nit
  - description: startedAt is a hand-estimate — no reliable session-start clock was available to read.
    solution: The deferred autonomous end-of-session trigger should capture true start/end timestamps.
    severity: nit
