outcome: Live at terrarium.feffef.de; PR #24 merged
summary: >-
  Planned and shipped a PoC deployment on the operator's Hetzner Docker host: a
  thin runner+builder container that clones main via a read-only PAT, builds it,
  serves a decoupled copy of .output, and self-updates on each push with a
  background build + atomic swap (a failed build never swaps). Fronted by the
  existing shared Caddy over an external `web` network — no host port published.
  Added ADR-0011 for the scoped relaxation of ADR-0001's immutable-image model.
  Brought it up live from the feature branch, validated public HTTPS 200 and the
  full self-update loop end to end, then merged PR #24 and switched it to main.
