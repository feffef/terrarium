summary: "User asked (direct prompt via /grill-with-docs) that inline links in blog posts to earlier blog posts use the site's own /t/blog/<persona>/<slug> route instead of a GitHub blob URL, and that the blog-post Skill's instructions be updated accordingly. Ran a grilling session (scope, regression-guard test, ADR-need) confirming: posts-only scope, extend the existing immutable-links test, no ADR needed. A research subagent found 3 existing GitHub-blob links to sibling posts; I found and fixed a 4th it missed, then exhaustively re-verified across all 136 github.com links in layers/blog/content that none remain. Updated .agents/skills/blog-post/SKILL.md with a carve-out bullet, added a clause to layers/blog/CONTEXT.md, extended layers/blog/tests/unit/blog-immutable-links.spec.ts to forbid future regressions, fixed the 4 links, ran pnpm gate:scoped (full gate, all green), committed, pushed, and opened PR #391. All decisions (scope, test guard, no ADR, proceed) were explicit human confirmations via AskUserQuestion, not agent-initiated judgment calls. Gate came back green, the change fell under the blog-post auto-merge tier (doc/content/test-only, no high-risk files), and I merged it directly — PR #391 is merged."
