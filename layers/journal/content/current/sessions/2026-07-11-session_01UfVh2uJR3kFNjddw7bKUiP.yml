summary: "Autonomous audit-docs Routine. Fanned out four read-only lenses (drift, duplication, contradiction, ambiguity), pooled 8 candidate findings, and an independent fact-checker CONFIRMED all 8 against primary sources. Fixed the 6 live-doc findings, cleared pnpm gate, opened PR #294, and self-merged it per the audit-docs Skill's bounded auto-merge grant (no human-only surface touched). The remaining 2 findings amended ADR-0003/0005 (retiring the drift-check job, whose premise ADR-0014 eliminated) and ADR-0010 (a stale audit-skills scheduling claim contradicting ADR-0015) — ADRs are human-only (ADR-0004), so PR #295 was opened separately, not self-merged. The repo owner then reviewed #295 and asked for a different fix style: replace the wrong ADR text in place instead of layering amendment banners, since banners were pure overhead for a plain factual correction. That conflicted with the repo's documented \"never rewrite an ADR, only amend\" convention (CLAUDE.md, ADR-0018, audit-docs/SKILL.md), so I asked a clarifying question on the PR before acting rather than deciding unilaterally; the owner confirmed \"for this PR only,\" so I reverted the banners to in-place edits scoped strictly to this PR, left the broader convention docs untouched, re-ran the gate (green), pushed, and synced the PR description. A human then reviewed and merged #295. Both PRs from this run are now merged; no needs-triage issue was needed anywhere in the sweep."
