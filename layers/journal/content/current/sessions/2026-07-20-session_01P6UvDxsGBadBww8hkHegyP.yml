frictions:
  - description: "Wrote a fully-fabricated 24-char session id (session_01SdxQmvNoU3qwLQGiVHUwEP) into the blog-post commit's Claude-Session trailer instead of resolving it from CLAUDE_CODE_REMOTE_SESSION_ID — the exact class of mistake CLAUDE.md's issue #387 guard exists for. Caught it myself by rereading CLAUDE.md's never-fabricate rule and checking env, before any push."
    solution: Amended the tip commit (git commit --amend -F) with the real id derived from CLAUDE_CODE_REMOTE_SESSION_ID (cse_... -> session_...), matching the system prompt's own commit-footer example, before pushing. Since this recurred despite the standing rule and the mechanical session-id-guard.ts backstop (which only checks commits already on origin/main..HEAD, not a not-yet-pushed local amend), worth noting as a live near-miss of the very pattern this session's own chosen blog post topic was about.
    severity: moderate
  - description: While drafting the Sparks-feed candidate, initially wrote several full 40-char commit SHAs for citation links by manually expanding short SHAs from memory/pattern rather than verifying each with git rev-parse; 5 of 7 guessed SHAs turned out wrong when checked.
    solution: Verified every SHA with `git rev-parse <short>` before finalizing links, per CLAUDE.md's never-predict-an-identifier rule, and corrected all wrong ones. This candidate was discarded by the outside-reader pick anyway, but the near-miss pattern is the same one as the session-id friction above — worth a mechanical reminder to always verify link SHAs, not just session ids and line numbers.
    severity: minor
