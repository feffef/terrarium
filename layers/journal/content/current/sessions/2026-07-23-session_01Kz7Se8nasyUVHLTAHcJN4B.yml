frictions:
  - description: Did not invoke close-session/log-session at PR-open time as CLAUDE.md's "Opening the PR is the first session log" requires — this is the first log-session call of the whole session, made only at final merge, after getting absorbed in the babysit-to-green CI-failure loop right after opening.
    solution: Treat "PR just opened" as a hard trigger to invoke close-session immediately, even mid-babysitting a CI failure — re-invoking later to update is cheap, so there's no reason to defer the first call.
    severity: moderate
  - description: First e2e test asserted a negative ("no session is external yet") grounded in a point-in-time read of real, live-changing repository content — it went stale between authoring and CI running because another concurrent agent session's fork-PR merged a real external session log in between.
    solution: Rewrote as a positive assertion tied to the specific known external session's goal text vs. an ordinary session's, which can't go stale the same way.
    severity: minor
