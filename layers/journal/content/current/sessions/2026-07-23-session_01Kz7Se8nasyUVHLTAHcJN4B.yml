learnings:
  - This repo's e2e tests read real, live-changing repository content rather than fixtures — an 'X doesn't exist yet' assertion races every other concurrently-active agent session and will eventually go stale; prefer assertions tied to specific existing content.
  - The CI gate's 'safety-gate green on <sha>' bot comment references the PR's synthetic merge-commit SHA, not the branch head SHA that pull_request_read get_status reports against — get_check_runs is the reliable per-push check result.
ideas:
  - "A lint/review nudge (or a tests/README.md callout) warning against 'nothing matches yet' e2e assertions, given how fast real content here changes underneath an open PR — would have caught this session's friction #2 before it shipped."
