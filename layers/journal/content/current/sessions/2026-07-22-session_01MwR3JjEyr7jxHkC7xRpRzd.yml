summary: "Human-instructed: review issue #642, iterate/improve the cross-Tenant read-model design, add an aggregator to validate it beyond the dollhouse. Built collection kinds (a registry — an improvement over the proposal), a derived #catalog on the ADR-0014 pattern, queryAcrossTenants, and a Search Tenant; opened PR #643. The user then directed a restructure (chose the name \"commons\", asked for a Timeline Space): folded Search into a Commons aggregator with Search + Timeline Spaces. Then, human-directed: added session logs + digests to the timeline (promoting the session-log shape to a shared `session` data kind); ran two fable-model subagents (adversarial review, then finalize) that adopted minimum-contract kinds and moved the Timeline adapters into the Commons layer; and made queryAcrossTenants a pragmatic generic (projector, no type-inference). Every direction was the user's; the mechanics were agent judgment. Recorded as ADR-0025."
