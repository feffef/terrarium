frictions:
  - description: "queryCollection's generic can't narrow a runtime catalog key, so the cross-collection read needed a documented cast boundary (the typing question #642 flagged)."
    solution: Cast to keyof PageCollections once, documented — like resolveSpaceRoute's single cast.
    severity: minor
  - description: Strict tsc caught test-only type errors (noUncheckedIndexedAccess on the catalog record, satisfies-narrowed KINDS.page.schema) only in the full gate, not the earlier typecheck run.
    solution: Run pnpm typecheck after adding test files, not only after the impl.
    severity: minor
  - description: An e2e filter assertion was too strict — it required every filtered row's provenance to be marquee, but the search filter also matches title/description, so a valid hit failed it.
    solution: Assert the needle appears somewhere in each row's visible text, matching filter semantics.
    severity: minor
  - description: The Timeline redirect meant renaming a just-built and just-PR'd Search Tenant into a Commons Tenant — real rework, though normal design iteration, not a process defect.
    solution: Grill the aggregator's shape (one Tenant vs many, naming) before building it out.
    severity: minor
  - description: scripts/log-session.ts reads journal.collections.sessions.schema directly, which blocks cleanly migrating sessions to a kind — the Timeline surfaced this coupling and constrained the design.
    solution: "Resolved this session: relocated the schema to a shared session kind (behaviour-neutral); minimum-contract kinds later removed the forced-relocation constraint entirely."
    severity: moderate
  - description: A backgrounded gate wrapped its pnpm call then echoed an exit line, and the harness notification reported the wrapper's exit (0), masking the real pnpm failure (1) momentarily.
    solution: Check the piped/redirected command's own exit code directly, per CLAUDE.md's tail-piping rule.
    severity: nit
  - description: A `satisfies Record<...>`-narrowed KINDS literal broke a test loop twice (property `.schema` absent on the page-narrowed branch) — the second time only caught by the full gate's strict tsc.
    solution: Iterate kind entries typed as KindDef[], not the narrowed literal, when reading optional fields.
    severity: minor
  - description: Including sessions forced relocating the ADR-0009 session schema and touching log-session.ts — the exact coupling I had flagged and deferred one turn earlier; the user overrode the deferral.
    solution: The schema-relocation was behaviour-neutral and gated; the deferral was over-cautious given the ask.
    severity: minor
