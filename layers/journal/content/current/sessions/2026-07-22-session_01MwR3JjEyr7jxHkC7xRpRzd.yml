learnings:
  - "@nuxt/content exports PageCollections/PageCollectionItemBase — the clean way to type a cross-collection page query is casting the key to keyof PageCollections."
  - The page type already guarantees title/description/path across Tenants, so a page kind needs no schema — the marker-vs-schema asymmetry falls out of CollectionDef's existing page/data split.
  - A satisfies Record<...> narrows a marker literal so .schema isn't a readable property — a test must assert via the whole literal, not property access.
  - Relocating the ADR-0009 session schema to a shared `session` kind was behaviour-neutral because every consumer (log-session.ts, session-end.ts, the dashboard) routes through validateEntry/generated types, not the manifest object — so sourcing the identical schema from a new home changed nothing observable.
  - A caller-supplied projector makes queryAcrossTenants generic over any kind without a KindItem<K> type-inference that fights Nuxt Content's per-collection generics — and projecting inside the fan-out drops page body ASTs from the aggregated corpus for free.
  - Zod .merge() across two jiti module instances silently breaks strip-unknown-keys (its catchall instanceof ZodNever check fails cross-instance, turning strip into reject-as-never) — a subagent hit this merging a kind contract into a manifest schema; local.extend(missing-contract-fields) is the one-class fix.
ideas:
  - A 'recent everywhere' rail on the platform home that reuses the Commons Timeline's cross-Tenant read to surface the newest N entries — the aggregator's first appearance outside its own Tenant.
  - "A Tenant-identity manifest block (display name, tagline, accent) surfaced through the catalog (or a #tenants projection), so a future directory/dollhouse view themes each room from a single home instead of a hardcoded map — the last gap for an honest dollhouse (ADR-0025 deferred list)."
  - "Split the catalog opt-in bit by purpose: `kind` conflates 'searchable/aggregatable' with 'publicly enumerable', so a sitemap has no clean source today — either a #routing-derived enumeration read or a purpose-scoped exposure flag (ADR-0025 deferred list)."
