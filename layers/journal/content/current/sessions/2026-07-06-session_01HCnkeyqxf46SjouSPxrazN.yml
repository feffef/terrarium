  - description: This session's authored scratch never became a committed log — no sessions/ entry on main after the web freeze/resume; the scratch was lost.
    solution: The scratch lives in gitignored, container-local .session-logs/, so a container reclaim on resume erases it before a teardown commits. The SessionEnd hook also swallows all errors (session-end.ts:148), so a failed land is silent. Consider a resume-time recovery path or a non-cosmetic surfacing when a scratch is dropped without landing.
    severity: major
  - description: An early cd into the skills dir silently changed the shell's persistent cwd, so later repo-root greps failed with "No such file or directory".
    solution: CLAUDE.md warns cd in a compound command is risky; a stronger note to use absolute paths in Bash (never a bare persistent cd) would have avoided it.
    severity: minor
  - description: Had to Read four .yml files the Edit tool refused to touch after I'd only cat'd them via a for-loop, forcing a re-read.
    solution: Known CLAUDE.md guidance (inspect with Read, not cat); I violated it by batch-catting for overview. Use Read from the start for anything editable.
    severity: nit
