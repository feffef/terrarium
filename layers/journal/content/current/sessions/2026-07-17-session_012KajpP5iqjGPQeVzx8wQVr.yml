frictions:
  - description: guest-intake's disable-model-invocation rejects the Skill tool even when the human explicitly typed /guest-intake or /loop'd it, forcing manual re-execution of SKILL.md's procedure every single firing
    solution: Document in CLAUDE.md/the /loop skill that a disable-model-invocation Skill must be followed by hand when fired via /loop, not routed through the Skill tool — or reconsider the flag for Skills specifically designed to be loop-fired
    severity: moderate
  - description: The subagent-delegated full sweep (issue_read get + get_comments per open issue) cost ~190k tokens / 50+ tool calls per pass on a 25-issue queue with zero guest activity, twice in a row — expensive for a tight-interval loop
    solution: Built scripts/guest-intake-scan.ts to fetch+classify every open issue's newest activity in one script call; verified it matches both prior subagent sweeps exactly, in ~12s
    severity: major
  - description: Node's global fetch() silently bypasses this environment's HTTPS_PROXY and gets an unauthenticated 401 straight from api.github.com even with a valid GH_TOKEN; NODE_USE_ENV_PROXY=1 fixes it but only if set before the process starts, not via process.env at runtime
    solution: Shelled out to curl (already proven to honor HTTPS_PROXY automatically in this environment) for the REST fallback instead of fetch, avoiding both the proxy gap and a new undici dependency
    severity: moderate
  - description: AskUserQuestion's options array requires every entry to be an object; passed one as a raw JSON string by mistake and the call errored
    solution: Fixed on retry — re-check each options[] entry is a real object, not an accidentally-stringified one, before calling
    severity: nit
  - description: The system prompt points at /root/.ccr/README.md for proxy-related tool failures, but reading it (cat) was denied by the auto-mode classifier — the documented remedy path was itself unreachable
    solution: Worked around by experimenting directly (curl vs fetch, NODE_USE_ENV_PROXY) rather than reading the README; flagging since the pointer is dead for a session running under this classifier
    severity: minor
