summary: "User asked me to check why the main-branch safety gate had failed on GitHub. I found the failing commit was session-log-only (couldn't have caused a real regression) and 37/38 e2e tests passed, confirmed it as flakiness, and re-ran the failed job — it went green. User then explicitly asked me to investigate the flake's actual root cause and fix it properly rather than just re-run. I traced it to expect.poll's 1000ms default timeout racing the journal Space's pinTopAcrossTransition rAF settle loop (allowed up to 90 frames by design), raised the poll timeout to 5000ms on both affected assertions, verified locally (build + full e2e pass), and opened PR #410, which the user then merged."
