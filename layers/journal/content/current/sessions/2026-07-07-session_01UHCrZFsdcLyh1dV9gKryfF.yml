  - description: An unresolved auto-imported component renders silently as an unknown element in prod - neither vue-tsc nor the e2e h1/hydration checks catch a typo'd name.
    solution: Verified via ad-hoc Playwright HTMLUnknownElement probe this session; filed issue 212 to make it a permanent L2 assertion.
    severity: minor
  - description: First send_later call failed with a transient "permission stream closed" error; the identical retry succeeded.
    solution: Environment-side hiccup; nothing repo-side - retry once before assuming unavailable.
    severity: nit
