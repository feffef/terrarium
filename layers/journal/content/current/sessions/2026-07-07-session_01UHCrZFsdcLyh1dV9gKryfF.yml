learnings:
  - Nuxt 4 resolves the main component only from each layer's app/ dir; a repo-root app.vue is silently ignored and Nuxt's runtime app.vue (with NuxtRouteAnnouncer) serves instead
  - vue-tsc accepts template component names it cannot resolve, so auto-import renames need a rendered-DOM check (HTMLUnknownElement probe), not just typecheck
