learnings:
  - "The ground-truth session id is reachable from repo code two ways — `CLAUDE_CODE_REMOTE_SESSION_ID` (cse_→session_) and the transcript's own sessionId — via `resolveGroundTruthSessionId` (PR #533), which #387's guard reuses rather than re-deriving."
  - "A merged PR's `Closes #N` keyword can silently close some referenced issues and not others (closed #292/#349, missed #325) — leaving a done issue stranded open."
ideas:
  - "Add a triage-drift check (extend `scripts/check-triage-drift.ts` or `audit-skills`) that cross-references merged-PR closing keywords against open-issue state and flags any `Closes #N` whose issue is still open — the exact drift that stranded #325 as open despite PR #352 having shipped it."
