summary: "Human-instructed: the user directly asked to add a Tenant called \"commits\" that shows the repo's latest commit message at runtime via a backend git-CLI call, with one Vue file plus TypeScript. Built it as a minimal Tenant — a manifest (one Space, one pages collection), a Nitro endpoint that shells out to `git log -1` and degrades to a fallback, one MDC component that fetches it during SSR and renders the subject in large font, and a landing index.md embedding it. Added the Tenant CONTEXT.md and roster/context-map entries. Verified the runtime read end-to-end with a preview screenshot and the full local gate (419 unit + 43 e2e, lint, typecheck, validate:content, build). Committed and pushed to the designated branch. Initially held the PR (see friction) then opened PR 488 on the user's confirmation; babysitting it to merge."
