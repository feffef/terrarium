learnings:
  - Nuxt Content resolves MDC block components (`::latest-commit`) from a layer's `app/components/content/` dir automatically — no explicit global registration needed.
  - A `data` collection isn't required for a Tenant; a single `page` collection with one index.md satisfies the manifest and gives the L2 smoke sweep its `<h1>`.
