learnings:
  - The GitHub App's own auto-appended PR-body footer ("_Generated by [Claude Code](https://claude.ai/code/session_01…)_") is a platform-verified, independent source for a session's canonical id — more trustworthy than either the transcript's own internal sessionId field or a recalled tool-description example, since the App backend stamps it server-side from the real session identity.
  - CLAUDE_CODE_REMOTE_SESSION_ID (env, `cse_XXX...`) normalizes onto the canonical `session_XXX...` id by simple prefix replacement — confirmed directly against this sandbox's own environment and cross-checked against the GitHub App's PR-footer id. CLAUDE_CODE_SESSION_ID (no REMOTE) is a different variable entirely — the local CLI transcript's own internal id, which only coincides with the canonical id on a plain local CLI session with no CCR wrapper.
ideas:
  - "A harness-level marker (env var or similar) exposed to a dispatched Agent-tool subagent's own Bash calls, distinguishing \"this invocation is a dispatched subagent, not the orchestrator\", would close the one honest blind spot left in the isLinkedWorktree guard in scripts/log-session.ts (issue #449 Gap 4) — it only catches a subagent that correctly cd's into its own worktree before authoring a session log, not one that forgets and runs from the shared root."
