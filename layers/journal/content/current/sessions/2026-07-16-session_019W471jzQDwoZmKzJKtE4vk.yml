frictions:
  - description: Designed and implemented Gap 5's back-catalog rewrite (repairing 19 already-landed session logs) without first re-reading ADR-0009 in full, and only discovered the collision with its explicit "entries are never rewritten... rewriting history is forbidden by this ADR" clause when an independent Standards-axis review caught it after the fact.
    solution: CLAUDE.md already says "read docs/adr/ ... before any planning or structural work" — for a task whose issue text explicitly proposes rewriting historical content, that ADR read should happen BEFORE design, not be caught downstream by review. A sharper prompt would be treating "the issue's own acceptance criteria implies mutating committed content" as an explicit trigger to re-check the relevant ADR first.
    severity: major
  - description: "At closure, resolved this session's own canonical id WRONG — used the live transcript's own `sessionId` metadata field (a raw UUID) for the git commit Claude-Session footers and the authored session log, when the actual canonical id (confirmed only afterward, via the GitHub App's own auto-appended PR-body footer) was the session_01…-format id from the system-prompt commit-message instructions. This landed one session log under the wrong filename/session field on main, and left two already-merged commits (PR #531) with an unfixable wrong Claude-Session URL in their footer — rewriting merged main history to fix it was correctly ruled out as worse than leaving it."
    solution: "The log-session Skill already says to resolve the id from \"the commit-footer template\" specifically, not the transcript — but nothing actively warns that the transcript's own sessionId field can look equally plausible and disagree. Add an explicit cross-check step to log-session/close-session: when a live transcript is being read for other reasons anyway (as this session did), compare its sessionId against the id already used in this session's own prior commit footers *before* trusting either, and prefer whichever one a GitHub-side artifact (an auto-generated PR footer, a webhook payload) can independently confirm."
    severity: major
  - description: The provenance footer did not auto-inject on the first `git commit -m` in this cloud session (a documented, known-possible gap per CLAUDE.md), requiring a manual amend to add it.
    solution: Already covered by CLAUDE.md's existing guidance to verify and amend when absent — no new fix needed, just another confirmed instance.
    severity: nit
