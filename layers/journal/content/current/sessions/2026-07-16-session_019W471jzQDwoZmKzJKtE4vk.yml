frictions:
  - description: Designed and implemented Gap 5's back-catalog rewrite (repairing 19 already-landed session logs) without first re-reading ADR-0009 in full, and only discovered the collision with its explicit "entries are never rewritten... rewriting history is forbidden by this ADR" clause when an independent Standards-axis review caught it after the fact.
    solution: CLAUDE.md already says "read docs/adr/ ... before any planning or structural work" — for a task whose issue text explicitly proposes rewriting historical content, that ADR read should happen BEFORE design, not be caught downstream by review. A sharper prompt would be treating "the issue's own acceptance criteria implies mutating committed content" as an explicit trigger to re-check the relevant ADR first.
    severity: major
  - description: "At closure, resolved this session's own canonical id WRONG — used the live transcript's own `sessionId` metadata field (a raw UUID) for git commit Claude-Session footers and the authored session log, when the actual canonical id (confirmed via the GitHub App's own auto-appended PR-body footer, then independently via CLAUDE_CODE_REMOTE_SESSION_ID) was the session_01…-format id. Landed one session log under the wrong filename, and left two already-merged commits (PR #531) with an unfixable wrong footer URL — rewriting merged main history to fix it was correctly ruled out as worse than leaving it."
    solution: "Fixed properly this session, not just proposed — scripts/session-trace.ts now resolves `session` from ground truth (CLAUDE_CODE_REMOTE_SESSION_ID, normalized, else the transcript's own sessionId) and that value always wins over whatever gets typed, so this exact mistake can no longer land a mis-filed log (PR #533)."
    severity: major
  - description: Every extractTrace()/handle()/recoverDroppedScratch() test that asserted a specific synthetic session id silently broke once the fix started resolving from real ambient env — because this sandbox itself is a live CCR session with a real CLAUDE_CODE_REMOTE_SESSION_ID set, developing session-log tooling FROM WITHIN a live session means tests must explicitly isolate from the very env var the feature reads.
    solution: "Threaded an injectable `env` parameter (default `process.env`) through every affected function and updated every test call site to pass an explicit empty override — a pattern worth remembering for any future change to this file: assume the dev sandbox's own live session state can leak into test defaults."
    severity: minor
  - description: The provenance footer did not auto-inject on the first `git commit -m` in this cloud session (a documented, known-possible gap per CLAUDE.md), requiring a manual amend to add it.
    solution: Already covered by CLAUDE.md's existing guidance to verify and amend when absent — no new fix needed, just another confirmed instance.
    severity: nit
