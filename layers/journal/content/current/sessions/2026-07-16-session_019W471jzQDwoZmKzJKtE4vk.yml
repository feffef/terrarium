learnings:
  - The GitHub App's own auto-appended PR-body footer ("_Generated by [Claude Code](https://claude.ai/code/session_01…)_") is a platform-verified, independent source for a session's canonical id — more trustworthy than either the transcript's own internal sessionId field or a recalled tool-description example, since the App backend stamps it server-side from the real session identity.
ideas:
  - A harness-level marker (env var or similar) exposed to a dispatched Agent-tool subagent's own Bash calls, distinguishing "this invocation is a dispatched subagent, not the orchestrator", would close the one honest blind spot left in the new isLinkedWorktree guard in scripts/log-session.ts — it only catches a subagent that correctly cd's into its own worktree before authoring a session log, not one that forgets and runs from the shared root.
