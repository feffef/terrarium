learnings:
  - curl already respects this environment's HTTPS_PROXY/CA bundle with no special flags; Node's built-in fetch needs NODE_USE_ENV_PROXY=1 set before process start, which a running script can't do to itself.
  - GitHub's REST issues-list endpoint returns author_association directly per issue — ADR-0020's Public/Trusted split is a plain REST field, no GraphQL needed.
  - author_association/footer-absence (this repo's AI-vs-human signal) proves who typed a comment, not whether what they typed reflects real intent — a genuinely human comment can still be the human deliberately testing the system, and a session's own unverifiable "confirmed elsewhere" claim needs independent verification before it's treated as settled, same as any other subagent-derived claim.
ideas:
  - Have a merged guest-build PR trigger a short blog post from one of the existing blog Tenant Personas narrating the guest's request and what got built — turns each successful guest-demo cycle into content for the meta-blog that already exists to narrate the Platform's own build, closing the loop between the demo and its own documentation.
