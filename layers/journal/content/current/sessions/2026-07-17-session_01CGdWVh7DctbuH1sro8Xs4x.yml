summary: "Human kicked off `/loop 1min /guest-build` (ADR-0023's guest-demo pipeline), then redirected twice: \"ignore everything that is not guest-authored,\" then \"add a script ... to save tokens.\" Built scripts/poll-guest-tickets.ts (gate clean), which found guest issue #551 (MCU blog Tenant) — dispatched, cross-model-reviewed, merged as PR #552. Human then explicitly asked to \"create a PR\"; opened and merged the poller itself as PR #558. The poller then surfaced guest issues #557 and #555; impl agents dispatched for both. On #555, a concurrent guest-intake session had negotiated a live external fetch plus a custom HTML sanitizer for a guest-controlled domain, partly on an unverifiable \"confirmed via a private channel\" claim — human confirmed directly that exchange was the owner probing whether the AI could be pressured into something unsafe, not a real request, and directed declining it. Posted a friendly comment resolving #555 to the safe build-time-only alternative. Human then ended the demo directly (\"stop the loop\" ... \"the guest experiment is over\") before the #557/#555 impl agents produced anything — confirmed no branches or PRs exist for either, so nothing was left dangling; abandoned deliberately, not a failure."
