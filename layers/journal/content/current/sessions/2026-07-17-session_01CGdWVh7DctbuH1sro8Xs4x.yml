summary: "Human kicked off `/loop 1min /guest-build` to run the guest-demo build pipeline (ADR-0023) on a tight interval. First pass surfaced 5 ready-for-agent issues, all owner-authored — the human then explicitly redirected: \"ignore everything that is not guest-authored.\" Second human ask: \"add a script that does the polling for new tickets to save tokens,\" since firing the full model-driven guest-build scan every tick was wasteful. Built scripts/poll-guest-tickets.ts (+ unit tests) as a plain gh api/curl pre-filter — Public authorAssociation (ADR-0020) plus a not-yet-linked-PR check via issue timeline events — gated:scoped clean, committed and pushed to claude/guest-build-loop-bvlj0n (no PR opened — not asked for one). Running it live found a genuine guest issue, #551 (a guest-intake-confirmed MCU movie-blog request), agent-initiated from there per the loop's own standing green-light (ADR-0023): dispatched a worktree-isolated Sonnet impl agent, which scaffolded a new `marquee` Tenant with 5 posts and original hand-drawn SVG illustrations, opened PR #552. Ran an Opus cross-model review (required since the orchestrator is itself Sonnet), posted the verdict, handed off to the owner — who merged it. The `/loop` cron keeps polling for further guest activity."
