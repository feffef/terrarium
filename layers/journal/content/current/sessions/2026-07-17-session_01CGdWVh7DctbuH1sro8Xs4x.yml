learnings:
  - curl already respects this environment's HTTPS_PROXY/CA bundle with no special flags; Node's built-in fetch needs NODE_USE_ENV_PROXY=1 set before process start, which a running script can't do to itself.
  - GitHub's REST issues-list endpoint returns author_association directly per issue — ADR-0020's Public/Trusted split is a plain REST field, no GraphQL needed.
ideas:
