frictions:
  - description: guest-build's SKILL.md and ADR-0023 explicitly say it's meant to be fired via a Routine or /loop, but the Skill tool itself hard-refuses it (disable-model-invocation) with no carve-out for that exact case — had to re-implement its documented procedure by hand instead of invoking the Skill.
    solution: Either drop disable-model-invocation for guest-build now that /loop is a documented legitimate firing path, or add an explicit note (in SKILL.md or the tool's own refusal message) on how a /loop-driven session should proceed when the Skill tool itself refuses.
    severity: moderate
  - description: Node's built-in fetch (undici) silently 401s through this environment's proxy unless NODE_USE_ENV_PROXY=1 is set before the process starts — too late to set from inside the running script. check-triage-drift.ts's existing gh-less REST fallback uses the same fetch pattern and inherits this same latent bug, not just the new script.
    solution: Switch check-triage-drift.ts's REST fallback to curl too (the fix applied in poll-guest-tickets.ts), or file an issue so it doesn't stay a silent landmine for the next gh-less environment.
    severity: major
  - description: CronCreate/CronList state (session-only, in-memory) was empty on at least two separate turns after what the environment surfaced as a session-resume event, silently dropping the recurring /guest-build job mid-loop.
    solution: No fix available from inside a session — worth a documented expectation (CLAUDE.md or a docs/agents note) that a /loop cron job in this environment can vanish across a resume and should be defensively re-checked, not just assumed to persist for its stated 7-day lifetime.
    severity: moderate
  - description: Asked the user via AskUserQuestion how to handle non-guest-authored ready-for-agent issues (epics, one touching CI) — over-scoped the question; the actual answer was a much simpler blanket rule ("ignore everything that is not guest-authored").
    solution: Lead with the simplest framing (authorship alone) before layering in per-issue nuance.
    severity: nit
  - description: Tried subagent_type 'code-reviewer' for the cross-model review dispatch (matching the /code-review skill's name) — not a registered agent type in this session; fell back to general-purpose with an explicit model override.
    solution: general-purpose + an explicit model param works fine for this; not worth chasing further.
    severity: nit
