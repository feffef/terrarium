frictions:
  - description: mermaid was declared in package.json but absent from node_modules, so the dev/preview render 500'd ("failed to resolve import mermaid") until a fresh pnpm install.
    solution: Run pnpm install before previewing a diagram page; the pre-cloned container's node_modules can miss a dynamically-imported dep.
    severity: minor
  - description: mermaid subgraphs clip cross-lane arrows at the box border, so "group with boxes" and "arrows land on the exact node" are mutually exclusive — found empirically over several render iterations.
    solution: Group by node border colour (classDef stroke) instead of subgraphs; worth a short note in a diagram-authoring doc so the next agent skips the loop.
    severity: minor
  - description: The default full-page screenshot renders the diagram too small to read edge labels/arrowheads; needed an ad-hoc high-DPI element screenshot.
    solution: A preview.ts flag to shoot a single selector at a higher device scale factor would save writing a throwaway playwright script each time.
    severity: nit
  - description: "`preview.ts shot` failed to start its own server while a persistent `preview.ts start --dev` server was already running (port/startup race)."
    solution: Reuse the running server's port for ad-hoc shots, or have `shot` detect and reuse an existing preview server.
    severity: nit
