learnings:
  - A wide one-row mermaid graph is downscaled to the article column width (SVG max-width), shrinking its text; a narrow/tall layout renders at native size — orientation, not font-size, is the real legibility lever.
  - A classDef that sets only `stroke` preserves the theme-driven fill, so nodes can be colour-grouped without breaking light/dark theming.
  - In mermaid, an edge into a node inside a subgraph terminates at the cluster border; removing the subgraph makes the arrowhead land on the node itself.
