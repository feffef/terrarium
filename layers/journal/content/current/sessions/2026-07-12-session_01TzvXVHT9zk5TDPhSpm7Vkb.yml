learnings:
  - "Chromium --virtual-time-budget=<ms> is the headless-native wait-before-screenshot: advances page timers up to N ms, then captures."
  - Vue <ClientOnly> attaches its default-slot DOM on a queued microtask AFTER both child and parent onMounted fire, so a parent onMounted reading a ref inside that slot reads null; watch the ref instead.
  - components/content/ overrides resolve Platform-wide regardless of which layer's directory they sit in (override priority, not per-Tenant scoping).
  - "A Platform-generic component can theme from a Tenant without coupling to its token names: read an opt-in --diagram-* contract via getComputedStyle; the Tenant maps its own tokens to it via var(), so dark-mode overrides flow through for free."
  - "Mermaid themes via initialize({ theme: 'base', themeVariables: { primaryColor, primaryBorderColor, primaryTextColor, lineColor, fontFamily } }); pass themeVariables only when resolved so non-opted callers keep the default theme."
ideas:
  - Add a content-derived e2e sweep that asserts every page containing a ```mermaid fenced block renders a .mermaid-diagram svg with no console errors, so future diagrams are covered automatically without a hand-written per-page assertion — mirroring how the entry-route sweep is derived from manifests.
