frictions:
  - description: "Local e2e passed 45/45 while CI failed deterministically on the same test, and I MISDIAGNOSED it twice (event-wait, then premature-settle) before the real cause. Root difference was environmental: local browser scroll anchoring (overflow-anchor) absorbed the reflow and hid a test bug — Playwright's locator.click() auto-scroll — that CI (anchoring suppressed) exposed. Two PR→CI round-trips burned before I reproduced it locally."
    solution: For any e2e that measures scroll/layout position, reproduce the CI environment by disabling scroll anchoring (overflow-anchor:none) locally BEFORE trusting a green run; and open a card via dispatchEvent, never locator.click(), when the test asserts on scroll position. Worth a line in docs/agents/verifying-ui-changes.md (scroll anchoring can mask position bugs).
    severity: major
  - description: Could not reproduce the CI failure under 6x CPU throttling (both old and new code held at Δ=0.0) — I chased a frame-timing/premature-settle theory that was real but secondary, delaying the actual cause (click auto-scroll).
    solution: The discriminating knob was overflow-anchor, not CPU throttle. When a position-assert e2e passes locally but fails on CI, vary rendering-env flags (scroll anchoring, reduced motion, viewport) — not just timing. Noted the caveat honestly in the PR body rather than overclaiming local proof.
    severity: minor
