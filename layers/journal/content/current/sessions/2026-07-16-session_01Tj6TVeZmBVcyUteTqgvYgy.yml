learnings:
  - Dispatching a DOM CustomEvent when an rAF settle loop completes lets an e2e await the exact end of an animation deterministically — the proper fix for a settle-race flake, versus a longer expect.poll timeout that only widens the race window.
  - An rAF loop that exits when its tracked position stops changing is unsafe if that motion starts a frame or two late — it can settle before the motion begins; bound such a loop by the known transition duration (wall-clock, matching the CSS transition) instead, so it cannot exit early and self-caps.
  - A flaky-anchoring failure value is itself diagnostic — after minus before equalling the exact height of the collapsed element (zero compensation) pinpoints a no-op pin, distinguishing a premature settle from a scroll-clamp or a measurement issue.
