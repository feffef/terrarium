outcome: "Real cause (Playwright click auto-scroll vs scroll anchoring) fixed; PR #537"
summary: "The user asked me to properly address a known flaky test (tracked loosely under issue #450) — firing an event to wait for rather than extending the wait time. Session logs showed a prior session (PR #410) had only raised the two journal-dashboard \"held in place\" e2e assertions' `expect.poll` timeout from 1000ms to 5000ms — the exact band-aid the user rejected. Root cause: `pinTopAcrossTransition`'s rAF counter-scroll settles over up to 90 frames, so a loaded CI runner can outrun any fixed budget. Per the user's direction I made the production code dispatch a `PIN_SETTLED_EVENT` on `window` when its settle loop finishes (every exit path), extracted the pure function + event name into `utils/expandTransition.ts` to single-home the open animation, and rewrote the two tests to arm a one-shot listener before the click and block on it — waiting exactly as long as the animation takes. Full local gate green (lint, typecheck, unit, content, e2e 45/45 incl. both formerly-flaky tests). Committed and pushed to the designated branch. Then, at the user's request, ran /code-review (two parallel axes): Spec found no defects (faithful, correct, in-scope); Standards flagged one Duplicated-Code cast, which I deduped via a shared PinSettledWindow type alias in a follow-up commit. The user then explicitly asked me to open the PR, so I opened gated PR #537. CI then FAILED on the very test — `expected -17.25 to be greater than 253.75` — exposing that the event wait was necessary but not sufficient: the deeper bug was in `pinTopAcrossTransition` itself. The arithmetic (before − 286 = after, where 286px is the collapsing digest's height) showed the pin settled with ZERO counter-scroll — a premature settle: its loop exited when the item's document position held steady for one frame, which on some frame schedules happens BEFORE the collapse starts moving it. Bounded the loop to the known transition duration (counter-scroll every frame until DURATION_MS + grace). But CI FAILED AGAIN, identically — so that was necessary, not the whole story. Reproduced locally at last by disabling browser scroll anchoring (overflow-anchor:none), recreating CI's exact before=268.75/after=-17.25. Frame-by-frame tracing showed the REAL primary cause: Playwright's locator.click() auto-scrolls the target into view (~284px) before the app reads its pin baseline, so the app pins the card at the displaced position while the test compares a pre-scroll `before`; scroll anchoring hid this locally. Fixed the test to open via dispatchEvent (no scroll, like a real click). Confirmed with an anchoring-off repro: 4/4 fail with locator.click(), 8/8 pass with dispatchEvent; e2e 45/45. BOTH the duration pin AND the scroll-free click are required. Rewrote PR #537's body to the full story. All work stayed within the user's explicit asks."
