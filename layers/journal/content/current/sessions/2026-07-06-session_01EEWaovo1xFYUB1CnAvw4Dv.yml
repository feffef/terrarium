  - description: send_later tool failed under lowercase mcp__claude-code-remote__ name; real id is PascalCase mcp__Claude_Code_Remote__send_later.
    solution: Note the MCP server prefix is Claude_Code_Remote (PascalCase), not claude-code-remote, in agent-facing docs where send_later is referenced.
    severity: nit
  - description: Broad search_issues/search_pull_requests queries overflowed the tool-result limit (83KB, 61KB) during the survey, forcing a manual slice of the persisted file.
    solution: "Retired this run — #143 documents that broad search_* overflows like list_*; scope narrowly or slice."
    severity: minor
  - description: Parsing GitHub MCP search JSON needs care — items under .items, labels are objects, persisted files single-line so Read offset/limit doesn't help.
    solution: Slice the persisted file via python read()[A:B]/json.load rather than Read offset/limit; unchanged since prior runs.
    severity: nit
  - description: TaskCreate rejected a tasks-array call — its schema wasn't loaded and it takes one task per call (subject/description), needing ToolSearch first.
    solution: Load deferred tool schemas via ToolSearch before first call; skipped task tracking here as the workflow steps were already explicit.
    severity: nit
  - description: A '#' in a log-session flow-map reason value (e.g. an issue ref) is parsed as a YAML comment and broke the authored entry, needing a re-run.
    solution: Extend the log-session skill's quoting rule beyond '[' and '{' to also cover '#' in any inline value.
    severity: nit
  - description: An hour-long Android-app suspend fired SessionEnd but froze the network, so pushWithRetry's ~30s window (0+2+4+8+16s) all failed; the log never reached main and the un-cleaned working-tree YAML tripped the git-check stop hook.
    solution: "Flush pending logs at SessionStart/resume (live network) instead of only at the freeze-fired end, and clean up the orphaned working-tree artifact on push failure. Filed as #148; reported across three sessions."
    severity: major
