name: audit-docs
category: platform-operation
importance: supporting
role: >-
  The prose counterpart to `audit-skills`: a one-shot, autonomous sweep that
  audits every live doc and Skill for drift, duplication, contradiction, and
  ambiguity against the code, fact-checks each finding, and fixes the safe ones
  in a single gated PR. Decisions needing a human — ADR amendments, glossary
  vocabulary, how far a cleanup reaches — are filed as `needs-triage` issues
  rather than asked, so it runs unattended. New and unproven; reach for it when
  docs and code have drifted apart.
