name: audit-docs
category: platform-operation
importance: specialist
role: >-
  The prose counterpart to `audit-skills`: an autonomous sweep that audits
  every live doc and Skill for correctness, single-homing, concision, and
  clarity against the code (eight lenses in four paired reviewer agents),
  fact-checks each finding, then fixes it bravely and self-merges its own
  gated PR on green (ADR-0003 amendment; ADR-0004's low-risk tier). It files
  a `needs-triage` issue only for the rare factual conflict it genuinely
  can't resolve. Reached for whenever docs and code have drifted apart.
observations:
  - date: 2026-07-13
    note: >-
      Ran clean both times this window (PR #347: 5 findings fixed; PRs
      #370/#371: 12 fixes merged, 1 issue filed).
  - date: 2026-07-14
    note: >-
      Three more clean autonomous runs (session_01Kxn58h: 5 fixes self-merged
      as #403, 2 escalated to human-only PR #404; session_01DgwPcA: 7 fixes,
      PR #409; session_01U5bJwuW: 8 fixes, PR #418) — zero needs-triage
      escalations across all three.
