name: audit-docs
category: platform-operation
importance: supporting
role: >-
  The prose counterpart to `audit-skills`: a one-shot, autonomous sweep that
  audits every live doc and Skill for drift, duplication, contradiction, and
  ambiguity against the code, fact-checks each finding, then fixes it bravely and
  self-merges its own gated PR on green (ADR-0004's low-risk tier). It files a
  `needs-triage` issue only for the rare factual conflict it genuinely can't
  resolve, so it runs unattended. New and unproven; reach for it when docs and
  code have drifted apart.
