name: audit-docs
category: platform-operation
importance: supporting
role: >-
  The prose counterpart to `audit-skills`: a one-shot, autonomous sweep that
  audits every live doc and Skill for drift, duplication, contradiction, and
  ambiguity against the code, fact-checks each finding, then fixes it bravely and
  opens one gated PR for a human to merge (ADR-0003's default for
  `consolidate`-family jobs — it carries no auto-merge exception of its own). It
  files a `needs-triage` issue only for the rare factual conflict it genuinely
  can't resolve, so it runs unattended up to that PR. New and unproven; reach for
  it when docs and code have drifted apart.
