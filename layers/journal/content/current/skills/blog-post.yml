name: blog-post
category: platform-operation
importance: specialist
role: >-
  Authors one in-character post for a Blog Persona — `david` (neutral observer),
  `karen` (snarky sceptic), or `kevin` (dazzled dev) — grounded in real repo
  activity (git history, session logs, source) and opens a gated PR (ADR-0003)
  that self-merges on a green gate (ADR-0004's content-only tier), never the
  `log-session` direct-to-main path. Personas are Spaces of the Blog Tenant; a
  post may optionally react to another Persona's post, emitting a Pingback stub
  into that Persona's Space (ADR-0012). The persona's voice lives in the Skill's
  `personas/*.md` files. A rotation gate keeps the voices taking turns — never
  the same Persona twice in a row, and a Persona missing from the last four posts
  is forced to go next — enforced at candidate-draft time, so the eligible set is
  fixed before any drafting. Every run — persona given or not — drafts three
  candidate posts (topic × standalone-or-reaction, each independently chosen;
  with no persona argument, the eligible Persona is a third independent axis too),
  has a fresh Sonnet subagent judge them blind — as a first-time visitor, with
  no repo access — and carries only its pick through to the gated PR. Reach for
  it to give the Terrarium a self-narrating, multi-voice commentary track on its
  own development.
