name: digest
category: platform-operation
importance: specialist
role: >-
  Writes the Journal's daily Digests — one per closed UTC day, a short human
  catch-up on Platform-wide activity mined from git history and session logs
  (ADR-0010). A thin, tested helper (`scripts/digest.ts`) does the deterministic
  gathering; the Skill writes the prose and opens one gated PR (ADR-0003) that
  auto-merges once the safety gate is green, never the `log-session`
  direct-to-main path. The Journal's Space landing is a live
  dashboard that surfaces new Digests automatically. Fired by a scheduled
  Routine, this Skill is the first live piece of the `sync` remit
  (ADR-0003/0015) — no longer a deferred job. Reach for it manually to catch
  the Journal up after a run of activity the schedule hasn't covered yet.
observations: []
