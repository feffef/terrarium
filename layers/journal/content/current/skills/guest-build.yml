role: >-
  The build half of the guest-demo pipeline (ADR-0023): watches for
  `ready-for-agent` and ships each guest story as a gated, owner-merged PR,
  composing `frictions-to-fixes`'s dispatch-and-review machinery. Essential
  whenever the guest pipeline is actually running — a bounded, owner-chosen
  demo window, not standing operation — so its rarity reflects the window's
  rarity, not the Skill's value within it.
