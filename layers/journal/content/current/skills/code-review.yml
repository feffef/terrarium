name: code-review
category: general-engineering
importance: supporting
installedSha256: 6a65cc61114f96db07ec41e3920e67c9c5bf70dd6e0901eb9460ebcb2bdc209f
role: >-
  Review the working diff (Standards+Spec) before the gated PR (ADR-0003/0004).
  Used in 6 of this window's 40 sessions (e.g. the Atlas Sprint 2 orchestration,
  the Mermaid MDC component, the #369 implement) — but skipped in most other
  code-landing sessions (digest/session-click fix, almanac polish, journal
  scroll fix, self-merge-tier switch): adoption is inconsistent, not universal.
  Prescribes `gh` CLI, absent on remote sessions — use
  `mcp__github__*` instead. A spec-reviewer subagent has cited a fabricated
  line number (#323) — when dispatching this Skill's review subagents,
  explicitly restate CLAUDE.md's never-reconstruct-an-identifier-from-memory
  rule in the subagent brief, and require a fresh Read before each cited
  line/finding is trusted: re-verify every citation locally, don't take
  subagent output as ground truth. This Skill also assumes a diff against a
  fixed point; it has no built-in mode for a whole-surface/whole-tree review
  — that needs manual adaptation (e.g. treating the full tree as the diff, or
  running the Skill per-directory).
