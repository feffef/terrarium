role: >-
  Drives hard-bug/perf-regression diagnosis via a red-then-green reproduction
  loop before any fix is proposed. The formal loop is valuable once a bug
  resists a first-pass theory, but real hard-bug sessions in this repo
  routinely resolve without invoking it — treat as a reference to reach for,
  not a step every hard bug actually takes here.
