name: diagnosing-bugs
category: general-engineering
importance: peripheral
installedSha256: 0b561e84563f281e39b939e775d0a95d34c316bf212ba08989d547f1c14d2c58
role: >-
  Drives hard-bug/perf-regression diagnosis via a red-then-green reproduction
  loop before any fix is proposed. The formal loop is valuable once a bug
  resists a first-pass theory, but real hard-bug sessions in this repo
  consistently resolve without invoking it, root-causing ad hoc instead —
  little observed pull even in sessions squarely in its domain. Treat as a
  reference to reach for, not a step real hard bugs actually take here.
