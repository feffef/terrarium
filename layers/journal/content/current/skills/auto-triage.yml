name: auto-triage
category: platform-operation
importance: supporting
role: >-
  The batch, unattended sibling of `triage`: one brave sweep over the issues that
  need attention, applying triage's per-issue rules autonomously and stamping
  ready-for-agent under the ADR-0022 standing green-light. User-invoked; fired by
  hand or on an interval to keep the Trusted-authored backlog moving. Escalates
  genuine judgment calls and design uncertainty to a human.
observations:
