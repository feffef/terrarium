frictions:
  - description: 'Skipped the "search for an existing implementation" redundancy check on the three governance proposals (#134/#135/#136) because they read as not-yet-actioned by design (awaiting greenlight). #136 had actually already shipped via PR #140; only caught after the user pushed back.'
    solution: Apply the redundancy/already-implemented check uniformly to every open issue during triage, including proposals awaiting greenlight — a tracked proposal can still get built and merged before anyone loops back to close it.
    severity: major
  - description: "issue_read and list_issues both returned #159's body truncated at the exact same mid-sentence point (inside a code fence), so the full acceptance detail was unavailable via the API."
    solution: When a fetched issue body looks truncated, verify the underlying claim directly against the codebase rather than relying on the partial body text.
    severity: minor
  - description: git log --all -- <path> combined with an ancestry-path check pointed at the wrong PR (#146) as the one that added the audit-skills Skill files, because a later PR (#146) also touched files under a similar history shape.
    solution: For "which PR introduced this path" questions, use git log --first-parent -- <path> against the default branch and confirm with git show <merge>:<path> rather than trusting a plain ancestry-path/--all query.
    severity: nit
