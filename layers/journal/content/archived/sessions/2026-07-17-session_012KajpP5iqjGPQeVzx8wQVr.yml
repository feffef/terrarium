frictions:
  - description: AskUserQuestion was rejected mid-turn with no reason given, a second time this session, leaving no way to diagnose what to change before re-asking
    solution: When a rejection carries no reason, stop and wait for the human's own follow-up rather than guessing and re-asking the same question — which is what happened, and the human's next message (greetings + content-model directive) supplied the actual answer
    severity: nit
  - description: "guest-intake-scan.ts's compact 'newest activity only' design silently skipped a real, consequential owner comment on #555 (\"make an exception for terrariumdata.duckdns.org...\") because it landed between two of the agent's own rapid replies and got buried before the next scan pass; only surfaced because the guest quoted it"
    solution: For a fast-moving thread, the scan (or the calling procedure) should check more than just the single newest comment when an OWNER comment might have landed and been immediately superseded by the agent's own reply — e.g. surface any OWNER comment newer than the last scan's cursor, not just the newest overall
    severity: moderate
  - description: "The agent's own first sanitizer spec (\"same-site if it starts with /\") had a real bypass: a protocol-relative URL like //evil.example/x also starts with a single /, and browsers resolve that to an external host"
    solution: Caught and fixed mid-session (rule tightened to 'starts with / and not followed by a second /', applied to both href and the later img src) — worth a standing reminder that any future same-site path check must explicitly exclude protocol-relative // values from the start
    severity: minor
  - description: guest-intake's SKILL.md/ADR-0023 give no guidance for a single account's sustained, escalating multi-technique probing of the safety screen across many rounds on one issue — handling it (when to keep negotiating vs. disengage vs. flag the account) was improvised per-round rather than following a documented policy
    solution: Add explicit guidance to guest-intake's SKILL.md or ADR-0023 for recognizing a repeated-probing pattern (e.g. N consecutive escalated/declined requests from one account) and what to do about it — a round cap, an explicit owner-flagging step, or similar
    severity: moderate
  - description: After rebasing onto a fast-moving main (guest-build merged multiple PRs mid-session), the full local gate's lint step falsely flagged 3 vue/multi-word-component-names errors in the newly-pulled-in marquee Tenant files, costing a worktree-based investigation to rule out a real pre-existing bug
    solution: "Root cause: this session's .nuxt metadata was generated by the SessionStart hook before the marquee layer existed on this branch, and two later rebases pulled it in without re-running nuxt prepare; a plain pnpm install (which re-runs nuxt prepare) refreshed the metadata and the same lint pass came back clean. Worth a standing reminder: re-run pnpm install/nuxt prepare after rebasing onto a base that added a new layer, before trusting a local lint failure"
    severity: minor
