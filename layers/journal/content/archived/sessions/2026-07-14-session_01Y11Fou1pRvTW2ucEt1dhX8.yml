learnings:
  - A gate check wired into `pnpm validate:content`/`pnpm gate` via package.json is agent-mergeable and CI runs it automatically — no `.github/workflows/gate.yml` edit needed. Only a *dedicated* new CI job needs gate.yml (and thus the docs/proposals handoff).
  - In `SessionCard.vue`, `<JournalDisclosure class="head">` wraps the ENTIRE head including the `.foot` row — so any interactive control placed in the foot lives inside the accordion's click-to-toggle target and can swallow the toggle click.
ideas:
  - "A subagent-side guard that refuses to end a worktree-isolated agent's turn while a backgrounded gate process is still alive (or forces a commit+push checkpoint before backgrounding) — closes the recurring #427 mid-gate-stop work-loss at the mechanism level instead of relying on orchestrator rescue."
  - A lightweight 'confirm value with the owner before dispatch' gate in the implement flow for net-new mechanism/gate additions, distinct from clearly-scoped fix tickets that can go straight to a gated PR.
