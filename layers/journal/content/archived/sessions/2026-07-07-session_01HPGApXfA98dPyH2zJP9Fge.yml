frictions:
  - description: 'Survey subagent classified an already-fixed friction (delete_pending, fixed by PR #204) as never-fixed, and flagged an already-documented one, because its "confirm against main" step was manual and imperfect.'
    solution: "The main session must re-verify each candidate against main before filing, never trusting the survey's classification. This is exactly the archaeology #214's merged-since helper now makes reliable (dogfooded its own premise)."
    severity: moderate
  - description: Screening "fixed-since vs regression" required comparing a session's UTC startedAt against git commits' local-offset timestamps by hand, repeated ~10x in one pass. Reported by the survey subagent and hit again manually.
    solution: "Retired by #214 (scripts/merged-since.ts) — lists origin/main commits after an instant, UTC-normalized and isMerge-flagged. Now wired into the SKILL §2."
    severity: minor
  - description: GitHub and Claude_Code_Remote MCP servers disconnected mid-call; send_later failed with "permission stream closed". Recovered by warming tools via ToolSearch after reconnect. Matches prior sessions' transient-flake friction.
    solution: Retry once after the reconnect settles; no repo fix — an environment/MCP transport flake, already the converged coping strategy.
    severity: nit
  - description: Could not post an APPROVE review on the dispatched PR — GitHub rejects approving a PR opened under the same owner connection (shared identity).
    solution: Downgrade the review to a COMMENT event carrying the same verdict; the audit trace is what §6 requires. Known ADR-0017/#132 limit, recurred in review-merge.
    severity: minor
  - description: "GitHub MCP tools are deferred — each GitHub-touching subagent pays a ToolSearch select: warm-up tax before its first mcp__github__* call."
    solution: Already documented at issue-tracker.md:40-62; recurrence is guidance-not-heeded by fresh subagents, not a missing doc. No new fix warranted.
    severity: nit
