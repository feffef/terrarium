summary: "User reported yesterday's (2026-07-10) digest title looked cut off on the Journal dashboard. Read the digest file directly first — frontmatter looked fine at a glance. Explored the dashboard render path (index.vue, dashboard.ts digestList()) for CSS truncation or string-slicing logic; found none. Screenshotted /t/journal/current via scripts/preview.ts, which showed only the 2026-07-10 row's summary stopping abruptly with no ellipsis, right where \"#288\" appeared in the text. Parsed the frontmatter directly with the yaml package, confirming the field was silently truncated at YAML-parse time: a space followed by \"#\" starts a plain-scalar comment, so everything from \"#288\" onward was dropped before any Vue/CSS rendering happened. Fixed by quoting the summary string, verified via re-parse and a second screenshot. Swept all other content frontmatter for the same unquoted-space-hash pattern; 2026-07-10 was the only hit. All work this session — diagnosis, fix, and the PR — was directly requested and steered by the human (initial bug report, then follow-up on logging). Committed, pushed, validated content, opened PR #308, subscribed to its activity per repo convention, and it merged with CI green and no review comments."
