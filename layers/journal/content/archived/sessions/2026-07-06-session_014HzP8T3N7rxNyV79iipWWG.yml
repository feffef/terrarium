frictions:
  - description: Wrote the global theme.css using Vue's `:deep()`, which is a scoped-SFC construct — browsers drop it as an invalid selector in a plain css:[] file, silently killing all field-note prose styling (drop cap, blockquotes, bullets, h2).
    solution: Use plain descendant selectors in global stylesheets; `:deep()` only works in SFC <style scoped>. Caught via screenshot, not the gate.
    severity: minor
  - description: The blog Tenant's theme.css has the same latent `:deep()`-in-global-CSS bug (.bl .prose :deep(p) …); I mirrored its pattern before realising it was dead.
    solution: Fix tenants/blog/app/assets/theme.css the same way, and note the rule in docs/agents/tenant-layers.md so it isn't re-copied. Out of scope this session.
    severity: minor
  - description: '`pkill -f "index.mjs"` matched its own shell command line and SIGTERM-killed the invoking shell (exit 144), dropping the chained build+screenshot after it.'
    solution: CLAUDE.md already warns about this; I still hit it. Prefer a port-specific preview (PORT=3100) over pkill, or match a pattern that excludes the pkill line.
    severity: nit
  - description: The GitHub list_issues MCP tool returned 63KB (one long line), too large to read directly; had to fall back to search_issues + a subagent to gather stories.
    solution: Use search_issues or per-issue issue_read from the start for bulk story reads.
    severity: nit
  - description: Parallel Fable content subagents shared one scratchpad dir and overwrote each other's preview HTML mid-run (harmless — repo content trees never overlapped).
    solution: Give each parallel content agent a distinct scratch subdirectory in its prompt.
    severity: nit
