frictions:
  - description: The dispatched doc-batch impl agent (running in its own worktree) called subscribe_pr_activity on the PR it opened, which delivered webhook events for that PR into this orchestrating session instead of staying scoped to the impl agent — including an echo of my own posted review comment, which needed a moment to confirm was self-authored (ADR-0017 shared identity) rather than new external input.
    solution: frictions-to-fixes §5's impl-agent briefs should tell dispatched agents not to call subscribe_pr_activity on the PR they open, since the orchestrating/reviewing session already owns that PR's lifecycle in §6.
    severity: minor
  - description: "PR #345's safety-gate bot comment reported a commit sha that didn't match the PR's head commit sha from get_commits, briefly reading as a possible check-run/PR mismatch before recognizing it as GitHub's normal synthetic merge-commit sha for pull_request-triggered CI."
    solution: No repo change needed — this is standard GitHub Actions behavior, not a repo bug. Noting it here only so a future reviewer doesn't re-diagnose the same non-issue.
    severity: nit
