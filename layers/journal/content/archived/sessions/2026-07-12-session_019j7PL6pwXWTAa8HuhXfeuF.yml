frictions:
  - description: "After the PR #368 merge webhook arrived in this still-open session, didn't proactively re-invoke log-session to flip status from in-review to completed — left the log stale until the human directly asked why it hadn't been updated. log-session/SKILL.md and CLAUDE.md both say this flip happens on merge and that re-invoking is safe/expected; the merge event landing in-session, not in a later one, made this session itself the right point to do it, not just eligible to."
    solution: "Fixed by re-authoring and re-running log-session immediately after the human's question. General fix: treat a PR-merged webhook delivered into an open session as a closure re-trigger — re-invoke close-session/log-session right then, the same way opening the PR triggers the first one, rather than waiting to be asked."
    severity: minor
  - description: Nearly reused a session id (session_01WcEGxLWEA9xravmPuFiBNU) surfaced during git-log research as this session's own Claude-Session commit trailer — CLAUDE.md explicitly warns against reconstructing an identifier from a plausible-looking pattern seen elsewhere in context.
    solution: "Caught before push by cross-checking CLAUDE_CODE_REMOTE_SESSION_ID and the system-prompt commit-footer template, then amended the commit with the correct id (session_019j7PL6pwXWTAa8HuhXfeuF). Worth an explicit habit: grep the system prompt for the real id at the moment of writing any Claude-Session trailer, especially in a research-heavy session that has read many other sessions' ids."
    severity: moderate
  - description: GitHub secondary rate limit hit once on a search_issues call mid-research (403, 'exceeded a secondary rate limit').
    solution: Not retried — the query wasn't load-bearing for the final draft, so dropped rather than waited out.
    severity: nit
