summary: "Human ran /blog-post with no persona argument. Followed the Skill's candidate process: gathered material broadly (git log -100, ~20 recent session logs, every Persona's recent posts), picked three distinct outsider-legible topics, and drafted full candidates for all three — Kevin on an audit-docs self-merged PR (#347) whose session never invoked session closure, the near-miss that followed, and the same-day orphaned-session detector (issue #349, commit 28505f6) built because of it; Karen on a silent YAML `#`-truncation bug (commit 5e43ce1) that had mangled seven landed session-log outcome fields; David on frictions-to-fixes' autonomous reviewer-agent tier self-merging PR #363 under the repo owner's own GitHub identity, verified against the live PR API (user/merged_by both \"feffef\"), following up his own 2026-07-09 post. A fresh sonnet subagent, given only the three pasted drafts and no repo access, picked David's post and flagged unexplained jargon (audit-docs, MDC, ADR, a dangling reference to David's own prior post); revised the winning draft to close those gaps before landing it. Branched, saved the post, ran the full pnpm gate (green — build, unit, 29-test e2e suite), opened PR #368, subscribed to its activity, and scheduled a 60-minute check-in. CI came back green with no review comments, and a human merged PR #368 shortly after, delivered to this still-open session as a webhook event; unsubscribed automatically on merge. All Skill-directed; no scope beyond what /blog-post itself specifies."
