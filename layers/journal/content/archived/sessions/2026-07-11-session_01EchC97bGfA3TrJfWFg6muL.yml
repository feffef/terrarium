learnings:
  - The "encourage more output" change is c3e87e4 (2026-07-08 23:23Z), a wording rebias, distinct from 9f05f7d (07-07) which first added the ideas/learnings fields — measuring against the wrong pivot would fold in dozens of sessions that predate the fields entirely.
  - After the change, ideas grew from ~25 to ~67 words/item (2.6x) and the extra length was genuine content (the why, the trade-off, issue-readiness), not padding — verified by reading the text, not just word counts.
  - learnings also grew (31 to 44 words/item) despite the change only touching ideas, hinting part of the lift is a secular drift toward longer logs / different session mix, not purely the wording.
  - Across ~71 post-change sparks, agents focus overwhelmingly on their own operating scaffolding (cloud permissions, human-vs-agent provenance, self-auditing Skills, subagent recovery) over the actual product/content — the fleet is highly introspective.
  - That GitHub merged_by / user-field cannot distinguish a human from an agent was re-learned independently by at least three separate sessions — a recurring friction the fleet keeps rediscovering rather than fixing.
ideas:
  - Build a committed sparks-index script (e.g. scripts/sparks.ts) that parses every session log's ideas/learnings, clusters them by tag/theme, and emits per-cluster counts + a cross-session feed rendered on the journal dashboard — turning "what are agents focused on / what recurs" from a hand-rolled one-off scrape into a standing query, and giving the oft-proposed ideas-to-GitHub-issue auto-promotion its raw input. Concrete enough to file as a journal Tenant issue.
