frictions:
  - description: "Did not invoke close-session at PR-open for #529 (CLAUDE.md 'Opening the PR is the first session log'); went to code-review and only logged at merge."
    solution: At the moment a gated PR is opened, invoke close-session before any follow-on review/fix work.
    severity: major
  - description: "AskUserQuestion + send_later hit 'permission stream closed before response received' 3x this session (one grilling question, two babysit check-ins) — the #451 intermittency."
    solution: "Land the retry/backoff on the Claude-Code-Remote MCP permission surface tracked in #451; recover in-turn by re-asking in prose."
    severity: major
  - description: Dispatched sonnet fix-subagent stopped its turn mid-gate with all three fixes uncommitted, waiting on a background gate:scoped run — the known subagent-uncommitted hazard.
    solution: "Subagent briefs must say: commit + push before stopping, even mid-gate; run the gate with run_in_background, not a shell background job you then wait on across turns."
    severity: major
  - description: Same fix-subagent ran a prohibited 'pkill -f gate.ts' once (on its own background process) despite CLAUDE.md's ban; self-reported and switched to PID waits.
    solution: Restate the no-pkill / use-preview.ts-or-run_in_background rule inside dispatched-subagent briefs, not only in CLAUDE.md — subagents don't reliably internalize it.
    severity: minor
  - description: Grilling before building caught two wrong assumptions in the triage brief (merged_by undeliverable/unneeded; digest has no equivalent screen) before any code — a process win, not a problem.
    solution: Keep grilling load-bearing multi-deliverable briefs before dispatch; it paid for itself here.
    severity: nit
