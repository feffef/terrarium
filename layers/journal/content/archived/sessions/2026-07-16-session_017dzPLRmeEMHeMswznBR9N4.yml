learnings:
  - GitHub Actions pull_request runs report the safety-gate green on the ephemeral refs/pull/N/merge SHA, not the branch tip — verify against the real head via get_check_runs before trusting a green-doorbell webhook.
  - A standalone tsx script cannot reach GitHub MCP tools (they're the agent's, not a child process's); merged_by-style API fields are only obtainable via gh CLI, which this environment lacks.
