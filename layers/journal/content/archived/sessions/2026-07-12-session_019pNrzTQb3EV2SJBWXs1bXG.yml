frictions:
  - description: "Session never self-invoked close-session after PR #388 merged and went orphaned (flagged by audit-skills' orphanedSessions check, issue #397) until a human manually re-prompted /close-session ~20+ hours later."
    solution: "Per #397's diagnostic: frictions-to-fixes' step 6 gates close-session behind \"PR merged or escalated,\" but with auto-merge armed the turn ends waiting on a merge webhook and never resumes to reach that step. Move the close-session trigger to PR-open/before-ending, matching CLAUDE.md's own \"opening the PR is the first session log\" rule and the digest skill's already-immune pattern."
    severity: major
  - description: "The dispatched worktree-isolated Sonnet agent for issue #383's fix never returned a completion notification; its local branch (claude/friction-sessionstart-hook-383) has zero commits beyond its base, meaning it died before making any edit, and its worktree was reaped with no trace. Issue #383 was independently fixed and merged hours later by an unrelated session (PR #392), so the fix wasn't lost overall, but this session had zero visibility into its own dispatched agent's fate."
    solution: CLAUDE.md's existing worktree-isolation guard covers a subagent that ends with uncommitted work still visible in its worktree, but not one that vanishes without any notification at all. Before closing, a dispatching session should explicitly re-verify every dispatched agent either returned a notification or has a resumable status, not just treat silence as "still running."
    severity: major
  - description: 'The GitHub MCP server (mcp__github__*) disconnected and reconnected at least twice mid-session, breaking tool calls (including a subscribe_pr_activity call that failed with "Tool permission request failed: permission stream closed") until ToolSearch re-resolved them.'
    solution: No repo-side fix available; retry via ToolSearch on a connection-shaped tool error instead of assuming the capability is gone.
    severity: minor
  - description: The survey subagent's merged-since.ts output broke a JSON parser when its git-fetch progress lines (stderr) landed ahead of the JSON (stdout) after the caller combined both streams.
    solution: "Same root cause as issue #384's tail/head-piping bullet (now merged in PR #388) - the caller should redirect the two streams separately rather than combining them; scripts/merged-since.ts could also suppress its own git-fetch progress noise so callers don't have to remember to separate streams."
    severity: minor
