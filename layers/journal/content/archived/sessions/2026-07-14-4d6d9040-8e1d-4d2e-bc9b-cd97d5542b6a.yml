learnings:
  - A Public author (no write access) can only ever open a *fork* PR; a same-repo-branch PR always has a Trusted author, because pushing a branch requires write access. So author_association is fully determined by fork-vs-same-repo for the trust question.
  - Plain `pull_request` runs the workflow file from the PR head (the fork's copy) and clamps GITHUB_TOKEN to read-only for fork runs — unlike `pull_request_target`, which runs the base-branch file with a write token (grounded in docs/research/making-repo-public.md, GitHub primary sources).
  - Local Claude Code CLI sessions identify by a UUID (transcript sessionId / CLAUDE_CODE_SESSION_ID), not the cloud session_01 format the log-session instructions assume; and they hold the workflow OAuth scope, so pushing .github/workflows/* succeeds (unlike cloud web/mobile agent sessions, ADR-0004).
