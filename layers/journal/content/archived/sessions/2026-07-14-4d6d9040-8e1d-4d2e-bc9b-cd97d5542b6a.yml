summary: "User directed applying the docs/proposals/443 workflow proposal. First applied it verbatim (PR #473, merged): a workflow labeling each PR trusted/public by author_association, plus the two repo labels. While reviewing the fork-PR token trade-off, the user pressed on it and we found a real design flaw: the `public` label can never be applied safely, because a Public author has no write access and so can only open a fork PR, where the token is read-only and pull_request runs the fork's own workflow copy. On the user's suggestion we simplified to a single `trusted` label (absence = Public), guarded to same-repo PRs — a deny-by-default posture that dodges the token problem entirely. That redesign is PR #478 (merged); the now-unused `public` repo label was deleted. Also updated issue #443 and docs/agents/issue-tracker.md. All work was human-instructed throughout."
