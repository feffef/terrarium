summary: "Issue #257 (agent-filed, not human: a prior autonomous audit-skills session, per its own Co-Authored-By/Claude-Session footer — GitHub shows it as authored by the repo owner only because agent API calls run under the owner's own authorized connection, ADR-0017) reported close-session/SKILL.md's description field is an unquoted YAML scalar containing a colon-space sequence, which is illegal YAML and crashes scripts/audit-skills.ts. The human repo owner then confirmed the fix approach directly on the issue (\"Add quotes\"). Restarted the stale designated branch off latest origin/main (it was 112 commits behind with only inherited history ahead), quoted the description string with no content change, verified the frontmatter now parses via this repo's yaml package and that audit-skills.ts runs without crashing, ran the full pnpm gate (all green), and opened gated PR #264 with Fixes #257, subscribing to its activity per CLAUDE.md. PR #264 merged, closing #257."
