frictions:
  - description: "Opening issue #257 at all was the overhead, not the later PR. The prior audit-skills session that discovered the crash was blocked by that Skill's own blanket \"Never edit `.agents/skills/`\" rule, which does not distinguish semantic edits (a Skill's description/role content, which legitimately need human judgment since they change trigger behavior) from purely mechanical, non-semantic fixes (quoting a YAML scalar so it parses — zero content change). That blanket rule forced a one-character, zero-judgment syntax fix through a full issue-file, later-session rediscovery, branch, gate, and PR round-trip — confirmed over-cautious by the human owner's entire review consisting of \"Add quotes.\""
    solution: Give audit-skills' (and any similar skill-auditing job's) "never edit" rule a narrow carve-out for purely mechanical, non-semantic fixes to a Skill's own SKILL.md (encoding/syntax validity, not description/role wording) — propose those as a one-line diff inline (in the same PR, or an issue with an attached patch a human can approve with one click) instead of routing them through the full separate-session issue-to-gated-PR pipeline built for judgment calls.
    severity: major
