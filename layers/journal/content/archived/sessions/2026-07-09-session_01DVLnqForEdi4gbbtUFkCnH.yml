learnings:
  - "A GitHub issue/PR/comment's \"user\" field is not evidence of human authorship — agent-driven API calls run under the repo owner's own authorized connection (ADR-0017), so `user` always reads as the owner regardless of who actually wrote it. The only reliable signal is the Co-Authored-By/Claude-Session footer in the body; its absence (as in the \"Add quotes\" comment on #257) is what actually marks a human's own words."
  - "audit-skills' \"Never edit `.agents/skills/`\" rule (SKILL.md step 4) is currently one blanket prohibition covering two different things it should treat differently: changing a Skill's semantic description/role content (a real judgment call, rightly gated) versus a purely mechanical fix like YAML syntax validity (no judgment call at all)."
ideas:
  - "Split audit-skills' \"never edit .agents/skills/\" rule into two tiers: semantic changes (description/role wording — stays issue-only, human judgment required) versus mechanical fixes (encoding/syntax validity, broken code fences, stale internal links — propose as an attached one-line patch a human can approve inline) so a crash-on-parse bug like #257 doesn't cost a full separate fix-it session for a one-character change the human ends up rubber-stamping anyway."
