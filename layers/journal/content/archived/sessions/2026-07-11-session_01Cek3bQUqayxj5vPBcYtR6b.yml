learnings:
  - git log --oneline's default ordering is reverse-chronological by commit date across the whole repo, not per-branch topological order — two commits sitting next to each other in the log can belong to entirely unrelated PRs that just happened to merge around the same time. Always confirm a commit's containing PR and a PR's true merge order via the GitHub API (pull_request_read get_commits / get with merged_at), never from log adjacency alone.
  - Pasting three full candidate drafts (frontmatter + body, unlabeled) to a fresh subagent with an explicit 'no tool use, no repo access, judge as a first-time visitor' instruction reliably produced a decisive pick with concrete, quotable reasoning (it named the exact sentence that made Karen's draft land, and the exact sentence in Kevin's that undercut its own hook) rather than a hedgy 'all three are fine' non-answer. This is the first time this exact mechanism ran for real in this repo, and it worked as designed on the first try.
  - A blind reviewer's outsider-jargon gaps (unexplained 'PR', 'Skill', 'ADR', 'session friction', and an unintroduced narrator voice) were all easy to fix in-voice with short parenthetical glosses woven into Karen's existing snark, adding roughly 100 words total without diluting the persona or blowing past the Skill's 1-4 paragraph guidance. Persona voice and outsider-accessibility are not in tension if the glossing is done as an aside rather than a definition.
  - Same-day, same-morning timing claims ('X happened minutes after Y') are easy to get backwards even when every individual fact checks out — the direction and exact ordering of two nearby events is itself a fact that needs its own verification pass, separate from verifying that each event happened at all.
  - "PR bodies on this repo's agent-authored PRs often already contain a `[comment](url)` link back to the exact review comment that changed the PR's approach (e.g. PR #295's body linked its own review-feedback comment) — checking the PR body itself before re-deriving links from get_comments can save a round trip."
ideas:
  - "Give the blog-post Skill's step 5 citation checklist a short standing glossary of terms this repo's posts almost always need to gloss for outsiders — PR, Skill (pack vs repo-owned), ADR, Tenant/Space, gate, session friction — so a drafting pass bakes in a one-clause aside on first use instead of relying on the blind reviewer to catch every instance every time. Concrete: a 5-8 line 'first-use glosses' table in personas/README.md or the Skill itself, cross-referenced from step 5."
  - Build a small reusable script (e.g. scripts/pr-timeline.ts) that takes a date range and prints a clean, low-token chronological table of PRs merged in that window — number, title, merged_at, merged_by, head SHA, commit count — sourced once via the GitHub API and cached. This run (and, per the karen post itself, at least the audit-docs/gate sessions it describes) repeatedly hand-rolled the same 'who merged what, in what order, this morning' archaeology via ad hoc list_pull_requests + pull_request_read calls; a shared tool would fix both the adjacency-confusion friction and the oversized-payload friction in one place, for any Skill that needs it (blog-post, code-review, audit-docs).
  - "Consider a lightweight, explicitly-scoped topic backlog for blog-post: when Section A's blind review picks a winner, write ONE line per discarded candidate (topic + persona + one-sentence hook, not the draft itself) to a small non-rendered scratch/tracking file the next /blog-post run's A1 can skim, so a genuinely good topic that only lost this round's specific three-way competition isn't fully lost, and so two different runs don't independently rediscover and re-draft the same commit. Needs care to stay consistent with 'nothing lands until chosen' — the backlog entry is a topic pointer, never a draft."
  - "For the 'full rigor on all three candidates' cost this run surfaced (3x the tool calls of a single-draft post): consider a cheap pre-screen inside A2/A3 — a fast, low-rigor one-paragraph pitch per topic, ranked by a quick heuristic (does it have a clean irony/hook, is it outsider-legible, is there a verifiable receipt) — before committing to full step-5-grade drafting on all three. This is a real trade-off against the Skill's current 'no lower bar for a draft that might not ship' principle, so it shouldn't be adopted silently; flagging it here as something worth a deliberate decision, not a fait accompli."
