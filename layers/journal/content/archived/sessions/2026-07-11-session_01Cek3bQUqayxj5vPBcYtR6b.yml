frictions:
  - description: "Section A's step A1 says \"git log --oneline -100\" for material gathering, but git log --oneline's default order is reverse-chronological by commit date across ALL branches, not topological/ancestry order — commits from concurrently-developed, unrelated PRs interleave in the listing. I initially assumed adjacency in the log implied \"same PR\" or \"same session\" for several commits (e.g. guessed PR #306 bundled the ADR amendment-banner work because 403ed38 sat between two of #306's actual commits in the log), which was wrong, and separately misread the relative merge order of PR #295 vs PR #307 from that same assumption — asserting one merged before the other when the API said the opposite."
    solution: "Caught both errors only because the Skill's own citation-rigor rule forced a re-verification pass against the GitHub API (pull_request_read get_commits / get with merged_at) before anything was written down as fact. Re-derived PR boundaries and merge order directly from the API every time instead of from log adjacency. Worth calling out explicitly in Section A / step 3's git-log guidance: \"adjacency in git log --oneline is not evidence of same-PR or same-order; confirm both via the GitHub API before asserting them in a post.\""
    severity: moderate
  - description: mcp__github__list_pull_requests (no filters beyond state/sort) returned ~58,700 characters for the last 20 PRs, exceeding the tool's own output token ceiling and erroring instead of returning data — had to read the auto-saved raw-output file from disk and slice it with an ad hoc python one-liner via Bash just to pull out {number, title, merged_by} for ~7 PRs I actually needed.
    solution: "Worked around it this time by reading the saved file directly and writing a throwaway python filter. A cleaner fix would be requesting only the fields needed — the tool doesn't currently expose a field allowlist, and minimal_output alone wasn't enough to keep 20 full PR bodies under the limit. Logged as an idea below: a list_pull_requests-shaped script/tool with a hard field allowlist for exactly this \"who touched what, when, in what order\" archaeology."
    severity: minor
  - description: The github MCP server dropped mid-call during the very first subscribe_pr_activity attempt ("Tool permission stream closed before response received"), so the initial subscription silently failed and had to be retried after a reconnect system-reminder confirmed the server was back.
    solution: No code fix available from this session — retried once the reconnect was confirmed and it succeeded cleanly on the second attempt. Logging as a learning below (mid-session MCP drops are recoverable, don't abort/report failure prematurely) rather than a fix, since the cause is outside this repo.
    severity: minor
  - description: Section A mandates full citation-grade rigor (real commit SHAs, PR numbers, exact review-comment permalinks, verified timestamps) on ALL THREE candidates, including the two that are guaranteed to be discarded if they lose the blind review — by design, per the Skill's "a rejected draft is still a real document a reviewer read and judged" rule. In practice this meant doing the same multi-round-trip GitHub archaeology (list PRs, get_commits, get_comments, get, cross-checking merge order) for Kevin's and David's candidates as for the one that actually shipped — none of which is visible in the final PR except as a one-line provenance sentence in the PR body.
    solution: Did the full rigor as instructed; no shortcut taken. Flagging as a friction anyway (not a violation) because the token/tool-call cost of this run was roughly 3x a single-draft post, and it's worth the Skill's maintainers knowing that cost explicitly rather than discovering it only by noticing a long transcript. See the "cheaper pre-screen" idea below for a possible mitigation that doesn't compromise the no-lower-bar rule.
    severity: nit
  - description: The two losing candidates (David's on the blog-post Skill's own recursion, Kevin's on audit-docs' eighth lens / banner timing) are, per the Skill, discarded entirely once the blind reviewer picks a winner — no trace of them lands anywhere in the repo, not even as a topic note. Both were fully-verified, genuinely interesting, publishable-quality posts on real events that happened today; that material is now gone except as prose in this session log.
    solution: "Followed the Skill exactly (discard, don't land scratch drafts) — this isn't a bug, just a real cost worth naming: a good topic that loses only because of this run's specific competition, not because it was weak, has no path back except a future session independently rediscovering the same commits from git history. See the \"topic backlog\" idea below."
    severity: nit
