learnings:
  - Session-log commits (the Stop hook's) carry NO Claude-Session trailer, so they never pollute a session's own work-commit set — which is exactly what makes last-work-commit cleanly separable from the closure commit.
  - durationSec in a session log equals wallclock (endedAt − startedAt), not active time, so it cannot by itself distinguish an idle-then-rescued session from a genuinely long one.
ideas:
  - groupSessionReferences (and any other %aI comparison in audit-skills) compares ISO stamps as raw strings while git emits mixed local offsets, so an orphan's 'earliest referencing commit' date can be picked wrong. Normalize all %aI comparisons to parsed epochs, or emit %aI as UTC — small, well-scoped correctness fix.
