frictions:
  - description: Reached for a candidate rescued-closure signal twice before grounding it — endedAt≈log-commit (2s apart) and durationSec being exactly wallclock both fail to discriminate an idle rescue.
    solution: Ground a timing heuristic against primary git/log data before coding it; the discriminating anchor was last-work-commit→closure, not session span.
    severity: minor
  - description: My first draft picked the latest work commit by raw ISO string compare; git %aI carries mixed local offsets, so a +02:00 stamp can sort after a real-time-later Z stamp.
    solution: Compare parsed epochs (Date.parse), not %aI strings; added a mixed-offset test. groupSessionReferences still string-compares (see ideas).
    severity: minor
  - description: Monitor tool call was rejected — I passed a `timeout` param guessing its shape instead of loading its schema via ToolSearch first (CLAUDE.md's deferred-tool rule).
    solution: Load a deferred tool's schema via ToolSearch before its first call; fell back to a Bash poll loop.
