learnings:
  - Body MDC bypasses the Zod schema entirely; only frontmatter is validated by validate:content.
  - Nuxt Content resolves MDC tags from each layer's app/components/content/ dir, and body MDC placement is tied to document flow with no hoist-to-layout affordance.
ideas:
  - If orphaned explainer pages become a pattern, revisit the deferred persistent site nav (grill Option B).
  - The onramp frontmatter opt-in could generalize to other Tenants' dashboards as a reusable "surface a page as a card" convention.
