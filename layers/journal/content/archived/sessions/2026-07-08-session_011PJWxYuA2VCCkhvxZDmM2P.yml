frictions:
  - description: "Kept telling the user I was ready to open the PR while #239 was already open on the branch; only noticed when they asked."
    solution: After committing substantive work, proactively query for an existing PR on the branch instead of assuming none exists.
    severity: moderate
  - description: The journal isolation e2e's leak-canary asserted not.toContain of a phrase the target page didn't even contain — a dead assertion that always passed.
    solution: Re-pointed the canary at a real unique phrase from the renamed page; a not.toContain of a stale string silently passes and proves nothing.
    severity: minor
  - description: SendUserFile rejected four calls because I passed files as a bare path; it needs a JSON array.
    solution: Always pass files as a JSON array, even for a single file.
    severity: minor
  - description: The research agent's fetcher got HTTP 403 from the hosted MDC docs (remark-mdc.nuxt.space, content.nuxt.com).
    solution: Fall back to the vendored node_modules README as the version-pinned primary source.
    severity: nit
  - description: delete_trigger failed repeatedly with a permission-stream error, so the post-merge check-in couldn't be cancelled.
    solution: Harmless — the pending check-in self-terminates on the next firing since the PR is merged; no manual cancel needed.
    severity: nit
