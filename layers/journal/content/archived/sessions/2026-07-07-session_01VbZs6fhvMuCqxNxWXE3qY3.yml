learnings:
  - Biome landings derive catalogue, food web, rhythm bands, and field log entirely from the collections — a new specimen needs zero component edits.
  - A tinted SVG region with fill+stroke reads as a flat UI panel inside an engraving; the same region as parallel sig-tint hatch strokes reads as engraved shadow.
  - A plate whose subject is an absence works best as a diagram of the evidence (the audit that fails to balance) rather than a landscape with a gap in it.
ideas:
  - The canopy landing intro enumerates its four founding inhabitants; a once-per-wing intro refresh when the population grows would keep it honest without violating the leave-intros-be rule.
