summary: "Added one specimen per biome, chosen to complete each wing's rarity ladder: Umbra vacans (canopy, mythic, conjectural plate), Textor absens (floor, mythic, conjectural plate), Geminella sequax (pool, abundant). Each landed with museum-label frontmatter, an engraved SVG plate, a field-note essay, two same-biome food-web edges, and two field-log entries. Full gate run locally; all six affected pages screenshot-verified. On request, both conjectural plates were redrawn denser, and origin/main (which had restructured tests per-layer meanwhile) was merged in with the gate re-run green. The two conjectural plates took repeated passes under user critique (sparse scaffolding, shadow drawn as a filled panel, then a leaf that duplicated folium-mendax) before landing: umbra's plate became the essay's shade audit — three shadows spoken for, one violet and unowned — and textor's a woven wall with frayed gap and gold mend."
