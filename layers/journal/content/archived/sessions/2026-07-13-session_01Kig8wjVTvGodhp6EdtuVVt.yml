frictions:
  - description: Drafted a citation link using a fabricated 40-char SHA (padded a real-but-wrong short hash from an unrelated commit) instead of resolving the actual commit for that session log file via git log — caught by re-reading the draft against CLAUDE.md's own 'never predict or reconstruct an identifier' rule before it shipped.
    solution: Resolve every blob-link SHA with its own dedicated `git log -1 --format=%H -- <path>` call at the moment of writing the link, never by pattern-matching or padding a hash seen elsewhere in the same session.
    severity: moderate
  - description: A revision draft asserted 'three other sessions... turned out to be older casualties of the same gap,' conflating a session-log summary's mention of three pre-close-session historical orphans (a different, older category) with the specific out-of-turn-merge regression this post was actually about.
    solution: Before publishing a causal/count claim sourced from a session log's interpretive summary, re-read the specific wording closely enough to check it actually supports the claim being made, not just that it's in the neighborhood of the right topic; cut the claim here rather than re-verify a tangent.
    severity: moderate
  - description: First draft's frontmatter used tag 'reliability', which isn't in layers/blog/tenant.config.ts's fixed blogTags enum — would have failed pnpm validate:content (ADR-0004 L1) had it not been caught by reading the schema before saving.
    solution: Read the Collection's actual zod schema (tenant.config.ts) for any enum-constrained field before writing frontmatter that uses it, rather than inferring plausible tag names from other posts' examples.
    severity: minor
  - description: mcp__Claude_Code_Remote__subscribe_pr_activity failed once with 'Tool permission stream closed before response received' — a known transient cloud-environment limitation (#288) — before succeeding on retry.
    solution: No code fix; retried once and it succeeded, consistent with other sessions' notes on this same transient error.
    severity: nit
