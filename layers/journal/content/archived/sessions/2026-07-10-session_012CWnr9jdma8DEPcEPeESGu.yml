frictions:
  - description: Skill tool call for audit-docs failed (`disable-model-invocation`) even though its full instructions were already preloaded via the /audit-docs command message.
    solution: Recognized the command-message already carried the Skill body and proceeded directly from it instead of re-invoking; worth noting in the Skill's own docs that /audit-docs is command-only, never Skill-tool-invocable, so an agent doesn't waste a call finding that out.
    severity: nit
  - description: Creating the second branch (`git checkout -b ... origin/main`) silently reset the working tree to pre-fix state, firing five separate 'file modified by user or linter' system-reminders that read as if something external had changed the files.
    solution: Expected behavior from switching branches after committing the first PR's changes — no actual issue, but the reminder wording doesn't distinguish a branch-switch revert from a real external edit, which cost a moment of double-checking.
    severity: nit
