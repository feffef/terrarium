learnings:
  - Grepping commit authorship (git log --format='%an %ae' -- <path>) against a doc's behavioral claim is a fast, decisive way to fact-check drift — it turned a soft "these two CLAUDE.md sentences read as conflicting" hunch into a hard, provable falsehood (an agent-authored commit to CI that a doc claimed could never happen).
  - Beyond just the authorship grep, confirming a suspicious commit actually landed through the *normal* gated-merge path (git log --merges / git branch -a --contains <sha>, then checking the merge commit's author) is what separated "an agent proposed this once, who knows what happened to it" from "this is load-bearing evidence the rule is routinely violated in practice" — the second is a much stronger basis for rewriting a doc than the first.
  - When two independently-dispatched lens-agents (different lenses, different prompts, no visibility into each other's work) each flag overlapping text on their own, that convergence is itself a strong corroboration signal, worth treating as higher-confidence going into fact-checking even before the checker weighs in — independent agreement from different angles is harder to get by accident than one agent being thorough.
  - For the self-merge decision specifically, "gate is green" alone wasn't what made self-merging feel safe — it was the combination of (a) gate green, (b) zero unresolved review-comment threads (checked explicitly via pull_request_read get_comments, even though none were expected on an unattended sweep's own PR), and (c) confirming via git diff --stat that the changed file set matched exactly what the Skill's Live tier allows. Any one of the three alone would have been a weaker basis for self-merging than checking all three.
ideas:
  - 'Add an explicit de-dup micro-step to audit-docs between "pool findings" (step 3) and "fact-check" (step 4): before the fact-checker agent is dispatched, have the orchestrating session (or a small dedicated agent) scan the pooled findings for overlapping file:line ranges or near-identical quoted text across different lens-agents, and merge them into one finding naming all contributing lenses and locations. This run needed a manual merge of a Duplication finding and a Verbose finding that were really one defect; an explicit step would make that systematic rather than dependent on the orchestrator noticing.'
  - Decide and document, in the audit-docs Skill itself, whether multiple human-only-surface escalations from one sweep should ride one shared human-reviewed PR (one gate run, one PR, one subscription covering all of them) or stay one-PR-per-escalation as today. This run only surfaced one such finding so the question was moot, but a sweep that finds three ADR-tier violations at once would currently open three separate PRs and babysit three separate subscriptions for what a human reviewer would probably rather see as one batch.
  - The Skill's own step 1 ("Branch off origin/main") could explicitly tell the agent to check its own session/task setup instructions for a caller-pinned branch name before defaulting to the journal/audit-docs-<date> convention — right now that override is only mentioned as a parenthetical, and the actual pin (when present) lives in a totally different, harness-injected part of the context that's easy to have scrolled past by the time step 1 executes. A first-run-of-an-updated-workflow retro is exactly the moment this kind of instruction-following gap is cheap to catch and fix before it repeats on every future run.
