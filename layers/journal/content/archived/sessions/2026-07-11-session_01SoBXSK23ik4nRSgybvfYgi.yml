frictions:
  - description: Defaulted to the audit-docs Skill's own branch-naming convention (journal/audit-docs-<date>) instead of the caller-pinned designated branch (claude/audit-docs-7n2oja) named in this session's own harness instructions ("Git Development Branch Requirements") — missed that CLAUDE.md's "a caller-pinned designated branch overrides this default name" applied here. The pin lived in a completely different part of the context (a harness-injected block near the very top of the system prompt) than the Skill's own step-1 branching instructions, so it was easy to have already mentally moved past it by the time step 1 ran.
    solution: "Before branching, explicitly re-scan the session's own system-prompt/ task-setup instructions for a pinned branch name, not just CLAUDE.md's chartered-job convention — the Skill's step 1 could say this explicitly (\"check your own task instructions for a caller-pinned branch before defaulting to the name below\") rather than assuming the agent will cross-reference a different context section on its own. By the time this was noticed, PR #311 had already merged onto the wrong-named branch; reverting good, fact-checked fixes over a naming technicality wasn't worth the churn, so this stands as a process deviation, not a functional defect."
    severity: moderate
  - description: subscribe_pr_activity failed once on the first call ("Tool permission stream closed before response received"); an immediate retry with identical arguments succeeded.
    solution: No fix needed beyond retrying; noting in case it recurs.
    severity: minor
  - description: The four-paired-lens fan-out plus the independent fact-checker used roughly 670k subagent tokens combined (five agents, ~150k-320k tokens and 150-420s each) for a sweep that ultimately produced a 6-line-net CLAUDE.md diff plus a 1-word ADR fix. The thoroughness bought real value here (the CI-edit contradiction in particular would have been easy to wave away as "probably fine" without the git-history dig one lens agent did), but the cost/output ratio is worth watching as a calibration question for future runs, especially on a quiet week with little real drift to find.
    solution: No change made this run; flagging as an open calibration question for whoever tunes lens-agent scope/count — e.g. whether lens breadth should scale with how much changed in the last 48h rather than always running the full four-agent fan-out.
    severity: nit
  - description: "Two different lens-agents converged on overlapping text without either one noticing: Agent B (Single-home/Duplication) flagged ADR-0003's PR-auto-open/auto-watch amendment as restated in CLAUDE.md:46-63, while Agent C (Concision/Verbose), working independently and unaware of Agent B's finding, separately flagged CLAUDE.md:58-60 vs CLAUDE.md:210-213 as an intra-file redundancy of the same underlying \"auto-watch, don't ask\" fact. Both were correct, but describing facets of one defect (the fact lives in 3 places: 1 ADR + 2 CLAUDE.md spots), not two independent defects. The Skill's pooling step (step 3) doesn't currently ask for a dedupe pass across lenses before fact-checking, so recognizing the overlap and merging the two into one coherent single-home fix was left entirely to the orchestrating session's manual inspection at pooling time."
    solution: "Consider adding an explicit dedupe micro-step between pooling (step 3) and fact-checking (step 4): before dispatching the fact-checker, scan the pooled findings for near-identical file:line ranges or quoted text across different lens-agents and merge them into one finding describing all the locations, rather than fact-checking (and then manually reconciling) overlapping findings separately. This would scale better as finding counts grow past what's easy to eyeball."
    severity: minor
  - description: "With exactly one human-only-surface escalation this run (ADR-0010), it needed its own full branch → gate → PR cycle, separate from the self-merged PR — including a second ~45s pnpm gate run and a fresh branch off the (by-then-updated) origin/main. That overhead is small for one escalation, but the Skill doesn't say what to do if a run surfaces *multiple* human-only-surface fixes in the same sweep: one PR per escalation (N gate runs, N PRs, N subscriptions to babysit) or one batched human-reviewed PR covering all of them."
    solution: Not resolved this run (only one escalation existed, so the question never had to be answered). Worth the Skill author deciding explicitly for the next run that surfaces more than one human-only finding, so it isn't improvised ad hoc under time pressure.
    severity: nit
