frictions:
  - description: A bare `sleep N` Bash call is blocked outright (even a single 60-90s wait for CI); only wrapping it in run_in_background:true or a Monitor until-loop works.
    solution: "Default to `run_in_background: true` for any fixed-duration wait on external state (CI, a webhook) instead of reaching for a plain sleep first."
    severity: nit
  - description: Tried a Monitor bash poll-loop against the GitHub REST API directly with curl to watch PR check-run status; got 403 'Resource not accessible by integration' since only the authenticated github MCP tool carries credentials, not the plain shell's network egress.
    solution: For any GitHub state that needs auth, poll via the mcp__github__* tool itself (spaced with run_in_background sleeps), not a bash-based Monitor loop — curl/gh from Bash has no GitHub credentials in this environment.
    severity: minor
  - description: The survey subagent left three scratch `.ts` parsing scripts untracked in the repo root instead of deleting them as instructed, which tripped the stop-hook's untracked-file check in the main session.
    solution: Either have the parent session proactively `rm` subagent scratch files before ending a turn, or make 'delete your scratch script' an explicit last tool call in the subagent's brief rather than a closing-paragraph instruction easy to skip.
    severity: nit
