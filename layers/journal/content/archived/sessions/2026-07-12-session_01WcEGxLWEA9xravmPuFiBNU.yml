goal: Fix session-log outcomes truncated by unquoted YAML `#`
status: completed
outcome: "Loud guard added; 3 logs repaired; PR #367 merged"
summary: "Human reported two recent session logs rendering an incomplete `outcome`, and guessed the cause: missing quotes in YAML. Confirmed it — an authored value like `outcome: PR #354 merged` parses as just `PR`, because a space-`#` starts a YAML comment and the rest is dropped at the `log-session.ts --author` parse step. Found seven landed logs affected (`PR`, `Both`, `Filed issue`, …). The Skill already warned to quote such values, so documentation alone had failed. Added `findTruncatedScalars()` to `log-session.ts` (uses `parseDocument`; the parser keeps the dropped span on `node.comment`, so both the truncation and the intended value are recoverable) and wired it into both the `--author` and direct-land paths to fail loudly with the value to quote; block scalars never false-positive. Added unit tests, repaired the three recent 2026-07-12 logs (outcomes recovered faithfully from each summary), and noted the enforcement in the Skill. All human-instructed — the fix approach and the historical repair were my own calls within that ask, no net-new autonomous scope. Opened gated PR #367 (touches gated `log-session.ts`, so human-to-merge) and subscribed."
