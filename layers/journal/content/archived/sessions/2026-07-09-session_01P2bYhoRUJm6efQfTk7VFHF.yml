summary: "User asked (human-instructed) to make audit-skills self-merge autonomously on green CI, claiming zero risk. Ran /grill-with-docs (agent-chosen response to the ask) to pressure-test the claim before building. The design narrowed substantially through interactive grilling — self-merge scoped to Inventory-only edits citing an existing bright-line evidence rule, plus a new regression-watch capability and new/split/retire suggestions kept notes-only via existing session-log learnings/ideas fields, all user-directed choices made turn by turn. Implemented per the converged design, safety gate green, branch rebased onto a fast-moving main, PR #266 opened for human review (touches ADR/governance, human-only per ADR-0004). Repo owner then left a review comment (human-instructed follow-up) flagging that the SKILL.md hardcoded the Routine's cron schedule, which drifts; fixed directly plus added a general CLAUDE.md rule generalizing the fix, gate green again, rebased and re-pushed, thread resolved. User then asked (human-instructed) a verification question about what session data the regression-watch actually reads, which surfaced two real defects: the SKILL.md's own instructions referenced a `frictions` field the script never extracted, and (once measured against real data, at the user's explicit request) the regressionChecks payload was 557KB/~140K tokens from unbounded edits x brackets x no dedup. Separately, user correctly identified that routing audit-skills' own analytical findings through the session log's `frictions` field was a domain-definition misuse (a friction is this session's own pain, not a finding about another Skill). Fixed both: dedup + tighter bounds cut the scorecard to ~111KB, and frontmatter concerns now file/comment on a `needs-triage` issue directly (only for step 3's objective bright-line signal; the low-confidence regression-watch signal never files alone). User then pushed back further (human-instructed): only catching \"unused\" Skills via the bright-line rule was too narrow given the goal of catching ALL behavior regressions, not just usage-rate ones. Redesigned regression detection as two phases: a cheap screen (now including friction severity/count, not just usage) flags a suspected Skill, then a full-log deep-read (a new skillSessionFiles map, all-time, paths only) over that Skill's entire history grounds an actual judgement in real evidence before anything files or comments on an issue. Judging is deliberately a guideline, not a rigid formula, per explicit instruction - but citation of specific deep-read evidence is still required. Step 4 can now originate issues on equal footing with step 3, closing the original gap. PR #266 merged by the repo owner after three rounds of review feedback, all addressed in-branch."
