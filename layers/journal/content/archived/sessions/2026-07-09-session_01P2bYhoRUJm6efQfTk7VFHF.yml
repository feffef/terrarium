frictions:
  - description: Asserted a demotion 'silently suppresses a Skill' without first checking the actual triggering mechanism (SKILL.md frontmatter, not the Inventory).
    solution: Verify a behavioral/mechanism claim against the code before asserting it, not only after being challenged.
    severity: minor
  - description: Trusted ADR-0015's 'on-demand, schedule deferred' text at face value; it was stale, a live nightly Routine already existed.
    solution: Check live trigger state (list_triggers) before reasoning from a doc's stated cadence in a fast-moving, multi-agent repo.
    severity: minor
  - description: First regression-watch unit test assumed an edit date could bracket to zero sessions on both sides given a nonempty session list - impossible by construction.
    solution: Reason through a bracketing function's invariants before naming a test scenario, not just what sounds plausible.
    severity: nit
  - description: "Stashed WIP conflicted with ADR-0003 mid-rebase because audit-docs's own concurrent live sweep (PR #262/#263) edited the same amendment list."
    solution: In a fast-moving multi-agent repo, fetch/rebase onto origin/main earlier and more than once, not only right before the final push.
    severity: minor
  - description: Hardcoded a Routine's cron expression (`0 2 * * *`) directly into the SKILL.md and an ADR amendment - exactly the class of drift-prone restatement CLAUDE.md's own 'single-home every fact' rule warns against, just not yet spelled out for external/Routine state.
    solution: Reviewer caught it; fixed by removing the literal cadence and adding a CLAUDE.md rule. Should have generalized 'don't restate a fact with no in-repo home to sync against' myself before writing it, given I'd just fixed an instance of the same drift class (ADR-0015's stale cadence claim) minutes earlier in the same session.
    severity: minor
  - description: Shipped SKILL.md instructions telling the regression-watch step to consider 'did logged frictions change' when the script never actually extracted the `frictions` field - wrote the instruction without checking the data backed it.
    solution: When writing instructions that reference a data source, verify the field actually exists in that source's type/extraction code, don't just assume it based on what would be useful.
    severity: minor
  - description: Picked REGRESSION_BRACKET=10 and MAX_EDITS_PER_SKILL=3 as defaults without measuring real output size first; the combination produced a 557KB/~140K-token payload against the actual ~106-session repo, ~5x too large to hand a Skill run in one shot.
    solution: "User's own suggestion was the fix: measure against real data before picking defaults for anything with combinatorial fan-out (N skills x M edits x K bracket size), not just reason abstractly about what 'seems bounded'."
    severity: moderate
  - description: Routed audit-skills' own analytical findings (about another Skill's usage pattern) through the session log's `frictions` field, which CONTEXT.md defines as this session's own experienced pain - a domain-vocabulary misuse, not just an implementation detail, caught by the user rather than by me checking the glossary against my own design.
    solution: Re-check a term's actual glossary definition against the specific use I'm putting it to, especially when I'm reaching for an existing field because it's convenient (has an active consumer) rather than because it's the correct fit.
    severity: moderate
  - description: Initial design gated regression-watch issue-filing on step 3's usage-absence rule alone, missing that this structurally excludes any regression that doesn't also show up as reduced firing (a quality regression at unchanged usage rate) - a real gap the user had to point out rather than one I derived myself while designing the false-positive safeguard.
    solution: When adding a safeguard against one failure mode (false positives), explicitly check what it accidentally excludes on the other axis (true positives of a different shape), not just whether it blocks the bad case.
    severity: moderate
