learnings:
  - The Skill Inventory (layers/journal/content/current/skills/) is advisory documentation agents are told to weigh, not a mechanical trigger gate - a Skill's own SKILL.md frontmatter description is what actually gates Skill-tool availability.
  - frictions-to-fixes and audit-docs already cover the 'edit a SKILL.md/doc, self-merge the fix' surface from two angles (friction-driven, drift-driven); a third Skill claiming that surface directly would duplicate rather than add capability.
  - The `triage` Skill is a live, generic consumer of any needs-triage issue regardless of who/what filed it - a Skill doesn't need to route through frictions-to-fixes specifically just to get an issue picked up; filing directly (with a search-first dedup check) is a legitimate, already-supported path.
  - Recurrence across independent runs is itself a form of evidence for a low-confidence signal - 'comment on the existing issue instead of re-filing' turns repeated detections into a corroborating trail on one thread, which is a cheaper and more honest way to raise confidence than trying to make any single run's heuristic more sophisticated.
  - "A useful pattern for bounding data-heavy analysis without either starving it or blowing up context: keep the default scorecard cheap and broad (paths/severities/counts, not full content), then add a narrow, targeted deep-read entry point (a name-keyed file-path map) that only pays the full cost for the specific thing flagged by the cheap pass. Scales the expensive part with the number of real concerns, not the number of things being watched."
ideas:
  - A short 'exemption ledger' table in ADR-0003 (Skill, scope, date, PR) would make the growing self-merge exemption list legible at a glance instead of requiring a reader to parse N free-form amendment paragraphs - worth proposing once a 4th exemption is requested.
