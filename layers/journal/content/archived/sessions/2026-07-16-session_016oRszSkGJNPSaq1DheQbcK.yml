frictions:
  - description: Ran `git checkout main -- .` right after fetching origin/main, without checking git status first, against a stale local `main` ref (diverged from origin/main) — staged a huge unwanted diff across most of the repo instead of leaving the current branch's actual state alone.
    solution: Caught immediately via git status/diff before committing anything; reverted cleanly with `git restore --staged --worktree -- .` back to HEAD, which matched origin/main exactly (no prior uncommitted work existed to lose). Should have run `git status` before any checkout touching `.`, per CLAUDE.md's own git-safety-protocol rule — a rule I know and still skipped in the moment.
    severity: major
  - description: Wrote the ADR-0022 audit-docs session's id (session_01HwrGyUKyrhDprhXvfgfaVk, read earlier as research material for the blog post's own topic) into this session's own commit provenance footer, instead of this session's actual id — directly against CLAUDE.md's never-reconstruct-an-identifier rule, which specifically calls out session ids.
    solution: Caught before push (still a local, unpushed commit) by cross-checking against the CLAUDE_CODE_REMOTE_SESSION_ID env var; amended the tip commit with the correct id before pushing or opening the PR. The mistake was easy to make here because the wrong id was sitting right there in context as the subject of the post being written — worth double-checking a session-id footer specifically whenever the session's own research touched a *different* session's id in the same turn.
    severity: moderate
