frictions:
  - description: >-
      Unpaginated list_issues returned 157KB, far over the tool-result limit;
      had to slice the persisted file with python to recover numbers and
      titles. Same class as the 55KB survey friction already logged.
    solution: >-
      Paginate with minimal output up front — and the issue-tracker doc's MCP
      section (PR #103) could carry that hint.
    severity: minor
  - description: >-
      All 24 session logs concatenated exceed the Read cap (~39k tokens), so
      holding the complete friction list took a persisted dump read in two
      pages.
    solution: >-
      Fine at this scale; the future consolidate job should aggregate
      frictions instead of every run re-reading raw logs.
    severity: nit
  - description: >-
      frictions-to-fixes says to ask the user how many ripe frictions to take,
      but the session ran autonomously where a blocking question stalls
      everything; proceeded with the natural count (three).
    solution: >-
      Give the Skill a default (all that pass the ripeness test, capped ~5) so
      autonomous runs need no mid-run question.
    severity: minor
  - description: >-
      The pinned designated branch conflicted with the Skill's
      one-branch-per-PR dispatch; resolved by namespacing agent branches under
      the pinned prefix. Same class as the digest session's pinned-branch
      friction.
    solution: >-
      The Skill could state that dispatch branches are derived from (and
      override) a caller-pinned branch name.
    severity: minor
  - description: >-
      The Stop hook read the finished agents' worktrees under
      .claude/worktrees/ as untracked files and urged committing them —
      following that advice would commit harness infrastructure; removed the
      worktrees instead.
    solution: >-
      The hook should ignore .claude/worktrees/ (and git-worktree paths
      generally); it lives user-side, so only the user can fix it.
    severity: minor
  - description: >-
      The recurring Stop-hook-noise friction (three sessions) proved
      unfixable by this workflow — the hook is environment config, not a repo
      surface, so it could only be reported, not dispatched.
    solution: >-
      User-side hook fix; flagged in the run report since no repo PR can
      carry it.
    severity: nit
  - description: >-
      The GitHub MCP server disconnected right as /log-session arrived;
      recurring transient, harmless here since the helper only needs git.
    solution: none — reconnects are automatic; already logged in prior sessions.
    severity: nit
  - description: >-
      The session ended by user call while PRs #103/#104 were still in
      review, so whatever friction their review round-trips produce cannot
      reach this log.
    solution: >-
      The armed check-in keeps shepherding; a future amendment mechanism (or
      the consolidate job) could pick up post-log friction.
    severity: nit
  - description: >-
      startedAt is pinned from node_modules' birth timestamp (SessionStart
      hook), not a true session-start capture; endedAt is exact via date -u.
    solution: Deferred to the autonomous end-of-session trigger (ADR-0009).
    severity: nit
