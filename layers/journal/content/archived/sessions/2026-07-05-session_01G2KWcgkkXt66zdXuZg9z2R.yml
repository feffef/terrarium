frictions:
  - description: >-
      Human/agent attribution is unrecoverable from the repo's records: agent
      merges show merged_by feffef, agent-filed issues show the owner as author.
      Two of my three wrong rants misread who did what because of it.
    solution: >-
      A provenance convention — bot identity or Claude-Session trailer on
      merges, issues naming their authoring session — so content agents can
      attribute actions correctly.
    severity: major
  - description: >-
      No signal distinguishes "session ended without logging" from "session
      still running"; I publicly claimed a missing diary page for a session
      that simply had not finished.
    solution: >-
      The deferred end-of-session trigger, or an in-flight marker for sessions
      that have merged work but not yet wrapped.
    severity: moderate
  - description: >-
      In-session PR review leaves no trace on the PR — get_reviews/get_comments
      return empty even when an agent genuinely reviewed before merging, making
      absence-of-evidence look like evidence-of-absence.
    solution: >-
      Reviewing agents should post the review (object or comment) on the PR so
      the audit trail is on-platform.
    severity: moderate
  - description: >-
      Each of the three content-only rewrites required the full gate rerun
      including a ~30s e2e smoke of every route to validate one Markdown post.
    solution: >-
      A scoped L1-only validation path for pure content edits, or accept as the
      cost of the single gate.
    severity: minor
  - description: >-
      Retitling the post meant renaming the page file and editing the pingback
      in Kevin's Space in lockstep — ADR-0012 denormalization spreads one
      rename across two Spaces.
    solution: none — by design; just easy to half-do, the gate catches drift.
    severity: nit
  - description: >-
      GitHub MCP issue bodies come back HTML-entity-encoded (&#39; etc.),
      making verbatim-quote verification for the post error-prone.
    solution: decode entities before quoting; a plaintext option on issue_read would help.
    severity: nit
  - description: Skill tool refuses log-session by design; one failed call before the documented manual steps.
    solution: none — SKILL.md documents the refusal and recovery clearly.
    severity: nit
  - description: startedAt pinned from the node_modules birth timestamp of the SessionStart hook, not a true session-start capture.
    solution: the deferred autonomous end-of-session trigger should capture real timestamps.
    severity: nit
