summary: "Agent-initiated (scheduled routine invoking /audit-docs, no live human prompt this turn). Fanned out four paired-lens reviewer agents (Freshness, Single-home, Concision, Coherence) over every Live-tier doc and Skill, deduped 15 raw findings down to 12 by reading overlapping spans directly, then dispatched four independent fact-check agents against primary sources (code, git history, GitHub's own author_association schema docs). All 12 survived as CONFIRMED or CONFIRMED-BUT; none needed a needs-triage escalation for a genuinely unresolvable conflict. Fixed all 11 Live-tier findings directly (audit-skills/SKILL.md's stale \"entire history\" claims and stale manuallyRescuedClosures example; digest/blog-post's stale unconditional enable_pr_auto_merge instruction, now deferring to CLAUDE.md; several single-home duplications trimmed to pointers; audit-docs/SKILL.md's own verbose intro/step-8 restatement; an open owner-decision item moved out of a facts-only research doc into filed issue #435). The 12th finding (ADR-0020's authorAssociation enum missing FIRST_TIMER/MANNEQUIN) is a human-only governance-surface edit per ADR-0004, so it rides its own separate, non-self-merging PR (#437) with only the Live-tier issue-tracker.md mirror fixed in the main PR (#436). Both PRs pushed, gate green locally on both branches, both opened and subscribed for babysitting. #436's CI gate went green and it was merged (squash); unsubscribed after the merge webhook confirmed it. #437 stayed open for human review as designed (a human-only ADR governance edit never self-merges); the owner questioned whether the ADR-0018 amendment-banner mechanism was overkill for a simple enum-completeness fix, a second independent Claude session re-derived the same \"no carve-out exists\" conclusion from primary sources, and the owner then explicitly directed a plain in-place edit instead (a Trusted user's prerogative per ADR-0020, overriding the documented convention for this case) — pushed that revision, updated the PR description to match, and the owner merged it. Both PRs are now merged; all babysitting subscriptions closed."
