frictions:
  - description: "Filed issue #435's provenance footer with a session id copied from a `git log` entry (a prior, unrelated session's log commit) instead of resolving this session's own id from the commit-footer template — exactly the mistake CLAUDE.md's 'never reconstruct an identifier' rule calls out by name."
    solution: Caught it on review before moving on and corrected the issue body via issue_write update. The rule already exists and is explicit; the miss was not re-reading it at the moment of writing the footer rather than trusting a plausible-looking value already in context from an earlier git log call.
    severity: moderate
  - description: Called ScheduleWakeup with the /loop dynamic-mode sentinel while waiting on background reviewer agents, even though this run was a scheduled-routine /audit-docs invocation, not a /loop session — had to immediately call stop:true to undo it.
    solution: ScheduleWakeup's tool description is explicit that harness-tracked background work (Agent tool calls) already triggers automatic re-invocation on completion, so no wakeup is needed at all outside actual /loop dynamic-pacing mode. Re-read that distinction before reaching for the tool next time background agents are in flight.
    severity: nit
  - description: The subscribe_pr_activity webhook echoed my own just-posted PR audit-trail comment back into the conversation as a <github-webhook-activity> event, momentarily reading as if a third party had commented.
    solution: No repo-side fix — recognizing the comment author matched my own action was enough to skip acting on it. Worth remembering that self-authored comments round-trip through the same webhook channel as external ones.
    severity: nit
  - description: "On PR #437, both this session and an independently-invoked second Claude session read every documented ADR convention (CLAUDE.md's single-home rule, ADR-0018, audit-docs/SKILL.md's Historical tier, ADR-0002's own amendment precedent) and found zero carve-out for a 'simple' factual correction skipping the amendment-banner mechanism — yet the owner still wanted a plain direct edit for this specific low-stakes case, overriding the convention by explicit Trusted-user direction."
    solution: The convention as written may be stricter than what the owner actually wants applied in practice for a trivial, non-decision-reversing completeness fix (adding two missed enum values). Worth a future /audit-docs or domain-modeling pass considering whether CLAUDE.md/ADR-0018 should carve out an explicit 'plain edit is fine for a non-decision-reversing factual completion, Trusted-user's call' exception, rather than leaving every ADR touch to the amendment mechanism by default.
    severity: minor
