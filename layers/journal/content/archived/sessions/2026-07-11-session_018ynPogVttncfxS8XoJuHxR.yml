frictions:
  - description: scripts/gate.ts shipped with verbose WHAT-narration comments and a re-derived rationale; the owner flagged it ("once again"), a recurring over-commenting habit, and pointed to CLAUDE.md's WHY-not-WHAT rule.
    solution: Default to no inline comment; explain only non-obvious WHY and cite the owning doc (here
    severity: minor
  - description: I first committed a design note for unimplemented work as a docs/research doc and opened a PR; the repo convention is GitHub issues for drafts/concepts, which the owner had to point out.
    solution: Treat docs/research/ as verified references only; route designs-for-unimplemented-work to issues. Worth stating this distinction in a doc so the next session does not repeat it.
    severity: moderate
  - description: AskUserQuestion failed twice with permission-stream-closed, so I could not ask the user to pick scope and defaulted to the doc/PR path, which was wrong.
    solution: Fall back gracefully; prefer the lighter-weight artifact (an issue) when unsure, since it is cheaper to correct than a committed doc + PR.
    severity: minor
  - description: send_later failed every attempt (5x) with permission-stream-closed across both PRs — the known Claude_Code_Remote cloud limitation — so the ~1h PR merge-detection check-in could never be armed.
    solution: Do not rely on send_later in cloud sessions; lean on the webhook subscription and treat merge/close detection as best-effort.
    severity: minor
  - description: git commit -m did not auto-inject the ADR-0017 provenance footer on either commit (known cloud behaviour), needing a manual amend each time.
    solution: Verify the footer after every -m commit and amend if absent, as CLAUDE.md already warns.
    severity: nit
  - description: The github and Claude_Code_Remote MCP servers flapped (connect/disconnect) repeatedly mid-session, forcing tool re-loads.
    solution: Re-load tools via ToolSearch on reconnect and retry; tolerate the flap rather than treat a disconnect as capability loss.
    severity: nit
