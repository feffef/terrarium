summary: "The user asked (human-instructed) to investigate a gate that skips unit/e2e when only .md files outside layers/ change. I verified the premise against the tree: nothing in build, the unit suite, or e2e consumes such a file. I first (agent-initiated) captured the design as a docs/research note and opened PR #339; the owner correctly pushed back that drafts/concepts go in issues here, not committed docs on main, so I moved the substance to issue #350 and closed #339 (nothing landed on main but the session log). The owner then named the additive variant gate:scoped and green-lit building it (human-instructed). I implemented scripts/gate.ts + a gate:scoped package script: cheap floor always, heavy layers (test/build/test:e2e) skipped only when every changed path is a .md outside layers/, fail-safe to the full gate otherwise. Pure helpers are unit-tested; pnpm gate green; opened PR #353. On owner direction I then made gate:scoped the standard LOCAL command in CLAUDE.md (CI stays the authoritative full gate) and added a rule: a CI full-gate failure where local gate:scoped passed is logged as a major friction. The real merge gate and CI are untouched (option 2 stays open on #350)."
