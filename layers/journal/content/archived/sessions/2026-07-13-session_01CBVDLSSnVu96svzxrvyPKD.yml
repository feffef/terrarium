frictions:
  - description: A worktree-isolated impl agent (merged-since.ts fix) stopped mid-task without committing twice — first ending its turn waiting on a background gate result with uncommitted changes, then after being resumed it appears to have died entirely (silent session-limit abort) with the same changes still uncommitted and unpushed.
    solution: Per CLAUDE.md's own guard, checked the worktree directly for uncommitted work after each stall; on the second failure, finished the implementation myself (typecheck, tests, manual CLI verification) rather than re-resuming a dead agent a third time.
    severity: major
  - description: My own Bash tool's cwd persisted inside a subagent's worktree from an earlier `cd`, so the session Stop hook flagged 'uncommitted changes' that actually belonged to that still-in-progress subagent's tree, not this session's own working directory.
    solution: cd back to the main repo root and re-check git status/branch there before treating a hook warning as applying to this session's own tree.
    severity: minor
  - description: The survey subagent reported mcp__github__search_issues/search_pull_requests have no minimal_output parameter despite the GitHub MCP server's general instructions recommending it — both always return full bodies, same overflow risk as list_* tools.
    solution: Update docs/agents/issue-tracker.md (or wherever GitHub-MCP hygiene notes live) to say neither list_* nor search_* expose minimal_output, not just list_*.
    severity: minor
  - description: A candidate friction (actions_list output size) the survey flagged as never-fixed turned out already resolved via a direct doc edit with no tracking GitHub issue/PR at all, so the tracker-only screening step missed it until I read the doc directly.
    solution: When screening a candidate whose fix type is 'doc', also grep the likely target doc file directly for existing coverage, not only search GitHub issues/PRs — some doc fixes land without ever getting their own tracked issue.
    severity: minor
