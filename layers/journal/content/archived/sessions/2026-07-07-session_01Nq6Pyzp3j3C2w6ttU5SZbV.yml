learnings:
  - 'An "additive optional field" has a wider blast radius than it looks: one field touches schema, scratch validator, stitch, UI type, dashboard mapping, and render — six coordinated edits, not one.'
  - A two-axis review's real value shows when both axes converge on the same line from different framings (glossary-creep vs scope-creep) — that overlap is a stronger fix signal than either finding alone.
ideas:
  - A journal-dashboard "sparks" feed aggregating learnings and ideas across all sessions — right now they are buried in per-card expanded detail with no cross-session view.
  - A consolidate/codify pass could promote recurring session ideas into GitHub issues automatically, closing the loop from spark to backlog item.
