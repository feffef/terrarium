frictions:
  - description: >-
      The github MCP server disconnected and reconnected several times mid-session,
      forcing tool reloads; an early `select:` ToolSearch returned "no match" during a blip.
    solution: Transient infra; when `select:` returns nothing, fall back to a keyword ToolSearch and retry.
    severity: minor
  - description: >-
      AskUserQuestion failed with "permission stream closed" mid-question, so the
      multiple-choice refinement options had to be re-asked as plain prose.
    solution: Fall back to plain-text numbered options when the structured-question tool errors.
    severity: minor
  - description: >-
      Edit refused files read only via bash/grep or a partial range ("File has not been
      read yet"), forcing extra Read calls before editing (tenant.config.ts, journal.ts).
    solution: Read (the tool) the exact target range before Edit; bash/grep reads don't satisfy it.
    severity: nit
  - description: >-
      The catalogue→Inventory rename spanned ~17 files; the read-before-Edit rule made
      per-file Edits costly, so I used `sed -i` — mild tension with CLAUDE.md's "inspect with Read, not cat".
    solution: Note that sed is the right tool for a bulk mechanical rename; the guidance targets cat-then-Edit, not sed sweeps.
    severity: nit
  - description: >-
      Doc contradiction: ADR-0003 said chartered jobs are "each a Skill" while the design
      reframed `sync` as a remit realised by several Skills — surfaced only by /code-review.
    solution: Amended ADR-0003 + CONTEXT (single home); a reframe touching an ADR should amend it in the same change.
    severity: minor
  - description: >-
      I re-coined the just-retired "catalogue" root as `catalogued` in the new helper/SKILL.md;
      the rename didn't propagate to my own new naming, and review caught it, not me.
    solution: When retiring a term, grep new code for its root before committing.
    severity: minor
  - description: >-
      startedAt is a hand-estimate — no exact session-start clock was available; endedAt is exact via `date -u`. Recurs every session.
    solution: The deferred autonomous end-of-session trigger would capture both mechanically.
    severity: nit
