learnings:
  - "modules/routing.ts now pushes each Tenant's tenant.config.ts and shared/expand.ts onto nuxt.options.watch in dev (issue #325), closing the old dev-restart gap several docs still described as open — only a brand-new layers/<tenant>/ directory still needs a manual restart."
  - This repo's ADR amendment-banner convention (a blockquote at the top, never touching Decision/Consequences prose) is the sanctioned way to flag a Historical ADR as stale without rewriting the decision — confirmed live via ADR-0014's existing ADR-0018/#211 banners.
ideas:
  - Add a preflight to scripts/gate.ts / gate:scoped that detects package.json or pnpm-lock.yaml changed more recently than node_modules/.pnpm's mtime and runs pnpm install automatically first — a rebase across a dependency-adding merge currently masquerades as a real typecheck failure (as it did this session with the mermaid package) until a human/agent thinks to suspect the environment instead of the code.
