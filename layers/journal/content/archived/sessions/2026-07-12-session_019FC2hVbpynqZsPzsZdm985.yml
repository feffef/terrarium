frictions:
  - description: 'enable_pr_auto_merge threw "Protected branch rules not configured for this branch" once the gate had already gone green on PR #371, instead of just merging.'
    solution: When the gate is already green by the time auto-merge is enabled, skip enable_pr_auto_merge and call merge_pull_request directly instead.
    severity: minor
  - description: enable_pr_auto_merge's error message ("unstable status (required checks are failing)") fires while checks are merely in_progress, not actually failing — misleading wording.
    solution: Treat that specific error as "checks still running, retry later" rather than a real gate failure; confirm via pull_request_read get_check_runs before concluding anything failed.
    severity: nit
  - description: "Local node_modules lacked the mermaid package (added by an earlier merged PR, #364) after rebasing onto a fresh origin/main, causing a spurious typecheck failure in pnpm gate:scoped."
    solution: Run pnpm install after rebasing across a merge that touches package.json, before trusting a gate failure as real.
    severity: minor
  - description: Used `git checkout origin/main -- .` to sanity-check whether the mermaid typecheck failure was pre-existing, which briefly clobbered my own staged fixes in the index (recovered via `git checkout HEAD -- .`).
    solution: Use read-only `git diff`/`git show` comparisons instead of `checkout -- .` when just inspecting another ref's content, to avoid mutating working-tree state.
    severity: nit
