learnings:
  - Playwright's locator.click() silently scrolls the element into view before dispatching the click — call scrollIntoViewIfNeeded() first when a test measures exact geometry around a click.
  - "A single 'is this scroll ever animated?' framing was too coarse: whether a scroll should ease depends on WHY it's happening — correcting a reflow the click itself caused should be instant (nothing should be seen moving), while animating the container's own height change is exactly the visible feedback the user wanted. Splitting those two questions up front would have avoided doing this in two follow-up rounds."
