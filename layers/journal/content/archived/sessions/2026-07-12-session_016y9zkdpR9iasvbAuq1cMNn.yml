outcome: Implemented, tested, PR merged
summary: "Directly human-instructed: the user asked to improve the scroll behavior when clicking to expand a daily digest or session card on the journal Space dashboard, so the clicked item's top stays at the same viewport position after expanding, instead of jumping to the top of the screen — except when near the top of the page makes that impossible. Implemented in layers/journal/app/pages/t/journal/[space]/index.vue: toggle() now captures the clicked item's getBoundingClientRect().top before the accordion state flips, then a new scrollPreservingTop() counter-scrolls after Vue's DOM update by exactly the delta any collapsing sibling caused, clamped to window.scrollY >= 0 so a near-top item settles as close to its original position as the page start allows. The deep-link/page-load path (scrollToOpen) is untouched — no prior on-screen position exists to preserve on a fresh load. Updated layers/journal/tests/e2e/journal.e2e.ts, replacing the old \"scrolls to top\" assertion with two e2e tests covering the no-sibling and sibling-collapses-above cases. Full `pnpm gate` passes. Opened PR #393, subscribed to its activity, and it merged with the safety gate green and no review comments. After merge, the user reported the corrective scroll still animated (`behavior: 'smooth'`), which showed the very motion the fix was meant to hide since it's a click-caused reflow correction, not a navigation. Since #393 had already merged, restarted the branch from origin/main per CLAUDE.md's merged-PR convention, changed scrollPreservingTop to always scroll instantly (`behavior: 'auto'`), reran the full gate, and opened #394, which also merged clean. The user then asked, directly, for a third change: keep the scroll correction instant but make the digest/session-card body's own expand/collapse visibly animated (grow/shrink quickly) instead of snapping. Restarted the branch again (per the same merged-PR convention, since #394 had also merged), added layers/journal/app/utils/expandTransition.ts — a pair of Vue <Transition> JS hooks (expandOnEnter/expandOnLeave, :css=\"false\") that grow/shrink height from `scrollHeight` over 160ms, respecting prefers-reduced-motion — and wrapped both the digest body and the session-card detail in an unpadded \"clip\" wrapper the hooks animate, leaving the existing padded content div untouched. Because the reflow now plays out over several animation frames instead of one DOM patch, replaced the one-shot scrollPreservingTop with pinTopAcrossTransition: a requestAnimationFrame loop that re-corrects the clicked item's screen position every frame (still always instant) until its own document position stops changing, with a frame-count backstop. Verified with an ad-hoc Playwright probe that the height genuinely ramps 0 to full over ~160ms while the clicked item's top holds to sub-pixel precision, including with a sibling digest collapsing above it at the same time. Full gate passed; opened #396, which also merged clean."
