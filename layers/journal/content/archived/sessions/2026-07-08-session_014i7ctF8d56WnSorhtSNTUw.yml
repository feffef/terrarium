outcome: Merged — @nuxt/content client DB patched + regression test + telemetry
summary: "Human-reported bug: following a link occasionally left a component (the About section on a blog Persona page) PERMANENTLY empty until a full reload. I first misdiagnosed it as a transient latency flash (client content dumps load lazily after nav) and shipped a warm-the-DB plugin + opened PR #235 — WRONG: I never reproduced the permanent case, only a self-correcting transient. After the user corrected me (it stays empty until reload), I built a deterministic red-capable loop (abort the first N sql_dump.txt fetches during a client nav) and found the true root cause: @nuxt/content's client loader caches the collection load promise and only evicts it on success, so a transient dump-fetch failure that outlasts $fetch's one retry leaves a REJECTED promise cached, poisoning that collection until reload. Fix (agent-authored on the user's bug report): a committed pnpm patch of @nuxt/content — retry the dump fetch + evict the promise on failure — plus a red-capable e2e regression test. Replaced the warming commit via force-push; full gate green. On the user's request (and healthy skepticism of the analysis) I also added client-side telemetry (localStorage ring buffer of dump-fetch failures) and opened tracking issue #236 framing the root cause as an unconfirmed hypothesis to verify against a real occurrence."
