frictions:
  - description: I shipped a fix and opened a PR before reproducing the user's ACTUAL symptom (permanent empty), fixing a transient flash instead. The user had to correct me.
    solution: Reproduce the user's exact symptom with a red-capable loop BEFORE hypothesising a fix — the diagnosing-bugs Phase 1 discipline. A transient that self-corrects is a different bug from one that persists until reload.
    severity: major
  - description: A pkill teardown chained with `;` before mv/rm/build silently killed the whole command (self-match, exit 144), so a "differential" build was never rebuilt — both arms tested the same binary and looked identical.
    solution: CLAUDE.md already warns this; run process-killing teardown as its own command, never chained before steps that must run. I hit it anyway.
    severity: moderate
  - description: A newly added app/plugins plugin registered in types but not at runtime across several prod builds (stale .nuxt); wasted rebuilds before a clean rm -rf .nuxt .output picked it up. (Plugin later removed as the wrong fix.)
    solution: A fresh plugin's runtime registration can need a clean .nuxt; rm -rf .nuxt .output when a plugin seems bundled-but-not-running.
    severity: minor
