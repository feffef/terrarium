learnings:
  - "@nuxt/content client queries run on a WASM SQLite DB whose per-collection sql_dump.txt loads lazily on first query; the load promise is cached in a module Map and only evicted on success — a rejected load poisons that collection until a full page reload."
  - $fetch/ofetch default retry for GET is 1 (two attempts); one dropped dump fetch self-heals, two consecutive drops are what poison the collection.
  - A committed pnpm patch lands as pnpm-workspace.yaml patchedDependencies + a patches/*.patch file and re-applies on install; CI's pnpm install covers it.
ideas:
  - File the @nuxt/content promise-poisoning bug upstream — the finally-evict is a small, general fix that belongs in the library.
  - A content-dump prefetch-on-hover (or warming) could still cut the benign first-nav latency flash, as a separate enhancement from this correctness fix.
  - If real telemetry (#236) shows the trigger is a post-deploy checksum-mismatch 404, a narrower app-level fix (cache-bust/retry-without-?v on 404) may beat patching the dependency.
