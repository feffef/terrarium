frictions:
  - description: A `preview.ts shot ... --dev` screenshot with the default 2s virtual-time-budget produced a false-positive overflow (clipped title text) because the Nuxt dev server's cold on-demand compile hadn't finished when the shutter fired.
    solution: Prefer `preview` (built) mode, or a selector-wait capture, before trusting a `--dev` screenshot for diagnosis, per CLAUDE.md's own guidance — screenshots aren't proof, computed layout is.
    severity: moderate
  - description: "`page.evaluate` threw `ReferenceError: __name is not defined` when the callback declared a named const/function internally — tsx/esbuild's keep-names transform injects a `__name(...)` helper call that doesn't exist once the function body is serialized into the browser context."
    solution: Only use plain inline arrow/anonymous functions inside an evaluate callback; never a named const/function declared within it.
    severity: minor
  - description: Editing `.card`'s scoped CSS in a running `--dev` server and re-probing showed no effect (computed style still `auto`) — HMR hadn't picked up the change, even though an earlier edit to `.foot` in the same file had. Only a full server restart made it visible, costing a confused bisection round.
    solution: Restart the dev server (not just re-navigate) when a scoped-style edit doesn't show up in computed style, rather than assuming the CSS itself is wrong.
    severity: moderate
  - description: Needed several bisection rounds (`.foot`, then `.card`, then `.cards`/`.feed`/`.rail`) to find which ancestor's `min-width:0` was actually load-bearing.
    solution: A flex/grid item's automatic minimum-size floor only applies to an element that is itself a direct flex/grid item of the container being sized — a nested flex row three levels down (`.foot`) doesn't get that treatment from its own non-flex/grid parent; fix at the actual grid/flex item ancestors first.
    severity: nit
