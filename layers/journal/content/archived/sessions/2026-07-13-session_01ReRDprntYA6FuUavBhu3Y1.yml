learnings:
  - Chromium's `--window-size`/Playwright's `viewport` size the CSS layout viewport directly, ignoring the page's own `<meta name="viewport">` — a "missing viewport meta" theory for a mobile overflow bug is usually a dead end once you confirm the meta tag is present.
  - A flex/grid item's automatic minimum size (`min-width:auto` flooring at its content's min-content) only propagates from an element that is itself a direct flex/grid item of the container being track-sized, not from any nested flex/grid descendant regardless of depth.
