summary: "A GitHub issue with a phone screenshot reported the journal Space's \"Recent activity\" cards overflowing horizontally on mobile — the single human kickoff prompt, with no further human steering. Root-caused via computed-layout probing (scrollWidth vs clientWidth at a 390px mobile viewport) rather than trusting screenshots alone: `.grid`'s columns (`.feed`, `.rail`) and `.cards` all defaulted to `min-width:auto`, flooring their automatic minimum size at content's min-content width instead of shrinking to the grid track. Also added `overflow-wrap:anywhere` to `.card` for long unbroken tokens in agent-authored session text. Verified with the same layout probe plus a full local gate run (all green), then opened and subscribed to PR #420, which passed CI green with no review comments and was merged by a human."
