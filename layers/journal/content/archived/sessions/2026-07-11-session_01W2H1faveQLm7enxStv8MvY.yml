frictions:
  - description: "No gate verified on-disk pack Skills against the lock, so PR #304's wayfinder drift went undetected until a human noticed it — the rule was prose-only."
    solution: Fixed this session — added verify:skills-lock (installedSha256 pins, run first in pnpm gate).
    severity: moderate
  - description: The lock's computedHash did not match a plain sha256 of the installed SKILL.md (nor the install-commit blob), so I could not verify against it directly and had to introduce a separate installedSha256 pin.
    solution: Document how computedHash is derived (upstream source vs installed file) near skills-lock.json or in the install tooling.
    severity: minor
