summary: "User reported that PR #304 had patched the external wayfinder Skill, which should be off limits. Confirmed via skills-lock.json that wayfinder is a pinned pack Skill (from mattpocock/skills) and its on-disk content had drifted. ADR-0015 already states pack SKILL.md files are not ours to patch, but only wired that boundary into the audit-skills referral stage, leaving frictions-to-fixes free to patch a pack Skill named by a friction directly (what happened via #296). All work was human-directed. First: reverted wayfinder/SKILL.md to install content, added a CLAUDE.md ground rule, closed the frictions-to-fixes loophole. Then, on the user's explicit follow-up (\"include the gate in this PR\"): built scripts/verify-skills-lock.ts and wired verify:skills-lock first into pnpm gate. First stored pins in skills-lock.json; the repo owner's review flagged that file as the CLI's (not ours), so reworked to store installedSha256 in the Skill Inventory instead (their steer), leaving skills-lock.json read-only. That required creating Inventory entries for 8 pack Skills that had none. Unit-tested (9), amended ADR-0015. Gate green (incl. negative drift + uncatalogued tests); PR #306 open, updated, owner replied-to."
