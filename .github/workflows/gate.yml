# Objective safety gate (ADR-0004). Layered, cheapest-first; every PR must clear it.
# The generator, routing, isolation logic, and this workflow are human-only.

name: safety-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    # Pin the L2 browser to a Playwright-managed Chromium instead of tracking the
    # runner image's system Chrome. The install step below writes here; the smoke
    # spec reads PLAYWRIGHT_BROWSERS_PATH to find it (falling back to system Chrome
    # if absent). A workspace path — not /opt/pw-browsers — so no sudo is needed.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: 'L0 · lint'
        run: pnpm lint

      - name: 'L0 · typecheck'
        run: pnpm typecheck

      # L3 — isolation invariant: unique, correctly-scoped collection keys.
      - name: 'L3 · isolation'
        run: pnpm test

      # L0 + L1 — build succeeds and all content validates against strict schemas.
      - name: 'L0/L1 · build + content validation'
        run: pnpm build

      # L2 — every (Tenant, Space) entry route renders 200 with content.
      - name: Install Chromium for the L2 browser smoke gate
        run: pnpm exec playwright-core install --with-deps chromium
      - name: 'L2 · smoke render'
        run: pnpm test:e2e
