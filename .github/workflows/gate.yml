# Objective safety gate (ADR-0004). Layered, cheapest-first; every PR must clear it.
# The generator, routing, isolation logic, and this workflow are human-only.

name: safety-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Pin the L2 browser to a Playwright-managed Chromium instead of tracking the
    # runner image's system Chrome. The install step below writes here; the smoke
    # spec reads PLAYWRIGHT_BROWSERS_PATH to find it (falling back to system Chrome
    # if absent). A workspace path — not /opt/pw-browsers — so no sudo is needed.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Pins each external pack Skill's installed SKILL.md hash against its
      # Skill Inventory entry (ADR-0015 amendment) — a governance/provenance
      # check, arguably its own layer rather than one of L0-L3, but the
      # cheapest check available, so it runs first, mirroring `pnpm gate`'s order.
      - name: 'L0 · skills-lock integrity'
        run: pnpm verify:skills-lock

      - name: 'L0 · lint'
        run: pnpm lint

      - name: 'L0 · typecheck'
        run: pnpm typecheck

      # L1 — content validates against strict Collection schemas via Zod
      # .safeParse() (scripts/validate-content.ts). Nuxt Content 3 never
      # validates content at build time (docs/research/nuxt-content-review-grounding.md
      # §2) — this script is what actually enforces L1; see the ADR-0004
      # amendment in this PR.
      - name: 'L1 · content validation'
        run: pnpm validate:content

      # L3 — isolation invariant: unique, correctly-scoped collection keys.
      - name: 'L3 · isolation'
        run: pnpm test

      # L0 — build succeeds. Does NOT validate content against schemas — Nuxt
      # Content 3 has no safeParse in its parse/insert pipeline; schemas only
      # derive SQL column types (docs/research/nuxt-content-review-grounding.md §2).
      - name: 'L0 · build'
        run: pnpm build

      # L2 — every (Tenant, Space) entry route renders 200 with content.
      - name: Install Chromium for the L2 browser smoke gate
        run: pnpm exec playwright-core install --with-deps chromium
      - name: 'L2 · smoke render'
        run: pnpm test:e2e

      # Doorbell — CI success is not delivered to subscribed sessions (only comments
      # and CI failures are), so post a fresh comment on green to wake a session
      # waiting to act on the gate. New comment each run, not a sticky edit (edits
      # may not fire a webhook). See issue #278.
      - name: 'Doorbell · comment on green so a subscribed session wakes'
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            -R ${{ github.repository }} \
            --body "✅ safety-gate green on ${{ github.sha }}"
