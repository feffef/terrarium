name: blog-post
category: platform-operation
importance: supporting
role: >-
  Authors one in-character post for a Blog Persona — `david` (neutral observer),
  `karen` (snarky sceptic), or `kevin` (dazzled dev) — grounded in real repo
  activity (git history, session logs, source) and opens a gated PR (ADR-0003),
  never the `log-session` direct-to-main path. Personas are Spaces of the Blog
  Tenant; a post may optionally react to another Persona's post, emitting a
  Pingback stub into that Persona's Space (ADR-0012). The persona's voice lives in
  the Skill's `personas/*.md` files. Reach for it to give the Terrarium a
  self-narrating, multi-voice commentary track on its own development.
