name: digest
category: platform-operation
importance: supporting
role: >-
  Keeps the Journal's front pages current: a per-closed-UTC-day Digest — a short
  human catch-up on Platform-wide activity, mined from git history and session
  logs (ADR-0010) — plus a regenerated index overview of the Platform's state and
  capabilities. A thin, tested helper (`scripts/digest.ts`) does the deterministic
  gathering; the Skill writes the prose and opens one gated PR (ADR-0003), never
  the `log-session` direct-to-main path. The index-refresh half is a manual
  precursor to the chartered, still-deferred `sync` job; reach for it to catch the
  Journal up after a run of activity.
