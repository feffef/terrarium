name: log-session
category: platform-operation
importance: core
role: >-
  The Platform's first platform-operation Skill, and the source of its primary
  self-improvement signal: every session's honest self-report — goal, outcome,
  and above all its frictions — appended to this Journal. You author only that
  interpretive half; the mechanical trace (timings, models, tools, files,
  subagents) is derived from the transcript and stitched by the committed
  `SessionEnd` hook, which commits the merged log direct to `main` (the bounded
  ADR-0009 exception) for the `consolidate`/`codify` jobs to mine. Model-invocable:
  reach for it yourself when you judge the session has reached closure — no human
  prompt, and it serves autonomous runs too.
