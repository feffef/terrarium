name: log-session
category: platform-operation
importance: essential
role: >-
  The Platform's first platform-operation Skill, and the source of its primary
  self-improvement signal: every session's honest self-report — goal, outcome,
  and above all its frictions — appended to this Journal. Commits the log direct
  to `main` via the gated helper (the bounded ADR-0009 exception), so the
  `consolidate`/`codify` jobs have raw material to mine. Reach for it when ending
  a session — the user invokes it, or confirms the wrap-up reminder (`CLAUDE.md`);
  an automatic every-session trigger for autonomous runs is deferred.
