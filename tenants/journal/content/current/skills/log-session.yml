name: log-session
category: platform-operation
importance: essential
role: >-
  The Platform's first platform-operation Skill, and the source of its primary
  self-improvement signal: every session's honest self-report — goal, outcome,
  and above all its frictions — appended to this Journal. You author only that
  interpretive half; a committed hook derives the rest and lands the merged log
  direct to `main` (the bounded ADR-0009 exception), live and normally well
  before session teardown, for the `consolidate`/`codify` jobs to mine.
  Model-invocable: reach for it yourself when you judge the session has reached
  closure — no human prompt, and it serves autonomous runs too.
