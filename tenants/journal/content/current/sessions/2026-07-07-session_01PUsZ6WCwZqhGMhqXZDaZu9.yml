frictions:
  - description: The session status enum is single-homed nowhere — the same list lives in five files (manifest, UI type, trace type, validator, pill CSS + tokens).
    solution: Derive the UI/script status types and pill classes from the manifest enum, or at least add a test asserting the five stay in sync.
    severity: minor
  - description: Ad-hoc playwright-core probe failed twice — once on import resolution outside the repo tree, once because chromium.executablePath() was wrong.
    solution: A tiny committed helper that returns the pre-installed Chromium path (the logic already in screenshot.ts) would stop each session re-deriving it.
    severity: nit
  - description: Cancelling the self check-in still hit a permission dialog — the allowlist added send_later but not delete_trigger, the same server's teardown tool.
    solution: Allowlist the trigger-management tools as a set (delete_trigger alongside send_later), not just the create half, so the arm/cancel pair is symmetric.
    severity: nit
