summary: "The user was annoyed that sessions with committed work stop to ask \"shall I open a PR?\". Changed the default: a session that committed substantive work now opens its gated PR automatically at closure (ADR-0003 amendment + two CLAUDE.md conventions), bounded so it gates opening only, not deciding to do the work. Opening the PR is now the first log-session trigger, logged with a new in-review status (open-but-unmerged, distinct from completed). Added in-review to all five status homes plus a blue StatusPill and its light/dark theme tokens. Verified the full gate and probed the pill's computed colour, then dogfooded the whole thing by auto-opening PR #192 and logging this in-review."
