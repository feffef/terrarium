learnings:
  - get_me returns the connector's authorized identity, not proof of who is typing — it verifies the environment's owner, which validates ADR-0018's one-principal-per-environment caveat live.
  - "A Tenant's content is not inert: it includes executable Vue components (a Nuxt layer's fit-out), so a guest-authored Tenant ships code the objective gate builds but never vets for intent — the real security-review burden is on the human merge."
ideas:
