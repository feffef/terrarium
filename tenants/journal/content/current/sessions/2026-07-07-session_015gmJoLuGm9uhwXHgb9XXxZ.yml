summary: "The owner invited collaborators and asked which policies distinguish trusted owner input from screened guest input. Researched the governance model (ADR-0003/0004/0017, CONTEXT.md, triage) — no trust vocabulary existed, only the authorAssociation filter. Drafted ADR-0018 (Owner/Guest Principal tiers, tier derived out-of-band never from request content), amended ADR-0003/0004, added glossary terms and a CLAUDE.md pointer, opened PR #207. Owner then refined it twice: guests should be allowed to spawn a content Tenant (not blocked from all net-new) — only ADRs/human-only surfaces are protected; and content includes executable Vue, so guest components need a runtime-code security review the gate can't provide. Reworked all files to match and kept the PR description in sync. Owner then chose to abandon for more thinking: closed PR #207 and filed issue #213 capturing the decisions and open questions for human finalization."
