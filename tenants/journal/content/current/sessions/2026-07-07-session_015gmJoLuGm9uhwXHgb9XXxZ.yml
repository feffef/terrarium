summary: "The owner invited collaborators and asked which policies should distinguish trusted owner input from screened guest input. Researched the governance model (ADR-0003/0004/0017, CONTEXT.md, issue-tracker triage) and confirmed no trust vocabulary existed — only the authorAssociation filter for external PRs. After a scope check, drafted ADR-0018 (Owner/Guest Principal trust tiers, tier derived out-of-band never from request content), amended ADR-0004 with a provenance axis (guest-originated is human-only merge) and ADR-0003 (owner-only green-light), added CONTEXT.md glossary terms and a CLAUDE.md pointer. Full gate green. Opened PR #207, subscribed."
