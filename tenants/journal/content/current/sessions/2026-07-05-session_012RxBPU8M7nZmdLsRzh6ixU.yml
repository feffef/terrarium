      install's absolute path. This exact friction recurs (see the 2026-07-05
      "Style standalone journal Document pages" log).
    solution: >-
      A committed screenshot recipe or a dev-only playwright devDependency would
      stop every UX-review session from re-deriving the /opt path.
    severity: minor
  - description: >-
      The Nuxt DevTools overlay badge ("26 ms", and an "85 ms" that overlapped a
      stat number) appeared in dev-mode screenshots and initially read as a real
      UI bug, costing a moment to rule out as a dev-only artifact.
    solution: >-
      Screenshot with the app built/previewed rather than the dev server, or
      disable devtools in the shot script, so captures match production.
    severity: nit
  - description: >-
      Reading exact numbers off downscaled full-page screenshots was unreliable;
