frictions:
  - description: Edit rejected package.json because I'd read it via Bash cat, not the Read tool — the exact friction entry #1 logged, hit again.
    solution: Always Read a file with the Read tool before Edit; this now recurs across sessions and is a prime first codify rule.
    severity: minor
  - description: Cleaning up an injected test error with `git checkout -- file` reverted all my uncommitted fixes, forcing me to re-apply three edits.
    solution: Never checkout a file that holds wanted uncommitted changes; delete just the injected lines, or git stash.
    severity: moderate
  - description: I claimed scripts/ were type-gated before verifying; they were not. The user caught it and I had to add a node-side tsconfig.
    solution: Verify a claim by running the actual check before asserting coverage, especially in commit messages.
    severity: moderate
  - description: First real use of the helper needs a push to main, but the mechanism is unmerged (PR #5) and I am branch-scoped, so I dry-ran instead of landing.
    solution: Land session logs only after the helper merges (or via the post-merge Stop hook); treat entry #2 like the entry #1 bootstrap.
    severity: moderate
  - description: Node deps were not installed at session start, so the first validation attempts failed with module-not-found until I ran pnpm install.
    solution: A SessionStart hook running pnpm install would remove this cold-start stumble.
    severity: minor
  - description: The helper's fetch to push loop cannot be tested end-to-end without pushing to main, so only dry-run exercises it.
    solution: An integration test against a local throwaway bare remote would cover the real push path.
    severity: minor
  - description: z.date() rejects strings; I had to discover Nuxt Content coerces YAML timestamps and replicate that before validating.
    solution: Note the coercion behaviour near the schema so future tooling authors don't re-derive it.
    severity: nit
  - description: Standalone tsc failed until I realised Nuxt ships its own node shims and @types/node was not installed.
    solution: Document that node-side tooling needs @types/node explicitly; nuxt typecheck does not provide it.
    severity: nit
  - description: startedAt/endedAt here are hand-estimated; I do not have exact session boundaries.
    solution: The PR3 Stop hook must capture both from the transcript, not the agent.
    severity: nit
