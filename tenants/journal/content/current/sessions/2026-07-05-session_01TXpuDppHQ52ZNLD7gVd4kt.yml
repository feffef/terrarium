summary: >-
  Chased the recent-activity dashboard bug — every session at 00:00 UTC, 1- or
  1440-minute durations, random same-day order. Root cause: the sessions schema
  used `z.date()`, which Nuxt Content maps to a SQL DATE column that stores only
  YYYY-MM-DD, dropping the time-of-day. Confirmed by reading @nuxt/content
  internals and decoding the built content DB. Fixed by storing ISO strings
  (VARCHAR, verbatim); rejected `.datetime()` since its DATETIME writer
  re-renders in local time and drops the Z. Opened PR #27, ran /code-review; a
  research agent verified empirically that string+refine is the only correct
  encoding. Review caught the validator advertising UTC but accepting
  offset/zone-less values — tightened to require canonical `…Z`. Merged.
