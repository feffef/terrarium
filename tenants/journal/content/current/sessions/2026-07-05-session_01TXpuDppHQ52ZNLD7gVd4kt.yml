frictions:
  - description: >-
      `z.date()` silently truncates to a SQL DATE column in Nuxt Content — no
      warning, valid build, but every stored time-of-day is dropped. A footgun.
    solution: Store ISO strings (VARCHAR, verbatim); documented the trap in the schema comment.
    severity: moderate
  - description: >-
      Verifying the stored values meant decoding the content DB — sql_dump.txt is
      base64+gzip, not human-readable, with no repo affordance to inspect baked content.
    solution: Decoded via `base64 -d | gunzip`; a `pnpm content:dump` helper would save the dance.
    severity: minor
  - description: >-
      The .output/.nuxt content dumps were wiped between commands (a later gen /
      nuxt prepare cleaned them), so a re-verification grep failed mid-check.
    solution: Captured the evidence on first decode; re-checking needs a fresh rebuild.
    severity: minor
  - description: >-
      `git diff origin/main...HEAD` for the review ballooned to 149 files because
      origin/main lagged far behind the branch's merge-base.
    solution: Pin the review fixed point to the commit under review (HEAD~1), not the stale default branch.
    severity: minor
  - description: >-
      Set a Monitor to wait on the background research agent, which was needless —
      the harness auto-notifies on agent completion; I had to stop it.
    solution: Rely on the completion notification for harness-tracked agents; don't poll.
    severity: nit
  - description: >-
      The Skill tool refused log-session (disable-model-invocation), so I followed
      the SKILL.md steps by hand.
    solution: Expected by design; the refusal message points at the manual path. No action.
    severity: nit
  - description: startedAt is a hand-estimate — no exact session-start clock was available; endedAt is exact via date -u.
    solution: The deferred autonomous end-of-session trigger would capture both mechanically.
    severity: nit
  - description: The session id was not handed to me directly; I recovered it from the Claude-Session git-trailer URL. Recurring.
    solution: Surface the session id explicitly for hand-authored logs.
    severity: nit
