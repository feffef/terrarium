frictions:
  - description: screenshot.ts spawns Chromium directly and exposes no click API, so screenshotting an expand-on-click card needed an ad-hoc Playwright script.
    solution: A committed screenshot helper variant that accepts a pre-shot interaction (click selector) would remove the per-session bespoke driver.
    severity: minor
  - description: playwright-core is not hoisted, so a scratch Playwright script fails to resolve it until NODE_PATH is pointed at the pnpm store path.
    solution: Note the NODE_PATH=node_modules/.pnpm/playwright-core@*/node_modules recipe alongside the screenshot docs for anyone driving the browser via the API.
    severity: nit
  - description: tsx in this repo emits CJS, so a top-level await in a scratch script fails; had to wrap the driver in an async IIFE.
    solution: Wrap ad-hoc tsx scripts in (async () => {...})() rather than relying on top-level await.
    severity: nit
  - description: My first authored log landed on main with `outcome` truncated to "…PR" and a docsRead reason cut at a comma — an unquoted '#' and a flow-map ',' each silently ate the tail; re-authored quoted and re-ran session-end to fix.
    solution: The log-session skill already says to quote '[' and '{' values; broaden it to also quote any value containing '#' (YAML comment) or a ',' inside a flow map, and cover the top-level outcome/goal fields, not just reasons.
    severity: minor
