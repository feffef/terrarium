summary: "The SessionEnd extractor already derived a mechanical trace (models, toolCounts, filesEdited, subagents) into every session log, but the dashboard card ignored it. Weighted the display by interest per the user's steer: model is an always-visible chip in the collapsed foot (short id, busiest-first for multi-tier sessions); subagents render directly in the expanded detail; and the verbose files-read/files-edited/tools-used lists sit behind per-list native <details> disclosures so they inform without cluttering (\"docsRead\" relabelled \"Files read\"). Skills and frictions stay always-visible. Added formatModels/toolEntries to the pure dashboard module with unit tests (102 pass), then verified the real render — collapsed and expanded — with a Playwright screenshot. Opened PR #151; reviewed, gate-green, and merged."
