summary: "User flagged that most sessions still claim the scratch lands on main \"at teardown via the SessionEnd hook,\" even though SessionEnd is known unreliable. Investigated the git history: PR #148 (d9b68e2) rewired landing onto a live `Stop` hook as primary, demoting `SessionEnd`/resume to backstops, because SessionEnd was found to fail silently on a network-freezing suspend. That fix never got folded back into the docs describing the mechanism. Found and fixed five stale spots (CLAUDE.md, log-session SKILL.md, its Skill Inventory entry, digest SKILL.md, and scripts/log-session.ts's own author-time console output), plus amended ADR-0009 with a new \"Landing mechanism as shipped\" section. Verified lint/typecheck/tests all pass, committed, and pushed to the designated branch."
