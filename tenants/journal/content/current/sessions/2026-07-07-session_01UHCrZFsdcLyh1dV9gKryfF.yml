learnings:
  - Nuxt 4 resolves the main component only from each layer's app/ dir; a repo-root app.vue is silently ignored and Nuxt's own runtime app.vue (NuxtLayout + NuxtRouteAnnouncer + NuxtPage) serves instead
  - Tenant-layer components and utils are already auto-import-registered (.nuxt/components.d.ts, imports.d.ts) despite every page deep-relative-importing them
ideas:
  - A read-only useSpace(tenant) composable could fold the repeated resolveSpaceRoute/404/key-picking boilerplate out of all seven tenant pages
  - Moving tenants/ under Nuxt's layers/ auto-extend convention would delete the hand-maintained extends list and the tsconfig include patch - ADR-worthy trade-off against the ubiquitous-language directory name
