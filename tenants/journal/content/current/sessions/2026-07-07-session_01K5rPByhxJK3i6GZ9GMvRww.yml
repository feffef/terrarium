outcome: Nodes render engraved plates; three biomes shot
summary: The Atlas food web drew each specimen as a plain circle plus a rarity glyph. Replaced those nodes with each specimen's own engraved illustration (the same inner SVG the specimen plate renders), scaled into a paper medallion that carries the colour signature as a hairline ring, masks strands passing behind it, and keeps the hover/dim wander and arrowhead trimming. Widened the ring layout and bumped the node radius to seat the larger plates. Verified via lint, typecheck, build, and a production preview screenshot of all three biomes (canopy, floor, pool). Pushed to the feature branch; PR not yet opened.
