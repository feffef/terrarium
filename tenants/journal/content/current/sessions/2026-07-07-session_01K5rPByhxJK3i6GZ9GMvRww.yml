learnings:
  - Vue v-html on an SVG <g> parses in the SVG namespace, so authored inner markup renders (same as SpecimenPlate's <svg>).
  - A radialGradient stop-color of var(--atlas-paper) resolves per-biome from the defs' inherited custom props, so one gradient serves every node in the wing.
  - An SVG radial vignette in the page's own colour hides strands with no visible edge — a bordered disc reads as an inserted bubble; a same-colour fade reads as the page.
