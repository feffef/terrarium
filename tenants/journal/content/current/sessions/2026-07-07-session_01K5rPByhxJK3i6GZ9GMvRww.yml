summary: The Atlas food web drew each specimen as a plain circle plus a rarity glyph. Replaced those nodes with each specimen's own engraved illustration (the same inner SVG the specimen plate renders), scaled and drawn straight onto the page. First cut seated them in bordered paper medallions; the user found the discs off-register for the engraved style, so a second pass dropped the disc for a borderless page-coloured radial vignette (only softens strands passing under a specimen) and moved the colour signature from a ring to a short engraved rule under the name. Verified via lint, typecheck, build, and a production preview screenshot of all three biomes (canopy, floor, pool). Pushed to the feature branch across two commits; PR not yet opened.
