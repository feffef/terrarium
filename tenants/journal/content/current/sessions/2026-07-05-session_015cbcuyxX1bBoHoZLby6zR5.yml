frictions:
  - description: >-
      Did not update PR descriptions when I fundamentally changed #14 and #17;
      the user caught it. The stale descriptions still sold the old approach.
    solution: Added the "keep PR description in sync" hard rule to CLAUDE.md (#20); also step 6 of the new Skill.
    severity: moderate
  - description: >-
      Cold container had no node_modules; pnpm install had to run before the gate
      could, while testing gate:drift and building the Skill. Recurs every session.
    solution: PR #14's SessionStart hook (merged this session) fixes it; the friction I was fixing bit me mid-fix.
    severity: minor
  - description: >-
      Edit refused CLAUDE.md with "File has not been read yet" after an external
      modification — the exact cat-then-Edit papercut #18 documents, hit live.
    solution: Re-Read before Edit; the Read-before-Edit convention (#18) landed this session.
    severity: minor
  - description: >-
      My first gate:drift failure test falsely passed — `pnpm gen` regenerated the
      file and wiped the injected drift before the diff ran.
    solution: Test the message branch in isolation (git diff || msg) since gen overwrites manual edits.
    severity: minor
  - description: >-
      Two PRs needed review-driven rework (#14 scoped for overhead, #17 switched to
      Option 2), each a re-checkout, re-edit, re-verify, re-push cycle.
    solution: Inherent to gated review; the cost was real but expected, not a defect.
    severity: nit
  - description: >-
      pull_request_read returned mergeable_state "unknown" right after each merge,
      forcing a second poll to confirm same-file PRs had not conflicted.
    solution: GitHub computes mergeability async; a brief wait or a single retry is enough.
    severity: nit
  - description: >-
      The github MCP server disconnected then reconnected mid-session, dropping its
      tools and requiring ToolSearch reloads to continue.
    solution: Transient infrastructure; no action, but it interrupted the PR-watch flow.
    severity: nit
