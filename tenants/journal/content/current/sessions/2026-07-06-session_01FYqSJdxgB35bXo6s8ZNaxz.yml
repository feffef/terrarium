  - description: >-
      Commit-less session — only MCP issue calls, no git commits — so the
      log-session id heuristic (`git log` Claude-Session trailer) returned a
      prior session's id; used the harness trailer template instead.
    solution: >-
      Same class as #39/#99. SKILL.md already names a fallback for commit-less
      sessions; surfacing the canonical id explicitly would end the recovery.
    severity: minor
  - description: >-
      An unpaginated list_issues returned 168KB and overflowed the tool-result
      limit, forcing a python-slice recovery in a subagent to read it.
    solution: >-
      Exactly the friction I filed as #108 this run — paginate with
      minimal_output; the issue-tracker MCP section should carry the hint.
    severity: minor
  - description: >-
      The 27 concatenated session logs and the full tracker JSON both exceed the
      context/Read caps, so each survey had to run in a subagent returning a
      distilled list.
    solution: >-
      Fine at this scale; the deferred consolidate job should aggregate frictions
      once rather than every run re-reading the raw corpus.
    severity: nit
  - description: >-
      ToolSearch did not resolve the github tools via `select:list_issues,...`
      by bare name; had to query by keywords and full mcp__github__ ids.
    solution: >-
      Query deferred MCP tools by keyword or their fully-qualified id, not the
      bare name — already logged in a prior session.
