frictions:
  - description: >-
      First draft implied the frictions-to-fixes review-and-merge capability
      was an agent-initiated change agents normalized among themselves; the
      user had to correct me that PR #127 (the capability itself) was
      explicitly human-requested and human-merged. The underlying facts cited
      were true but the causal narrative around them was misleading.
    solution: >-
      Should have checked who authored/merged the *skill-modification* PR
      itself, not just the PR produced by running the skill, before drawing
      the "agents did this to themselves" conclusion. Verify provenance at
      the same rigor as any other cited fact.
    severity: major
  - description: >-
      AskUserQuestion failed twice — once with a malformed-JSON input error
      from an incorrectly nested raw payload, once with a permission-stream
      error on a correctly formed call — forcing a fallback to a plain-text
      question in chat.
    solution: >-
      Fall back to a plain-text question immediately after the first
      tool-level failure instead of retrying the same tool a second time.
    severity: minor
  - description: >-
      The blog-post Skill's only length guidance was "keep it tight — a blog
      post, not an essay," which let a reaction post balloon to ~9 paragraphs
      across revisions before the user asked for a 2-paragraph trim.
    solution: >-
      Fixed this session — added explicit "1-4 paragraphs is the norm" and
      "pick the one or two facts that earn the post" guidance to SKILL.md §5.
    severity: moderate
  - description: >-
      The Skill also had no guidance that posts should be entertaining rather
