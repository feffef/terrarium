frictions:
  - description: >-
      After adding the new blog Nuxt layer, `pnpm lint` failed with
      vue/multi-word-component-names on the blog pages, because `.nuxt` had not been
      re-prepared to recognise the layer's page dir.
    solution: >-
      Re-run `nuxt prepare` after adding a layer (or have install/the gate do it);
      worth a note in docs/agents/tenant-layers.md.
    severity: moderate
  - description: >-
      A `git commit -m` message containing backticks was mangled by the shell's
      command substitution, producing a garbled commit body I had to amend.
    solution: Use `git commit -F <file>` for messages that contain backticks or backquotes.
    severity: minor
  - description: >-
      Unsure whether a `data` collection with no documents (kevin/pingbacks) would
      break the generator/build, so I added a .gitkeep defensively.
    solution: Generator could scaffold empty collection dirs, or docs could state the placeholder need.
    severity: nit
  - description: >-
      Iterating on the root/blog UI meant a full `pnpm build` + node server for each
      screenshot, which was slow.
    solution: Use `pnpm dev` for faster visual iteration when only checking a render.
    severity: nit
  - description: >-
      Persona naming took ~5 back-and-forth rounds; without an upfront naming brief,
      several suggestions were proposed and discarded.
    solution: Ask for naming constraints/tone up front before proposing candidates.
    severity: nit
  - description: >-
      startedAt in this log is a hand-estimate; the session's true start was not captured.
    solution: The deferred end-of-session trigger should capture real start/end timestamps.
    severity: nit
