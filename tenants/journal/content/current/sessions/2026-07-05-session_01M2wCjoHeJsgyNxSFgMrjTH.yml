summary: >-
  Introduced the Platform's second Tenant: a blog whose three Spaces are personas
  (david, karen, kevin) reporting on Terrarium from different angles. Grilled the
  design first, then wrote ADR-0012 (cross-persona pingbacks via author-time
  denormalization) plus glossary terms. Built the manifest, a deliberately simple
  Nuxt layer (persona landings, post pages, pingback rendering), seed content with
  a live reaction chain, and the blog-post Skill. Added front-door blog links on /
  and a Blogger Network footer, and reframed copy from "a website" to a
  content-website platform. Full safety gate green throughout; PR #53 merged.
